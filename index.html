                'Os':[{mass:192,stable:true},{mass:190,stable:true},{mass:189,stable:true}],
                'Ir':[{mass:193,stable:true},{mass:191,stable:true}],
                'Pt':[{mass:195,stable:true},{mass:194,stable:true},{mass:196,stable:true}],
                'Au':[{mass:197,stable:true}],
                'Hg':[{mass:202,stable:true},{mass:200,stable:true},{mass:199,stable:true}],
                'Tl':[{mass:205,stable:true},{mass:203,stable:true}],
                'Pb':[{mass:208,stable:true},{mass:206,stable:true},{mass:207,stable:true},{mass:210,radio:true,halfLife:3,decay:'beta'}],
                'Bi':[{mass:209,radio:true,halfLife:8,decay:'alpha'}],
                'Po':[{mass:210,radio:true,halfLife:3,decay:'alpha'},{mass:218,radio:true,halfLife:2,decay:'alpha'}],
                'At':[{mass:210,radio:true,halfLife:2,decay:'alpha'},{mass:211,radio:true,halfLife:2,decay:'alpha'}],
                'Rn':[{mass:222,radio:true,halfLife:2,decay:'alpha'},{mass:220,radio:true,halfLife:1,decay:'alpha'}],
                'Fr':[{mass:223,radio:true,halfLife:2,decay:'beta'}],
                'Ra':[{mass:226,radio:true,halfLife:3,decay:'alpha'},{mass:228,radio:true,halfLife:2,decay:'beta'}],
                'Ac':[{mass:227,radio:true,halfLife:3,decay:'beta'},{mass:228,radio:true,halfLife:2,decay:'beta'}],
                'Th':[{mass:232,radio:true,halfLife:8,decay:'alpha'},{mass:230,radio:true,halfLife:6,decay:'alpha'},{mass:228,radio:true,halfLife:2,decay:'alpha'}],
                'Pa':[{mass:231,radio:true,halfLife:5,decay:'alpha'}],
                'U':[{mass:238,radio:true,halfLife:8,decay:'alpha'},{mass:235,radio:true,halfLife:7,decay:'alpha'},{mass:234,radio:true,halfLife:6,decay:'alpha'}]
            };
            // 默认稳定同位素质量数map
            const DEFAULT_ISOTOPE = {};
            for(const [k, list] of Object.entries(ISOTOPES)){
                const stable=list.find(i=>i.stable)||list[0];
                DEFAULT_ISOTOPE[k]=stable.mass;
            }

            class Piece {
                constructor(defKey, color, id, isotopeSpec) {
                    const def = PIECE_DEFS[defKey];
                    this.defKey = defKey; this.symbol = def.symbol;
                    this.Z = def.Z || 0; this.valence = def.valence;
                    this.baseValence = def.valence; this.electroneg = def.en;
                    this.period = def.period; this.group = def.group;
                    this.isHydrogenKing = def.isHK || false;
                    this.noble = def.noble || false;
                    this.lanthanide = def.lanthanide || false;
                    this.color = color; this.id = id; this.row = -1; this.col = -1;
                    this.sharedElectrons = 0; this.bonusElectrons = 0; this.bonusElectronRounds = 0;
                    this.charge = 0; this.chargeRounds = 0; this.stunned = false; this.stunRounds = 0;
                    this.decayCounter = 0; this.bondedWith = null;
                    // 同位素属性
                    if (isotopeSpec) {
                        this.mass = isotopeSpec.mass;
                        this.radioactive = isotopeSpec.radio || false;
                        this.halfLifeRounds = isotopeSpec.halfLife || 0;
                        this.decayMode = isotopeSpec.decay || null;
                        this.isotopeName = isotopeSpec.name || null;
                    } else {
                        this.mass = def.mass || DEFAULT_ISOTOPE[defKey] || 0;
                        this.radioactive = def.radio || false;
                        this.halfLifeRounds = def.halfLife || 0;
                        this.decayMode = def.decay || null;
                        this.isotopeName = null;
                    }
                }
                get totalElectrons() { return this.valence + this.sharedElectrons + this.bonusElectrons; }
                get effectiveMoveDirs() { return Math.min(this.totalElectrons, 8); }
                get effectiveMoveSteps() { return this.totalElectrons; }
                get isEvenPeriod() { return this.period % 2 === 0; }
                getPriorityDirections() {
                    const base = this.isEvenPeriod ? PRIORITY_EVEN : PRIORITY_ODD;
                    const colorFactor = this.color === COLOR_WHITE ? 1 : -1;
                    let dirs = base.map(([dr, dc]) => [dr * colorFactor, dc]);
                    // 根据棋子所在列位置左右镜向，左半区(col<4)保持原样，右半区(col>=4)左右反转
                    const colMirror = this.col < 4 ? 1 : -1;
                    dirs = dirs.map(([dr, dc]) => [dr, dc * colMirror]);
                    return dirs.slice(0, this.effectiveMoveDirs);
                }
            }

            class ChemissGame {
                constructor() {
                    this.board = []; this.pieces = []; this.whitePieces = []; this.blackPieces = [];
                    this.currentTurn = COLOR_WHITE; this.selectedPiece = null; this.legalMoves = [];
                    this.bonds = []; this.roundNumber = 1; this.gameOver = false; this.winner = null;
                    this.logEntries = [];
                    this.debugMode = false;
                    this.initBoard(); this.updateUI();
                    this.addLog('游戏开始！白方先行。');
                    this.addLog('离子键可直接吃子；共价/金属键需目标已键合且攻击者非键合伙伴。');
                }

                initBoard() {
                    this.board = Array.from({length:BOARD_SIZE},()=>Array(BOARD_SIZE).fill(null));
                    this.pieces=[]; this.whitePieces=[]; this.blackPieces=[]; this.bonds=[];
                    this.roundNumber=1; this.gameOver=false; this.winner=null;
                    this.selectedPiece=null; this.legalMoves=[]; this.logEntries=[];
                    let id = 0;
                    const place = (p, r, c) => {
                        p.row = r; p.col = c; this.board[r][c] = p;
                        this.pieces.push(p);
                        (p.color === COLOR_WHITE ? this.whitePieces : this.blackPieces).push(p);
                    };
                    ['O','P','Si','F','H','C','N','S'].forEach((k,i) => place(new Piece(k,COLOR_WHITE,id++),7,i));
                    ['Na','Na','Li','Li','Li','Li','Na','Na'].forEach((k,i) => place(new Piece(k,COLOR_WHITE,id++),6,i));
                    ['O','P','Si','F','H','C','N','S'].forEach((k,i) => place(new Piece(k,COLOR_BLACK,id++),0,i));
                    ['Na','Na','Li','Li','Li','Li','Na','Na'].forEach((k,i) => place(new Piece(k,COLOR_BLACK,id++),1,i));
                    this.rebuildAllBonds();
                }

                getPieceById(id) { return this.pieces.find(p => p.id === id); }

                getAdjacentPieces(row, col) {
                    const res = [];
                    for (const [dr, dc] of ALL_DIRS) {
                        const nr = row + dr, nc = col + dc;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            res.push(this.board[nr][nc]);
                        }
                    }
                    return res;
                }

                rebuildAllBonds() {
                    this.pieces.forEach(p => { p.sharedElectrons = 0; p.bondedWith = null; });
                    this.bonds = [];

                    // 收集所有可能的成键配对（去重：p1.id < p2.id）
                    const candidates = [];
                    for (const p of this.pieces) {
                        if (p.noble) continue; // 稀有气体不参与成键
                        const neighbors = this.getAdjacentPieces(p.row, p.col);
                        for (const n of neighbors) {
                            if (n.color === p.color) continue;
                            if (n.noble) continue; // 稀有气体不参与成键
                            if (p.id > n.id) continue; // 避免重复配对
                            const enDiff = Math.abs(p.electroneg - n.electroneg);
                            const bothNonMetal = p.group === NONMETAL && n.group === NONMETAL;
                            if (enDiff <= 1.7 || bothNonMetal) {
                                let type = 'covalent', sharedE = 0;
                                if (p.group === METAL && n.group === METAL) {
                                    type = 'metallic'; sharedE = 2;
                                } else if (bothNonMetal) {
                                    sharedE = Math.min(8 - p.valence, 8 - n.valence);
                                } else {
                                    const nonMetal = p.group === NONMETAL ? p : n;
                                    const other = nonMetal === p ? n : p;
                                    const defNon = 8 - nonMetal.valence;
                                    const defOther = other.symbol === 'H' ? 1 : 8 - other.valence;
                                    sharedE = Math.min(defNon, defOther);
                                }
                                candidates.push({ p1: p.id, p2: n.id, type, shared: sharedE, enDiff });
                            }
                        }
                    }

                    // 分离金属键和非金属键候选
                    const metallicCandidates = candidates.filter(c => c.type === 'metallic');
                    const covalentCandidates = candidates.filter(c => c.type !== 'metallic');

                    // 共价键：贪心按电负性差降序，每原子最多一根共价键
                    covalentCandidates.sort((a, b) => b.enDiff - a.enDiff);
                    const covBonded = new Set();
                    const applyBond = (c) => {
                        const p1 = this.getPieceById(c.p1);
                        const p2 = this.getPieceById(c.p2);
                        if (!p1 || !p2) return;
                        p1.sharedElectrons = Math.max(p1.sharedElectrons, c.shared);
                        p2.sharedElectrons = Math.max(p2.sharedElectrons, c.shared);
                        if (!p1.bondedWith) p1.bondedWith = [];
                        if (!p2.bondedWith) p2.bondedWith = [];
                        p1.bondedWith.push(p2.id);
                        p2.bondedWith.push(p1.id);
                        this.bonds.push({ p1: c.p1, p2: c.p2, type: c.type, shared: c.shared });
                    };
                    for (const c of covalentCandidates) {
                        if (covBonded.has(c.p1) || covBonded.has(c.p2)) continue;
                        covBonded.add(c.p1);
                        covBonded.add(c.p2);
                        applyBond(c);
                    }

                    // 金属键：全部应用（允许多原子簇）
                    for (const c of metallicCandidates) {
                        applyBond(c);
                    }

                    this.expandMetallicClusters();
                }

                expandMetallicClusters() {
                    const metallicBonds = this.bonds.filter(b => b.type === 'metallic');
                    if (metallicBonds.length === 0) return;
                    const parent = new Map();
                    const find = (x) => {
                        if (!parent.has(x)) parent.set(x, x);
                        if (parent.get(x) !== x) parent.set(x, find(parent.get(x)));
                        return parent.get(x);
                    };
                    const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) parent.set(ra, rb); };
                    for (const b of metallicBonds) union(b.p1, b.p2);
                    const clusters = new Map();
                    const allMetalIds = new Set(metallicBonds.flatMap(b => [b.p1, b.p2]));
                    for (const id of allMetalIds) {
                        const root = find(id);
                        if (!clusters.has(root)) clusters.set(root, []);
                        clusters.get(root).push(id);
                    }
                    for (const ids of clusters.values()) {
                        ids.forEach(id => {
                            const piece = this.getPieceById(id);
                            if (piece && piece.group === METAL) piece.sharedElectrons = Math.max(piece.sharedElectrons, 2);
                        });
                    }
                }

                removeAllBondsFor(piece) {
                    this.bonds = this.bonds.filter(b => b.p1 !== piece.id && b.p2 !== piece.id);
                    if (piece.bondedWith) {
                        for (const pid of piece.bondedWith) {
                            const other = this.getPieceById(pid);
                            if (other && other.bondedWith) {
                                other.bondedWith = other.bondedWith.filter(x => x !== piece.id);
                                if (other.bondedWith.length === 0) other.bondedWith = null;
                            }
                        }
                    }
                    piece.bondedWith = null;
                    piece.sharedElectrons = 0;
                }

                updateAllBonds() { this.rebuildAllBonds(); }

                canCapture(attacker, defender) {
                    if (attacker.color === defender.color) return false;
                    if (attacker.noble || defender.noble) return false; // 稀有气体不参与吃子
                    const enDiff = Math.abs(attacker.electroneg - defender.electroneg);
                    // 离子键：仅金属-非金属可无条件直接吃子
                    if (enDiff > 1.7) {
                        if ((attacker.group === METAL && defender.group === NONMETAL) ||
                            (attacker.group === NONMETAL && defender.group === METAL)) {
                            return true;
                        }
                        // 非金属-非金属高电负性差不能形成离子键，继续走共价键机制
                        if (attacker.group !== NONMETAL || defender.group !== NONMETAL) {
                            return false;
                        }
                    }
                    // 共价键/金属键机制：需目标已键合，且攻击者不是键合伙伴
                    if (!defender.bondedWith || defender.bondedWith.length === 0) return false;
                    if (attacker.bondedWith && attacker.bondedWith.includes(defender.id)) return false;
                    return !defender.bondedWith.includes(attacker.id);
                }

                getLegalMoves(piece) {
                    if (!piece || piece.stunned) return [];
                    const moves = [];
                    const dirs = piece.getPriorityDirections();
                    const maxSteps = piece.effectiveMoveSteps;
                    for (const [dr, dc] of dirs) {
                        for (let step = 1; step <= maxSteps; step++) {
                            const nr = piece.row + dr * step;
                            const nc = piece.col + dc * step;
                            if (nr < 0 || nr >= 8 || nc < 0 || nc >= 8) break;
                            const target = this.board[nr][nc];
                            if (target) {
                                if (target.color !== piece.color && this.canCapture(piece, target)) {
                                    moves.push({ row: nr, col: nc, isAttack: true, targetPiece: target });
                                }
                                break;
                            } else {
                                moves.push({ row: nr, col: nc, isAttack: false, targetPiece: null });
                            }
                        }
                    }
                    return moves;
                }

                movePiece(piece, toRow, toCol, isAttack, target) {
                    this.board[piece.row][piece.col] = null;
                    if (isAttack && target) this.handleCapture(piece, target);
                    piece.row = toRow; piece.col = toCol;
                    this.board[toRow][toCol] = piece;
                    this.updateAllBonds();
                }

                handleCapture(attacker, defender) {
                    const enDiff = Math.abs(attacker.electroneg - defender.electroneg);
                    const isIonic = enDiff > 1.7 &&
                        ((attacker.group === METAL && defender.group === NONMETAL) ||
                         (attacker.group === NONMETAL && defender.group === METAL));
                    this.addLog(`${attacker.symbol}(${attacker.color==='white'?'白':'黑'}) 吃掉了 ${defender.symbol}(${defender.color==='white'?'白':'黑'})`);
                    if (defender.isHydrogenKing) {
                        this.gameOver = true; this.winner = attacker.color;
                        this.addLog(`氢王(H)被吃，${attacker.color==='white'?'白方':'黑方'}获胜`);
                        this.removePiece(defender); return;
                    }
                    if (isIonic) {
                        attacker.bonusElectrons += defender.valence;
                        attacker.bonusElectronRounds = 6;
                        if (attacker.totalElectrons > 8) this.emitBetaRay(attacker);
                        this.addLog(`离子键捕获: ${attacker.symbol}获得+${defender.valence}电子(6回合)`);
                    } else {
                        this.addLog(`共价/金属键吃子，不获得额外电子`);
                    }
                    this.removePiece(defender);
                }

                emitBetaRay(source) {
                    const dir = ALL_DIRS[Math.floor(Math.random() * 8)];
                    this.animateRay(source.row, source.col, dir, 4, 'beta');
                    for (let s = 1; s <= 4; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const target = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'beta');
                            // 重核(Z≥90)有概率裂变
                            if (this.tryFissionOnHit(target, 'β射线')) break;
                            const change = Math.random() < 0.5 ? 1 : -1;
                            target.bonusElectrons = Math.max(0, target.bonusElectrons + change);
                            target.bonusElectronRounds = 6;
                            this.addLog(`β射线(离子键溢出)击中${this.nuclideText(target.symbol,target.mass)}，额外电子${change>0?'+1':'-1'}(6回合)`);
                            this.updateUI();
                            break;
                        }
                    }
                }

                resolveElectrostaticAttraction() {
                    const charged = this.pieces.filter(p => p.charge !== 0);
                    if (charged.length < 2) return;
                    let best = null, maxDiff = 0;
                    for (let i = 0; i < charged.length; i++)
                        for (let j = i+1; j < charged.length; j++)
                            if (charged[i].charge * charged[j].charge < 0) {
                                const diff = Math.abs(charged[i].charge - charged[j].charge);
                                if (diff > maxDiff) { maxDiff = diff; best = [charged[i], charged[j]]; }
                            }
                    if (!best) return;
                    const [p1, p2] = best;
                    const steps = Math.ceil(Math.abs(p1.charge - p2.charge) / 2);
                    if (steps <= 0) return;
                    let s1 = Math.floor(steps/2), s2 = Math.ceil(steps/2);
                    if (this.currentTurn === COLOR_WHITE && p1.color === COLOR_BLACK) s1 = Math.max(0, s1-1);
                    if (this.currentTurn === COLOR_BLACK && p1.color === COLOR_WHITE) s1 = Math.max(0, s1-1);
                    this.moveToward(p1, p2, s1);
                    this.moveToward(p2, p1, s2);
                    this.updateAllBonds();
                }

                moveToward(mover, target, steps) {
                    if (steps <= 0) return;
                    const dr = Math.sign(target.row - mover.row);
                    const dc = Math.sign(target.col - mover.col);
                    let cr = mover.row, cc = mover.col, rem = steps;
                    while (rem > 0) {
                        const nr = cr+dr, nc = cc+dc;
                        if (nr<0||nr>=8||nc<0||nc>=8) break;
                        if (this.board[nr][nc] && !(nr===target.row && nc===target.col)) { cr=nr; cc=nc; rem--; continue; }
                        if (nr===target.row && nc===target.col) break;
                        cr=nr; cc=nc; rem--;
                    }
                    if (cr!==mover.row || cc!==mover.col) {
                        this.board[mover.row][mover.col] = null;
                        mover.row=cr; mover.col=cc; this.board[cr][cc] = mover;
                    }
                }

                canGiveElectron(piece) {
                    if (!piece || piece.group !== METAL || piece.color !== this.currentTurn) return null;
                    return this.getAdjacentPieces(piece.row, piece.col)
                        .filter(n => n.color === piece.color && n.group === NONMETAL && n.charge === 0 && !n.noble);
                }

                giveElectron(metal, nonmetal) {
                    metal.charge=1; metal.chargeRounds=3;
                    nonmetal.charge=-1; nonmetal.chargeRounds=3;
                    nonmetal.bonusElectrons+=1; nonmetal.bonusElectronRounds=6;
                    this.addLog(`${metal.symbol} 给出1个电子给 ${nonmetal.symbol} → 阳离子/阴离子(6回合)`);
                }

                canNuclearTransform(piece) {
                    if (!piece || piece.symbol!=='Li' || piece.color!==this.currentTurn) return false;
                    return piece.color===COLOR_WHITE ? piece.row===0 : piece.row===7;
                }

                nuclearTransform(piece, newKey, isotopeSpec) {
                    if (!PIECE_DEFS[newKey] || newKey==='H') return;
                    const np = new Piece(newKey, piece.color, piece.id, isotopeSpec || null);
                    np.row=piece.row; np.col=piece.col;
                    this.board[piece.row][piece.col]=np;
                    const idx=this.pieces.indexOf(piece); if(idx>=0) this.pieces[idx]=np;
                    const arr=piece.color===COLOR_WHITE?this.whitePieces:this.blackPieces;
                    const arrIdx=arr.indexOf(piece); if(arrIdx>=0) arr[arrIdx]=np;
                    this.removeAllBondsFor(piece);
                    const isoLabel = isotopeSpec ? ` ${this.nuclideText(np.symbol,isotopeSpec.mass)}${isotopeSpec.name||''}` : '';
                    this.addLog(`Li核变为${isoLabel||np.symbol}${np.radioactive?' ['+np.decayMode+'衰变 t½:'+np.halfLifeRounds+'r]':''}`);
                    this.updateAllBonds();
                }

                // ========== 核衰变系统 ==========
                // ========== 射线动画 ==========
                // 播放射线动画：源格→路径格→目标格闪烁
                animateRay(sourceRow, sourceCol, dir, range, rayType) {
                    const cells = [];
                    for (let s = 0; s <= range; s++) {
                        const nr = sourceRow + dir[0] * s;
                        const nc = sourceCol + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                            cells.push([nr, nc]);
                        }
                    }
                    if (cells.length === 0) return;
                    // 源格发光
                    const srcCell = document.querySelector(`.board .cell[data-r="${cells[0][0]}"][data-c="${cells[0][1]}"]`);
                    if (srcCell) {
                        srcCell.classList.add('ray-source', `ray-${rayType}`);
                        setTimeout(() => srcCell.classList.remove('ray-source', `ray-${rayType}`), 500);
                    }
                    // 路径依次点亮
                    for (let i = 1; i < cells.length; i++) {
                        const [cr, cc] = cells[i];
                        setTimeout(() => {
                            const cell = document.querySelector(`.board .cell[data-r="${cr}"][data-c="${cc}"]`);
                            if (cell) {
                                cell.classList.add('ray-path', `ray-${rayType}`);
                                setTimeout(() => cell.classList.remove('ray-path', `ray-${rayType}`), 250);
                            }
                        }, i * 120);
                    }
                }

                // 目标格撞击动画
                animateImpact(row, col, rayType) {
                    setTimeout(() => {
                        const cell = document.querySelector(`.board .cell[data-r="${row}"][data-c="${col}"]`);
                        if (cell) {
                            cell.classList.add('ray-impact', `ray-${rayType}`);
                            setTimeout(() => cell.classList.remove('ray-impact', `ray-${rayType}`), 600);
                            // 棋子闪烁
                            const piece = cell.querySelector('.piece');
                            if (piece) {
                                piece.classList.add('ray-hit-flash');
                                setTimeout(() => piece.classList.remove('ray-hit-flash'), 500);
                            }
                        }
                    }, 100);
                }

                // 按Z查找可用的defKey（衰变产物查找）
                findKeyByZ(z) {
                    return Z_TO_KEY[z] || null;
                }

                // 核素符号格式化（Unicode上标数字，用于纯文本日志）
                nuclideText(sym, mass) {
                    const supDigits = {'0':'\u2070','1':'\u00B9','2':'\u00B2','3':'\u00B3','4':'\u2074','5':'\u2075','6':'\u2076','7':'\u2077','8':'\u2078','9':'\u2079'};
                    const massStr = String(mass).split('').map(c => supDigits[c]||c).join('');
                    return massStr + sym;
                }

                // 核素符号格式化（HTML上标，用于界面渲染）
                nuclideHTML(sym, mass) {
                    return `<sup>${mass}</sup>${sym}`;
                }

                // 将棋子变换为另一元素（保留位置、颜色、id，衰变产物使用默认同位素）
                transformPiece(piece, newKey) {
                    if (!PIECE_DEFS[newKey]) return null;
                    // 衰变产物使用默认稳定同位素
                    const np = new Piece(newKey, piece.color, piece.id, null);
                    np.row = piece.row; np.col = piece.col;
                    np.row = piece.row; np.col = piece.col;
                    np.charge = piece.charge; np.chargeRounds = piece.chargeRounds;
                    np.stunned = piece.stunned; np.stunRounds = piece.stunRounds;
                    np.bonusElectrons = piece.bonusElectrons; np.bonusElectronRounds = piece.bonusElectronRounds;
                    this.board[piece.row][piece.col] = np;
                    const idx = this.pieces.indexOf(piece); if (idx >= 0) this.pieces[idx] = np;
                    const arr = piece.color === COLOR_WHITE ? this.whitePieces : this.blackPieces;
                    const arrIdx = arr.indexOf(piece); if (arrIdx >= 0) arr[arrIdx] = np;
                    this.removeAllBondsFor(piece);
                    return np;
                }

                resolveRadioactiveDecay() {
                    const snapshot = [...this.pieces]; // 快照避免迭代中修改数组
                    for (const p of snapshot) {
                        if (!this.pieces.includes(p)) continue; // 可能已被移除
                        if (p.radioactive && p.halfLifeRounds > 0) {
                            p.decayCounter++;
                            if (p.decayCounter >= p.halfLifeRounds && Math.random() < 0.55) {
                                this.triggerDecay(p); p.decayCounter = 0;
                            }
                        }
                    }
                }

                triggerDecay(piece) {
                    const mode = piece.decayMode || 'alpha';
                    const dir = ALL_DIRS[Math.floor(Math.random() * 8)];
                    const rayType = mode === 'alpha' ? 'alpha' : mode === 'beta' ? 'beta' : 'gamma';
                    const range = mode === 'alpha' ? 2 : mode === 'beta' ? 4 : 8;
                    // 播放射线动画
                    this.animateRay(piece.row, piece.col, dir, range, rayType);
                    if (mode === 'alpha') {
                        // α衰变：Z-2, A-4, 发射α射线(射程2)
                        const newZ = piece.Z - 2;
                        const newKey = this.findKeyByZ(newZ);
                        if (newKey) {
                            const np = this.transformPiece(piece, newKey);
                            this.addLog(`${this.nuclideText(piece.symbol,piece.mass)} →α衰变→ ${np.symbol} + α射线`);
                            this.alphaRayEffect(np, dir);
                        } else {
                            this.addLog(`${this.nuclideText(piece.symbol,piece.mass)} α衰变，无对应产物，眩晕1回合`);
                            piece.stunned = true; piece.stunRounds = 1;
                        }
                    } else if (mode === 'beta') {
                        // β⁻衰变：Z+1, 发射β射线(射程4)
                        const newZ = piece.Z + 1;
                        const newKey = this.findKeyByZ(newZ);
                        if (newKey) {
                            const np = this.transformPiece(piece, newKey);
                            this.addLog(`${this.nuclideText(piece.symbol,piece.mass)} →β⁻衰变→ ${np.symbol} + β射线`);
                            this.betaRayEffect(np, dir);
                        } else {
                            this.addLog(`${this.nuclideText(piece.symbol,piece.mass)} β衰变，无对应产物，眩晕1回合`);
                            piece.stunned = true; piece.stunRounds = 1;
                        }
                    } else {
                        // γ衰变或其他
                        this.addLog(`${this.nuclideText(piece.symbol,piece.mass)} γ衰变 → 发射高能光子`);
                        this.gammaRayEffect(piece, dir);
                    }
                }

                // ========== 射线效果 ==========
                // 辅助：查找最接近指定质量数的同位素
                findClosestIsotope(elementKey, targetMass) {
                    const isos = ISOTOPES[elementKey] || [];
                    if (isos.length === 0) return null;
                    let best = isos[0], bestDiff = Math.abs((best.mass||0) - targetMass);
                    for (const iso of isos) {
                        const diff = Math.abs((iso.mass||0) - targetMass);
                        if (diff < bestDiff) { best = iso; bestDiff = diff; }
                    }
                    return best;
                }

                // 辅助：对重核(Z≥90)尝试诱发裂变，返回true表示发生了裂变
                tryFissionOnHit(target, rayName) {
                    if (target.Z >= 90 && Math.random() < 0.4) {
                        this.addLog(`${rayName}诱发${target.symbol}(Z=${target.Z})裂变`);
                        this.fissionEffect(target);
                        return true;
                    }
                    return false;
                }

                alphaRayEffect(source, dir) {
                    // α粒子(⁴He²⁺)射程2：击中目标可能被吸收，发生核嬗变 Z→Z+2
                    for (let s = 1; s <= 2; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const t = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'alpha');
                            // 重核(Z≥90)优先尝试裂变
                            if (this.tryFissionOnHit(t, 'α粒子')) break;
                            // 尝试α吸收嬗变: Z→Z+2, A→A+4
                            const newZ = t.Z + 2;
                            const newKey = this.findKeyByZ(newZ);
                            if (newKey && PIECE_DEFS[newKey]) {
                                const targetMass = t.mass + 4;
                                const iso = this.findClosestIsotope(newKey, targetMass);
                                if (iso) {
                                    const spec = iso.stable ?
                                        {mass:iso.mass, radio:false, halfLife:0, decay:null, name:iso.name||null} :
                                        {mass:iso.mass, radio:true, halfLife:iso.halfLife||3, decay:iso.decay||'alpha', name:iso.name||null};
                                    const np = this.transformPiece(t, newKey);
                                    np.mass = spec.mass; np.radioactive = spec.radio;
                                    np.halfLifeRounds = spec.halfLife; np.decayMode = spec.decay;
                                    np.isotopeName = spec.name;
                                    np.stunned = true; np.stunRounds = 1;
                                    const isoLabel = np.radioactive ? `[${this.nuclideText(np.symbol,np.mass)}]` : this.nuclideText(np.symbol,np.mass);
                                    this.addLog(`α粒子击中${this.nuclideText(t.symbol,t.mass)} → 吸收嬗变为${isoLabel}`);
                                } else {
                                    t.stunned = true; t.stunRounds = 1;
                                    this.addLog(`α射线击中${this.nuclideText(t.symbol,t.mass)}，无合适同位素，眩晕1回合`);
                                }
                            } else {
                                t.valence = Math.max(1, t.valence - 1);
                                t.stunned = true; t.stunRounds = 1;
                                this.addLog(`α射线击中${this.nuclideText(t.symbol,t.mass)}(Z=${t.Z})，无法嬗变，价电子-1`);
                            }
                            this.updateUI();
                            break;
                        }
                    }
                }

                betaRayEffect(source, dir) {
                    // β射线：射程4，击中目标价电子随机±1；重核可能裂变
                    for (let s = 1; s <= 4; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const t = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'beta');
                            // 重核(Z≥90)有概率裂变
                            if (this.tryFissionOnHit(t, 'β射线')) break;
                            const change = Math.random() < 0.5 ? 1 : -1;
                            t.bonusElectrons = Math.max(0, t.bonusElectrons + change);
                            t.bonusElectronRounds = 6;
                            this.addLog(`β射线击中${this.nuclideText(t.symbol,t.mass)}，额外电子${change > 0 ? '+1' : '-1'}(6回合)`);
                            this.updateUI();
                            break;
                        }
                    }
                }

                gammaRayEffect(source, dir) {
                    // γ射线：射程8，眩晕目标1回合；重核可能裂变(光致裂变)
                    for (let s = 1; s <= 8; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const t = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'gamma');
                            // 重核(Z≥90)有概率光致裂变
                            if (this.tryFissionOnHit(t, 'γ射线')) break;
                            t.stunned = true; t.stunRounds = 1;
                            this.addLog(`γ射线击中${this.nuclideText(t.symbol,t.mass)}，眩晕1回合`);
                            this.updateUI();
                            break;
                        }
                    }
                }

                fissionEffect(piece) {
                    // 重核裂变：Z≥90的元素裂变为两个较轻核素
                    if (piece.Z < 90) {
                        this.addLog(`${piece.symbol}尝试裂变失败，γ衰变`);
                        this.gammaRayEffect(piece, ALL_DIRS[Math.floor(Math.random() * 8)]);
                        return;
                    }
                    // 裂变产物为Z在30-60之间且有稳定同位素的元素
                    const fissionPool = Object.keys(PIECE_DEFS).filter(k => {
                        const d = PIECE_DEFS[k];
                        if (d.Z < 30 || d.Z > 60 || d.noble || d.isHK) return false;
                        const isos = ISOTOPES[k] || [];
                        return isos.some(i => i.stable);
                    });
                    const k1 = fissionPool[Math.floor(Math.random() * fissionPool.length)];
                    let k2 = fissionPool[Math.floor(Math.random() * fissionPool.length)];
                    while (k2 === k1 && fissionPool.length > 1) k2 = fissionPool[Math.floor(Math.random() * fissionPool.length)];
                    const cells = this.getAdjacentEmptyCells(piece.row, piece.col);
                    const makeIsotope = (k) => {
                        const isos = ISOTOPES[k] || [];
                        const stable = isos.find(i => i.stable) || isos[0] || {mass:0};
                        return {mass:stable.mass, radio:!!stable.radio, halfLife:stable.halfLife||0, decay:stable.decay||null, name:stable.name||null};
                    };
                    if (cells.length > 0) {
                        const iso1 = makeIsotope(k1);
                        const np1 = new Piece(k1, piece.color, this.getNextId(), iso1);
                        np1.row = cells[0].row; np1.col = cells[0].col; this.placePiece(np1);
                        this.addLog(` 裂变产物1：${this.nuclideText(np1.symbol,np1.mass)}(Z=${np1.Z})`);
                        if (cells.length > 1) {
                            const iso2 = makeIsotope(k2);
                            const np2 = new Piece(k2, piece.color, this.getNextId(), iso2);
                            np2.row = cells[1].row; np2.col = cells[1].col; this.placePiece(np2);
                            this.addLog(` 裂变产物2：${this.nuclideText(np2.symbol,np2.mass)}(Z=${np2.Z})`);
                        }
                    }
                    this.addLog(` ${piece.symbol}(Z=${piece.Z})发生裂变！`);
                    this.removePiece(piece);
                }

                getAdjacentEmptyCells(r,c){ const res=[]; for(const[d,e]of ALL_DIRS){ const nr=r+d,nc=c+e; if(nr>=0&&nr<8&&nc>=0&&nc<8&&!this.board[nr][nc]) res.push({row:nr,col:nc}); } return res; }
                getNextId(){ return Math.max(0,...this.pieces.map(p=>p.id))+1; }
                placePiece(p){ this.board[p.row][p.col]=p; this.pieces.push(p); (p.color===COLOR_WHITE?this.whitePieces:this.blackPieces).push(p); }
                removePiece(p){
                    if(!p)return;
                    this.board[p.row][p.col]=null;
                    const idx=this.pieces.indexOf(p); if(idx>=0) this.pieces.splice(idx,1);
                    const arr=p.color===COLOR_WHITE?this.whitePieces:this.blackPieces;
                    const ai=arr.indexOf(p); if(ai>=0) arr.splice(ai,1);
                    this.removeAllBondsFor(p);
                }

                endTurn(){
                    for(const p of this.pieces){
                        if(p.bonusElectronRounds>0){ p.bonusElectronRounds--; if(p.bonusElectronRounds===0){ p.bonusElectrons=0; p.charge=0; p.chargeRounds=0; } }
                        if(p.chargeRounds>0){ p.chargeRounds--; if(p.chargeRounds===0) p.charge=0; }
                        if(p.stunRounds>0){ p.stunRounds--; if(p.stunRounds===0) p.stunned=false; }
                    }
                    this.updateAllBonds();
                    this.currentTurn=this.currentTurn===COLOR_WHITE?COLOR_BLACK:COLOR_WHITE;
                    this.roundNumber++;
                    this.selectedPiece=null; this.legalMoves=[];
                    this.resolveElectrostaticAttraction(); this.resolveRadioactiveDecay();
                    this.updateAllBonds();
                    this.updateUI();
                    if(this.gameOver) this.showVictory();
                }

                handleCellClick(row,col){
                    if(this.gameOver)return;
                    // ===== Debug模式：自由移动棋子 =====
                    if(this.debugMode){
                        const piece=this.board[row][col];
                        if(this.selectedPiece){
                            // 已选中棋子：点击任意格移动（可吃子、可叠写）
                            if(piece && piece.id===this.selectedPiece.id){
                                // 点击自身取消选中
                                this.selectedPiece=null; this.legalMoves=[]; this.updateUI(); return;
                            }
                            const fromRow2 = this.selectedPiece.row, fromCol2 = this.selectedPiece.col;
                            if(piece) this.removePiece(piece); // debug下直接移除目标棋子
                            this.board[this.selectedPiece.row][this.selectedPiece.col]=null;
                            this.selectedPiece.row=row; this.selectedPiece.col=col;
                            this.board[row][col]=this.selectedPiece;
                            this.updateAllBonds();
                            this.selectedPiece=null; this.legalMoves=[];
                            this.addLog(`[DEBUG] 移动了${this.board[row][col].symbol}到(${row},${col})`);
                            this._animMovedInfo = {
                                pieceId: this.board[row][col].id,
                                sdx: (fromCol2 - col) * 100 + '%',
                                sdy: (fromRow2 - row) * 100 + '%'
                            };
                            this.updateUI();
                        } else {
                            // 未选中：点任意棋子选中（不限颜色、不限眩晕）
                            if(piece){
                                this.selectedPiece=piece; this.legalMoves=[]; this.updateUI();
                            }
                        }
                        return;
                    }
                    // ===== 正常模式 =====
                    const move=this.legalMoves.find(m=>m.row===row&&m.col===col);
                    if(move&&this.selectedPiece){ this.executeMove(this.selectedPiece,move); return; }
                    const piece=this.board[row][col];
                    if(piece&&piece.color===this.currentTurn&&!piece.stunned){
                        this.selectedPiece=piece; this.legalMoves=this.getLegalMoves(piece); this.updateUI();
                        // 选中底线Li自动弹出升变面板
                        if(piece.symbol==='Li' && this.canNuclearTransform(piece)){
                            this.showNuclearChoices(piece);
                        }
                    } else { this.selectedPiece=null; this.legalMoves=[]; this.updateUI(); }
                }

                executeMove(piece,move){
                    const fromRow = piece.row, fromCol = piece.col;
                    const captured = move.isAttack ? move.targetPiece : null;
                    this.movePiece(piece,move.row,move.col,move.isAttack,captured);
                    // 动画：记录位移矢量，供CSS translate 使用
                    this._animMovedInfo = {
                        pieceId: piece.id,
                        sdx: (fromCol - move.col) * 100 + '%',
                        sdy: (fromRow - move.row) * 100 + '%'
                    };
                    if(this.gameOver){ this.updateUI(); this.showVictory(); return; }
                    // Li移动后到达底线 → 自动弹出升变面板 (debug模式跳过)
                    if(!this.debugMode && piece.symbol==='Li' && this.canNuclearTransform(piece)){
                        this.selectedPiece=piece; this.legalMoves=[];
                        this.updateUI(); this.showNuclearChoices(piece);
                        return;
                    }
                    this.endTurn();
                }

                proposeDraw(){ if(this.gameOver)return; if(confirm('双方同意和棋吗？')){ this.gameOver=true; this.winner='draw'; this.addLog('双方同意和棋'); this.updateUI(); this.showVictory(); } }

                triggerGiveElectron(){
                    if(this.gameOver||!this.selectedPiece)return;
                    const targets=this.canGiveElectron(this.selectedPiece);
                    if(!targets||targets.length===0){ this.addLog('无法给电子'); return; }
                    if(targets.length===1){ this.giveElectron(this.selectedPiece,targets[0]); this.selectedPiece=null; this.legalMoves=[]; this.endTurn(); }
                    else this.showGiveElectronChoices(this.selectedPiece,targets);
                }

                showGiveElectronChoices(metal,targets){
                    const modal=document.getElementById('nuclearModal'), content=document.getElementById('nuclearModalContent');
                    content.innerHTML='<h3>选择给电子目标</h3>';
                    targets.forEach(t=>{
                        const btn=document.createElement('button'); btn.className='choice-btn'; btn.textContent=`${t.symbol} (${t.row},${t.col})`;
                        btn.onclick=()=>{ this.giveElectron(metal,t); this.selectedPiece=null; this.legalMoves=[]; closeModal(modal); this.endTurn(); };
                        content.appendChild(btn);
                    });
                    const cls=document.createElement('button'); cls.className='btn-close'; cls.textContent='取消'; cls.onclick=()=>closeModal(modal); content.appendChild(cls);
                    modal.classList.add('active');
                }

                triggerNuclearTransform(){
                    if(this.gameOver||!this.selectedPiece||!this.canNuclearTransform(this.selectedPiece)){ this.addLog('请选择到达对方底线的Li棋子'); return; }
                    this.showNuclearChoices(this.selectedPiece);
                }

                showNuclearChoices(piece){
                    const modal=document.getElementById('nuclearModal'), content=document.getElementById('nuclearModalContent');
                    content.innerHTML='<h3 style="margin:0 0 8px;">Li核变 — 选择目标核素</h3>';

                    // 构建网格数据：{period,group}→cell
                    const grid = {}; // "row-col" → elementKey
                    for(const [k, pos] of Object.entries(PT_POS)){
                        grid[`${pos[0]}-${pos[1]}`]=k;
                    }

                    // 移动端水平滚动包装
                    const gridWrapper=document.createElement('div');
                    gridWrapper.className='pt-grid-wrapper';

                    const container=document.createElement('div');
                    container.className='pt-grid';

                    // 行标签
                    const rowLabels=['','1','2','3','4','5','6','7','镧系','锕系'];
                    const maxRows=9, maxCols=18;

                    for(let row=1; row<=maxRows; row++){
                        // 行标签单元格
                        const label=document.createElement('div');
                        label.className='pt-row-label';
                        label.textContent=rowLabels[row]||'';
                        container.appendChild(label);

                        for(let col=1; col<=maxCols; col++){
                            const cell=document.createElement('div');
                            const key=grid[`${row}-${col}`];
                            if(key && PIECE_DEFS[key]){
                                const d=PIECE_DEFS[key];
                                if(d.isHK){
                                    // H显示但不可选
                                    cell.className='pt-cell pt-hk';
                                    cell.title='H — 不可升变';
                                    cell.innerHTML=`<span class="pt-sym">H</span><span class="pt-z">1</span>`;
                                } else {
                                    const cls=d.group===METAL?'pt-metal':(d.noble?'pt-noble':'pt-nonmetal');
                                    cell.className=`pt-cell ${cls}`;
                                    cell.title=`${d.symbol} Z=${d.Z} 价:${d.valence} EN:${d.en}${d.radio?' [放射]':''}${d.noble?' 稀有气体':''}`;
                                    cell.innerHTML=`<span class="pt-sym">${d.symbol}</span><span class="pt-z">${d.Z}</span>${d.radio?'<span class="pt-rad">&bull;</span>':''}`;
                                    cell.onclick=()=>{
                                        this.showIsotopeChoices(piece, key);
                                    };
                                }
                            } else {
                                cell.className='pt-cell pt-missing';
                            }
                            container.appendChild(cell);
                        }
                    }

                    content.appendChild(gridWrapper);
                    gridWrapper.appendChild(container);

                    // 图例
                    const legend=document.createElement('div');
                    legend.style.cssText='margin-top:10px;font-size:0.7em;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;';
                    legend.innerHTML=`
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#fff3e0;border:1px solid #ffcc80;border-radius:2px;"></span>金属</span>
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:2px;"></span>非金属</span>
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#f3e5f5;border:1px solid #ce93d8;border-radius:2px;"></span>稀有气体</span>
                        <span style="display:flex;align-items:center;gap:3px;">&bull; 放射性</span>
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#ffebee;border:1px solid #ef9a9a;border-radius:2px;"></span>H(不可选)</span>
                    `;
                    content.appendChild(legend);

                    const cls=document.createElement('button');
                    cls.className='btn-close'; cls.textContent='取消';
                    cls.onclick=()=>closeModal(modal);
                    content.appendChild(cls);
                    modal.classList.add('active');
                }

                showIsotopeChoices(piece, elementKey){
                    const modal=document.getElementById('nuclearModal'), content=document.getElementById('nuclearModalContent');
                    const d=PIECE_DEFS[elementKey];
                    const isotopes=ISOTOPES[elementKey]||[];

                    // 移除旧弹窗（如有）
                    const oldPopup=content.querySelector('.iso-popup-overlay');
                    if(oldPopup) oldPopup.remove();

                    const overlay=document.createElement('div');
                    overlay.className='iso-popup-overlay';
                    overlay.addEventListener('click', (e) => { if(e.target===overlay) overlay.remove(); });

                    const popup=document.createElement('div');
                    popup.className='iso-popup';

                    const metaParts=[`Z=${d.Z}`,`价电子:${d.valence}`,`EN:${d.en}`];
                    if(d.group===METAL) metaParts.push('金属');
                    if(d.noble) metaParts.push('稀有气体');

                    popup.innerHTML=`
                        <div class="iso-popup-title">选择同位素</div>
                        <div class="iso-popup-element">${d.symbol}</div>
                        <div class="iso-popup-meta">${metaParts.join(' · ')}</div>
                        <div class="iso-cards" id="isoCardsContainer"></div>
                        <div class="iso-popup-actions">
                            <button class="choice-btn" id="isoBackBtn">返回周期表</button>
                        </div>
                    `;
                    overlay.appendChild(popup);
                    content.appendChild(overlay);

                    const cardsContainer=popup.querySelector('#isoCardsContainer');
                    isotopes.forEach(iso=>{
                        const isStable=iso.stable||false;
                        const card=document.createElement('div');
                        card.className='iso-card '+(isStable?'iso-stable':'iso-radio');
                        const symHTML=iso.name
                            ? `<sup>${iso.mass}</sup>${d.symbol}<span style="font-size:0.6em;">(${iso.name})</span>`
                            : `<sup>${iso.mass}</sup>${d.symbol}`;
                        card.innerHTML=`
                            <div class="iso-nuclide">${symHTML}</div>
                            <div class="iso-detail">${isStable?'稳定':(iso.decay||'?')+'衰变'}</div>
                            ${!isStable?`<div class="iso-detail">t½:${iso.halfLife||'?'}r</div>`:''}
                            <div class="iso-mass-badge">A=${iso.mass}</div>
                        `;
                        card.addEventListener('click', ()=>{
                            const spec=isStable?{mass:iso.mass,radio:false,halfLife:0,decay:null,name:iso.name||null}
                                :{mass:iso.mass,radio:true,halfLife:iso.halfLife||3,decay:iso.decay||'alpha',name:iso.name||null};
                            this.nuclearTransform(piece,elementKey,spec);
                            this.selectedPiece=null; this.legalMoves=[];
                            closeModal(modal); this.endTurn();
                        });
                        cardsContainer.appendChild(card);
                    });

                    popup.querySelector('#isoBackBtn').addEventListener('click', ()=>{ overlay.remove(); });
                }

                showVictory(){
                    const icon = document.getElementById('victoryIcon');
                    const title = document.getElementById('victoryTitle');
                    const winner = document.getElementById('victoryWinner');
                    const subtitle = document.getElementById('victorySubtitle');
                    const roundInfo = `第 ${this.roundNumber} 回合`;
                    if(this.winner==='draw'){
                        icon.textContent = '\u2014'; // em dash
                        title.textContent = '对局结束';
                        winner.textContent = '和棋';
                        winner.className = 'victory-winner win-draw';
                        subtitle.textContent = `双方握手言和 · ${roundInfo}`;
                    } else {
                        const isWhite = this.winner==='white';
                        icon.textContent = isWhite ? '\u25CB' : '\u25CF'; // white/black circle
                        title.textContent = '对局结束';
                        winner.textContent = isWhite ? '白方获胜' : '黑方获胜';
                        winner.className = 'victory-winner ' + (isWhite ? 'win-white' : 'win-black');
                        subtitle.textContent = `氢王(H)被吃 · ${roundInfo}`;
                    }
                    document.getElementById('victoryOverlay').classList.add('active');
                }

                resetGame(){
                    document.getElementById('victoryOverlay').classList.remove('active');
                    closeModal(document.getElementById('nuclearModal'));
                    closeModal(document.getElementById('rulesModal'));
                    this.initBoard(); this.currentTurn=COLOR_WHITE; this.updateUI(); this.addLog('游戏已重置！白方先行。');
                }

                addLog(msg){ this.logEntries.push({msg,round:this.roundNumber}); if(this.logEntries.length>80) this.logEntries.shift(); }

                // 动画状态标记
                _animMovedInfo = null;

                updateUI(){ this.renderBoard(); requestAnimationFrame(() => this.updateSidePanel()); }

                renderBoard(){
                    const boardEl=document.getElementById('board');
                    const frag = document.createDocumentFragment();
                    for(let r=0;r<8;r++) for(let c=0;c<8;c++){
                        const cell=document.createElement('div');
                        cell.className='cell ' + ((r+c)%2===0?'white-cell':'black-cell');
                        cell.dataset.r = r; cell.dataset.c = c;
                        cell.addEventListener('click',()=>this.handleCellClick(r,c));
                        if(this.selectedPiece&&this.selectedPiece.row===r&&this.selectedPiece.col===c) cell.classList.add('highlight-selected');
                        const move=this.legalMoves.find(m=>m.row===r&&m.col===c);
                        if(move) cell.classList.add(move.isAttack?'attack-move':'legal-move');
                        const piece=this.board[r][c];
                        if(piece){
                            if(piece.bondedWith?.length) cell.classList.add('bonded-cell');
                            if(piece.stunned) cell.classList.add('stunned-cell');
                            const wrapper=document.createElement('div'); wrapper.className='piece-wrapper';
                            const dirs=piece.getPriorityDirections();
                            const radPct = 38;
                            dirs.forEach(([dr,dc])=>{
                                const angle=-Math.atan2(-dr,dc);
                                const dot=document.createElement('div');
                                dot.className='direction-dot';
                                const dotColor = piece.color === COLOR_WHITE ? '#1a1a1a' : '#f2f2f2';
                                dot.style.background = dotColor;
                                dot.style.boxShadow = `0 0 4px ${dotColor}`;
                                dot.style.left = (50 + Math.cos(angle) * radPct) + '%';
                                dot.style.top  = (50 + Math.sin(angle) * radPct) + '%';
                                wrapper.appendChild(dot);
                            });
                            // 动画：wrapper整体平移（棋子+方向点+电荷标签一起运动）
                            if (this._animMovedInfo && piece.id === this._animMovedInfo.pieceId) {
                                wrapper.classList.add('just-moved');
                                wrapper.style.setProperty('--sdx', this._animMovedInfo.sdx);
                                wrapper.style.setProperty('--sdy', this._animMovedInfo.sdy);
                            }
                            const pieceEl=document.createElement('div');
                            pieceEl.className='piece ' + (piece.color===COLOR_WHITE?'white-piece':'black-piece');
                            const massLabel = piece.mass ? `<sup style="font-size:0.5em;">${piece.mass}</sup>` : '';
                            pieceEl.innerHTML=`<span class="symbol">${massLabel}${piece.symbol}</span><span class="info-tiny">${piece.electroneg.toFixed(1)}</span>`;
                            if(piece.charge>0){ const cm=document.createElement('span'); cm.className='charge-mark charge-cation'; cm.textContent='+'; pieceEl.appendChild(cm); }
                            else if(piece.charge<0){ const cm=document.createElement('span'); cm.className='charge-mark charge-anion'; cm.textContent='-'; pieceEl.appendChild(cm); }
                            if(piece.stunned){ const si=document.createElement('span'); si.className='stun-icon'; si.textContent='\u00D7'; pieceEl.appendChild(si); }
                            if(piece.bonusElectrons>0){ const bo=document.createElement('span'); bo.style.cssText='position:absolute;bottom:-8px;left:2px;font-size:0.62em;color:#b0908a;text-shadow:none;font-weight:700;'; bo.textContent='\u00D7'+piece.bonusElectronRounds; pieceEl.appendChild(bo); }
                            if(piece.radioactive){ const ra=document.createElement('span'); ra.style.cssText='position:absolute;top:0px;left:1px;font-size:0.85em;font-weight:900;color:#b8a0c4;text-shadow:0 0 3px rgba(184,160,196,0.5);'; ra.textContent='\u2022'; pieceEl.appendChild(ra); }
                            wrapper.appendChild(pieceEl);
                            cell.appendChild(wrapper);
                        }
                        frag.appendChild(cell);
                    }
                    boardEl.replaceChildren(frag);
                    // 清除一次性动画标记
                    this._animMovedInfo = null;
                }

                updateSidePanel(){
                    const ti=document.getElementById('turnIndicator');
                    if(this.gameOver){
                        ti.textContent=this.winner==='draw'?'和棋':`${this.winner==='white'?'白方':'黑方'}获胜`;
                        ti.className='turn-indicator '+(this.winner==='white'?'turn-white':'turn-black');
                    } else {
                        ti.textContent=this.currentTurn===COLOR_WHITE?'白方回合':'黑方回合';
                        ti.className='turn-indicator '+(this.currentTurn===COLOR_WHITE?'turn-white':'turn-black');
                    }
                    document.getElementById('roundCounter').textContent=`回合: ${this.roundNumber}`;
                    const selInfo=document.getElementById('selectedInfo');
                    if(this.selectedPiece){
                        const p=this.selectedPiece;
                        const isotopeInfo = p.radioactive ? ` ${this.nuclideText(p.symbol,p.mass)}` : (p.isotopeName ? ` ${this.nuclideText(p.symbol,p.mass)}(${p.isotopeName})` : '');
                        selInfo.innerHTML=`选中: <b>${p.symbol}</b> (${p.color==='white'?'白':'黑'}) Z=${p.Z}${isotopeInfo}<br>价:${p.valence} 总电子:${p.totalElectrons} EN:${p.electroneg.toFixed(2)}<br>方向:${p.effectiveMoveDirs} 步数:${p.effectiveMoveSteps}<br>电荷:${p.charge>0?'+'+p.charge:p.charge<0?p.charge:'0'} ${p.stunned?'[眩晕]':''}${p.noble?' [稀有气体]':''}<br>额外电子:${p.bonusElectrons}(${p.bonusElectronRounds}r)${p.radioactive?' ['+p.decayMode+'衰变 t½:'+p.halfLifeRounds+'r '+this.nuclideText(p.symbol,p.mass)+']':''}`;
                    } else selInfo.textContent='未选中棋子';
                    const bl=document.getElementById('bondList');
                    bl.innerHTML=this.bonds.length?this.bonds.map(b=>{
                        const p1=this.getPieceById(b.p1), p2=this.getPieceById(b.p2);
                        if(!p1||!p2)return'';
                        return `<div class="bond-item">${b.type==='metallic'?'金属键':'共价键'}: ${p1.symbol}(${p1.color==='white'?'白':'黑'})↔${p2.symbol}(${p2.color==='white'?'白':'黑'}) [+${b.shared}e⁻]</div>`;
                    }).filter(s=>s).join(''):'暂无键合';
                    const lp=document.getElementById('logPanel');
                    lp.innerHTML=this.logEntries.slice(-25).map(l=>`<div class="log-entry">[R${l.round}] ${l.msg}</div>`).join('');
                    lp.scrollTop=lp.scrollHeight;
                    document.getElementById('btnGiveElectron').style.display=(this.selectedPiece&&this.canGiveElectron(this.selectedPiece)?.length)?'block':'none';
                    document.getElementById('btnNuclear').style.display=(this.selectedPiece&&this.canNuclearTransform(this.selectedPiece))?'block':'none';
                }
            }

            const game = new ChemissGame();
            window.game = game;

            // 带动画的modal关闭
            function closeModal(overlay) {
                if (!overlay.classList.contains('active')) return;
                overlay.classList.add('closing');
                setTimeout(() => {
                    overlay.classList.remove('active', 'closing');
                }, 200);
            }

            document.getElementById('victoryOverlay').addEventListener('click',function(e){ if(e.target===this){ this.classList.remove('active'); game.resetGame(); } });
            document.getElementById('nuclearModal').addEventListener('click',function(e){ if(e.target===this) closeModal(this); });

            // ========== 设置图标栏逻辑 ==========
            const btnSettingsToggle = document.getElementById('btnSettingsToggle');
            const settingsRow = document.getElementById('settingsRow');
            const btnDarkMode = document.getElementById('btnDarkMode');
            const btnDebug = document.getElementById('btnDebug');
            const btnRules = document.getElementById('btnRules');

            let darkMode = false;
            let debugMode = false;

            // 齿轮按钮：展开/折叠设置行
            btnSettingsToggle.addEventListener('click', () => {
                settingsRow.classList.toggle('hidden');
            });

            // 夜间模式
            btnDarkMode.addEventListener('click', () => {
                darkMode = !darkMode;
                document.body.classList.toggle('dark-mode', darkMode);
                btnDarkMode.classList.toggle('active', darkMode);
            });

            // Debug模式
            btnDebug.addEventListener('click', () => {
                debugMode = !debugMode;
                game.debugMode = debugMode;
                document.body.classList.toggle('debug-active', debugMode);
                btnDebug.classList.toggle('active', debugMode);
                game.selectedPiece = null; game.legalMoves = [];
                game.addLog(debugMode ? '[DEBUG] Debug模式开启 — 点击任意棋子自由移动' : '[DEBUG] Debug模式关闭');
                game.updateUI();
            });

            // 规则弹窗
            btnRules.addEventListener('click', () => {
                showRulesModal();
            });

            function showRulesModal() {
                const modal = document.getElementById('rulesModal');
                // 已打开则关闭（二次点击切换）
                if (modal.classList.contains('active')) {
                    closeModal(modal);
                    return;
                }
                const content = document.getElementById('rulesModalContent');
                content.innerHTML = `<h3>化学棋 Chemiss 规则</h3>
<div style="text-align:left;font-size:0.82em;line-height:1.7;max-height:70vh;overflow-y:auto;padding-right:4px;">
<h4 style="color:#b0908a;margin:10px 0 4px;">一、游戏目标</h4>
<p>吃掉对方的<b>氢王(H)</b>棋子即获胜。双方可协商和棋。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">二、棋盘与棋子</h4>
<p>8×8棋盘。白方（下方）先行。初始各16枚棋子：H×1, C×1, N×1, O×1, F×1, Si×1, P×1, S×1, Li×4, Na×4。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">三、移动规则</h4>
<p>每回合移动己方1枚棋子。移动方向数=当前总电子数(上限8)，移动格数=总电子数。方向受周期奇偶、列位置、阵营影响。</p>
<p>棋子周围圆点表示当前可移动方向。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">四、成键与吃子</h4>
<p><b>离子键吃子</b>：金属-非金属且电负性差>1.7，直接吃，攻击方获得防御方全部价电子(3回合)。溢出>8电子发射β射线。</p>
<p><b>共价/金属键吃子</b>：目标必须已键合，攻击者不能是键合伙伴。相邻异色棋子自动成键。共价键每原子限1根，金属键可形成多原子簇。</p>
<p><b>稀有气体</b>：不参与任何键合，不能吃子也不能被吃。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">五、特殊能力</h4>
<p><b>电性吸引</b>：每回合开始，异号电荷棋子自动互相靠近。</p>
<p><b>金属给电子</b>：金属给相邻己方非金属1个电子→阳离子/阴离子(3回合)。</p>
<p><b>Li核变</b>：Li到达对方底线可变为周期表任意元素(选同位素)。</p>
<p><b>放射性衰变</b>：放射性同位素按半衰期概率触发α/β/γ衰变，发射射线。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">六、射线效果</h4>
<p>α射线(射程2)：目标Z+2吸收嬗变，或价电子-1；重核(Z≥90)可裂变。</p>
<p>β射线(射程4)：目标价电子随机±1(3回合)；重核可裂变。</p>
<p>γ射线(射程8)：目标眩晕1回合；重核可裂变。</p>
<p>裂变：Z≥90元素消失，相邻空格生成2个Z30-60的裂变产物。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">七、界面说明</h4>
<p>棋子标注：符号、质量数、电负性。周围圆点=移动方向。键合高亮边框、眩晕粉红光晕、阳离子/阴离子角标、放射性标识。</p>
</div>`;
                modal.classList.add('active');
            }
            document.getElementById('rulesModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal(this);
            });

            console.log(' 化学棋 Chemiss 已就绪！');
        })();
    </script>
</body>
</html>
