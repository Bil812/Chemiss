                            else score += tgt.Z * 100;
                        }
                        score += 5000;
                    }
                    const histKey = `${piece.id}-${move.row}-${move.col}`;
                    score += (this._historyTable[histKey] || 0);
                    if (this._killerMoves[0] && this._killerMoves[0].pieceId === piece.id &&
                        this._killerMoves[0].row === move.row && this._killerMoves[0].col === move.col) score += 3000;
                    if (this._killerMoves[1] && this._killerMoves[1].pieceId === piece.id &&
                        this._killerMoves[1].row === move.row && this._killerMoves[1].col === move.col) score += 2000;
                    const dist = Math.abs(move.row-piece.row)+Math.abs(move.col-piece.col);
                    score += dist * 2;
                    return score;
                }

                _orderMoves(moves) {
                    moves.forEach(m => { m._sortScore = this._scoreMove(m.piece, m.move); });
                    moves.sort((a, b) => b._sortScore - a._sortScore);
                }

                _storeKiller(piece, move) {
                    const entry = { pieceId: piece.id, row: move.row, col: move.col };
                    if (!this._killerMoves[0] || this._killerMoves[0].pieceId !== piece.id ||
                        this._killerMoves[0].row !== move.row || this._killerMoves[0].col !== move.col) {
                        this._killerMoves[1] = this._killerMoves[0];
                        this._killerMoves[0] = entry;
                    }
                }

                quiescenceSearch(alpha, beta, isMaximizing, qDepth) {
                    if (qDepth === undefined) qDepth = 6;
                    const standPat = isMaximizing ? this.evaluate() : -this.evaluate();
                    if (standPat >= beta) return beta;
                    if (qDepth <= 0) return standPat;
                    if (standPat > alpha) alpha = standPat;
                    const allMoves = this.generateMoves();
                    const captures = allMoves.filter(m => m.move.isAttack);
                    if (captures.length === 0) return standPat;
                    this._orderMoves(captures);
                    if (isMaximizing) {
                        for (const { piece, move } of captures) {
                            const tgt = this.game.board[move.row][move.col];
                            if (!tgt) continue;
                            const snapshot = this._snapshot();
                            this._executeTemp(piece, move);
                            const score = this.quiescenceSearch(alpha, beta, false, qDepth - 1);
                            this._restore(snapshot);
                            if (score > alpha) alpha = score;
                            if (alpha >= beta) break;
                        }
                    } else {
                        for (const { piece, move } of captures) {
                            const tgt = this.game.board[move.row][move.col];
                            if (!tgt) continue;
                            const snapshot = this._snapshot();
                            this._executeTemp(piece, move);
                            const score = this.quiescenceSearch(alpha, beta, true, qDepth - 1);
                            this._restore(snapshot);
                            if (score < beta) beta = score;
                            if (alpha >= beta) break;
                        }
                    }
                    return isMaximizing ? alpha : beta;
                }

                search(depth, alpha, beta, isMaximizing, ply) {
                    if (this.game.gameOver) {
                        return isMaximizing ? this.evaluate() : -this.evaluate();
                    }
                    const boardKey = this._boardHash();
                    const ttEntry = this._transpositionTable.get(boardKey);
                    if (ttEntry && ttEntry.depth >= depth) {
                        if (ttEntry.flag === 'exact') return ttEntry.score;
                        if (ttEntry.flag === 'lower' && ttEntry.score >= beta) return ttEntry.score;
                        if (ttEntry.flag === 'upper' && ttEntry.score <= alpha) return ttEntry.score;
                    }
                    if (depth <= 0) {
                        return this.quiescenceSearch(alpha, beta, isMaximizing);
                    }
                    const moves = this.generateMoves();
                    if (moves.length === 0) return this.evaluate() * (isMaximizing ? 1 : -1);
                    this._orderMoves(moves);
                    let bestScore, originalAlpha = alpha;
                    if (isMaximizing) {
                        bestScore = -Infinity;
                        for (let i = 0; i < moves.length; i++) {
                            const { piece, move } = moves[i];
                            const snapshot = this._snapshot();
                            this._executeTemp(piece, move);
                            let score;
                            if (i === 0) {
                                score = this.search(depth - 1, alpha, beta, false, ply + 1);
                            } else {
                                // PVS: zero-window search first
                                score = this.search(depth - 1, alpha, alpha + 1, false, ply + 1);
                                if (score > alpha && score < beta) {
                                    score = this.search(depth - 1, alpha, beta, false, ply + 1);
                                }
                            }
                            this._restore(snapshot);
                            if (score > bestScore) bestScore = score;
                            if (score > alpha) alpha = score;
                            if (alpha >= beta) {
                                if (!move.isAttack) this._storeKiller(piece, move);
                                const histKey = `${piece.id}-${move.row}-${move.col}`;
                                this._historyTable[histKey] = (this._historyTable[histKey] || 0) + depth * depth;
                                break;
                            }
                        }
                    } else {
                        bestScore = Infinity;
                        for (let i = 0; i < moves.length; i++) {
                            const { piece, move } = moves[i];
                            const snapshot = this._snapshot();
                            this._executeTemp(piece, move);
                            let score;
                            if (i === 0) {
                                score = this.search(depth - 1, alpha, beta, true, ply + 1);
                            } else {
                                score = this.search(depth - 1, beta - 1, beta, true, ply + 1);
                                if (score < beta && score > alpha) {
                                    score = this.search(depth - 1, alpha, beta, true, ply + 1);
                                }
                            }
                            this._restore(snapshot);
                            if (score < bestScore) bestScore = score;
                            if (score < beta) beta = score;
                            if (alpha >= beta) {
                                if (!move.isAttack) this._storeKiller(piece, move);
                                const histKey = `${piece.id}-${move.row}-${move.col}`;
                                this._historyTable[histKey] = (this._historyTable[histKey] || 0) + depth * depth;
                                break;
                            }
                        }
                    }
                    const flag = bestScore <= originalAlpha ? 'upper' : bestScore >= beta ? 'lower' : 'exact';
                    this._transpositionTable.set(boardKey, { score: bestScore, depth, flag });
                    return bestScore;
                }

                findBestMove() {
                    this._transpositionTable.clear();
                    this._killerMoves = [null, null];
                    this._historyTable = {};
                    const moves = this.generateMoves();
                    if (moves.length === 0) return null;
                    this._orderMoves(moves);
                    const timeLimits = [0, 800, 1500, 2500, 4000, 6000, 9000];
                    const deadline = Date.now() + (timeLimits[this.MAX_DEPTH] || 2500);
                    let bestMove = null, bestScore = -Infinity;
                    for (let d = 1; d <= this.MAX_DEPTH; d++) {
                        let localBest = null, localScore = -Infinity;
                        for (const { piece, move } of moves) {
                            if (Date.now() > deadline && d > 1) break; // 超时跳过剩余走法
                            const snapshot = this._snapshot();
                            this._executeTemp(piece, move);
                            const score = this.search(d - 1, -Infinity, Infinity, false, 0);
                            this._restore(snapshot);
                            if (score > localScore) {
                                localScore = score;
                                localBest = { piece, move, evalScore: score };
                            }
                        }
                        if (Date.now() > deadline && d > 1) {
                            if (bestMove) break; // 超时且已有结果，停止加深
                        }
                        bestScore = localScore;
                        bestMove = localBest;
                        if (Math.abs(bestScore) >= 90000) break;
                    }
                    return bestMove;
                }

                _boardHash() {
                    let h = '';
                    for (let r = 0; r < 8; r++)
                        for (let c = 0; c < 8; c++) {
                            const p = this.game.board[r][c];
                            h += p ? p.defKey + p.color[0] : '.';
                        }
                    return h;
                }

                _snapshot() {
                    return {
                        pieces: this.game.pieces.map(p => ({
                            id: p.id, row: p.row, col: p.col,
                            sharedElectrons: p.sharedElectrons,
                            bondedWith: p.bondedWith ? [...p.bondedWith] : null
                        })),
                        bonds: this.game.bonds.map(b => ({...b})),
                        currentTurn: this.game.currentTurn,
                        gameOver: this.game.gameOver,
                        winner: this.game.winner
                    };
                }

                _restore(snap) {
                    const pieceMap = new Map();
                    for (const p of this.game.pieces) pieceMap.set(p.id, p);
                    // 清空整个棋盘
                    for (let r = 0; r < 8; r++)
                        for (let c = 0; c < 8; c++)
                            this.game.board[r][c] = null;
                    // 恢复被临时移出棋盘的棋子
                    if (this._capturedPiece) {
                        const cp = this._capturedPiece;
                        cp.row = cp._aiTempRow;
                        cp.col = cp._aiTempCol;
                        this._capturedPiece = null;
                    }
                    // 恢复所有棋子到快照位置
                    for (const pd of snap.pieces) {
                        const p = pieceMap.get(pd.id);
                        if (!p) continue;
                        // 如果棋子被临时移动了，恢复原始位置
                        if (p._aiTempRow !== undefined) {
                            p.row = p._aiTempRow;
                            p.col = p._aiTempCol;
                            delete p._aiTempRow;
                            delete p._aiTempCol;
                        } else {
                            p.row = pd.row; p.col = pd.col;
                        }
                        p.sharedElectrons = pd.sharedElectrons;
                        p.bondedWith = pd.bondedWith;
                        if (p.row >= 0 && p.col >= 0) {
                            this.game.board[p.row][p.col] = p;
                        }
                    }
                    this.game.bonds = snap.bonds;
                    this.game.currentTurn = snap.currentTurn;
                    this.game.gameOver = snap.gameOver;
                    this.game.winner = snap.winner;
                    this._capturedPiece = null;
                }

                _executeTemp(piece, move) {
                    this._capturedPiece = null;
                    const captured = move.isAttack ? this.game.board[move.row][move.col] : null;
                    if (captured) {
                        // 仅清空棋盘位置，不从arrays中移除（保留引用）
                        this.game.board[captured.row][captured.col] = null;
                        captured._aiTempRow = captured.row;
                        captured._aiTempCol = captured.col;
                        captured.row = -1; captured.col = -1; // 标记为"不在棋盘上"
                        this._capturedPiece = captured;
                    }
                    this.game.board[piece.row][piece.col] = null;
                    piece._aiTempRow = piece.row;
                    piece._aiTempCol = piece.col;
                    piece.row = move.row; piece.col = move.col;
                    this.game.board[move.row][move.col] = piece;
                    this.game.updateAllBonds();
                    this.game.currentTurn = this.game.currentTurn === 'white' ? 'black' : 'white';
                }
            }

            // ========== 复盘分析引擎 ==========
            class PostGameAnalyzer {
                constructor(game, gameRecord, analysisDepth) {
                    this.game = game;
                    this.record = gameRecord;
                    this.ANALYSIS_DEPTH = analysisDepth || 7;
                    this._canceled = false;
                    this._progress = 0;
                    this._onProgress = null;
                    this._onComplete = null;
                }
                cancel() { this._canceled = true; }
                _rawToCentipawns(raw) { return raw * 8; }
                _winProbability(cp) {
                    const clamped = Math.max(-2000, Math.min(2000, cp));
                    return 50 + 50 * (2 / (1 + Math.exp(-0.0025 * clamped)) - 1);
                }
                analyze(onProgress, onComplete) {
                    this._onProgress = onProgress; this._onComplete = onComplete;
                    this._canceled = false; this._progress = 0;
                    const moves = this.record.moves;
                    if (moves.length === 0) { if (onComplete) onComplete(this._buildResult()); return; }
                    try {
                        const analysisAI = new ChemissAI(this.game, 'white', this.ANALYSIS_DEPTH);
                        let i = 0;
                        const step = () => {
                            if (this._canceled) return;
                            if (i >= moves.length) {
                                try {
                                    this._classifyAllMoves(moves);
                                    if (onComplete) onComplete(this._buildResult());
                                } catch(e) { console.error('Classify error:', e); this.game.addLog('[复盘] 分类出错'); }
                                return;
                            }
                            try {
                                const move = moves[i];
                                if (move.boardState) this._restoreBoardForAnalysis(move.boardState);
                                const evalWhite = analysisAI.evaluate();
                                move.evalRaw = evalWhite;
                                move.evalCentipawns = this._rawToCentipawns(evalWhite);
                                move.winProbability = this._winProbability(move.evalCentipawns);
                                move.bestMoveScore = evalWhite;
                            } catch(e) { console.error('Analysis step error:', i, e); }
                            this._progress = Math.round(((i + 1) / moves.length) * 100);
                            if (onProgress) onProgress(this._progress);
                            i++;
                            setTimeout(step, 0);
                        };
                        this._restoreBoardForAnalysis(this.record.initialBoardState);
                        setTimeout(step, 10);
                    } catch(e) { console.error('Analyze init error:', e); }
                }
                _restoreBoardForAnalysis(stateStr) {
                    const b = this.game.deserializeBoard(stateStr);
                    this.game.board = Array.from({length:8},()=>Array(8).fill(null));
                    this.game.pieces = []; this.game.whitePieces = []; this.game.blackPieces = [];
                    let id = 0;
                    for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
                        const info = b[r][c];
                        if (info) {
                            const p = new Piece(info.defKey, info.color, id++);
                            p.row = r; p.col = c;
                            this.game.board[r][c] = p;
                            this.game.pieces.push(p);
                            (p.color === COLOR_WHITE ? this.game.whitePieces : this.game.blackPieces).push(p);
                        }
                    }
                    this.game.rebuildAllBonds();
                    this.game.gameOver = false; this.game.winner = null;
                }
                _findBestEvalForPosition(ai, colorToMove, boardState) {
                    // Simplified: just evaluate the current position without searching alternatives
                    // Full move-by-move accuracy requires tracking pre-move state
                    this._restoreBoardForAnalysis(boardState);
                    return ai.evaluate();
                }
                _classifyAllMoves(moves) {
                    // 按材质总值校准阈值
                    const maxMat = moves.length > 0 ? (() => {
                        const lastMove = moves[moves.length-1];
                        // 粗略估算：初始材质约 500cp，用此校准
                        return 500;
                    })() : 500;
                    for (let i=0;i<moves.length;i++) {
                        const move = moves[i];
                        if (i===0) {
                            const firstCp = move.evalCentipawns;
                            move.evalDiff = move.color === 'white' ? firstCp : -firstCp;
                        } else {
                            const prevCp = moves[i-1].evalCentipawns;
                            const rawDiff = move.evalCentipawns - prevCp;
                            move.evalDiff = move.color === 'white' ? rawDiff : -rawDiff;
                        }
                        const ad = Math.abs(move.evalDiff);
                        if (move.evalDiff < -250) { move.classification = 'blunder'; move.classificationIcon = '??'; }
                        else if (move.evalDiff < -120) { move.classification = 'mistake'; move.classificationIcon = '?'; }
                        else if (move.evalDiff < -40) { move.classification = 'inaccuracy'; move.classificationIcon = '?!'; }
                        else if (move.evalDiff > 250) { move.classification = 'brilliant'; move.classificationIcon = '!!'; }
                        else if (move.evalDiff > 120) { move.classification = 'great'; move.classificationIcon = '!'; }
                    }
                }
                _computeAccuracy(moves, color) {
                    const playerMoves = moves.filter(m=>m.color===color);
                    if (playerMoves.length===0) return 100;
                    let totalAcc = 0;
                    for (const move of playerMoves) {
                        if (move.evalDiff === null) { totalAcc += 50; continue; }
                        if (move.classification === 'brilliant') totalAcc += 100;
                        else if (move.classification === 'great') totalAcc += 95;
                        else if (move.classification === 'inaccuracy') totalAcc += 55;
                        else if (move.classification === 'mistake') totalAcc += 20;
                        else if (move.classification === 'blunder') totalAcc += 0;
                        else if (move.evalDiff >= 0) totalAcc += 85;
                        else totalAcc += 70;
                    }
                    return Math.round(totalAcc / playerMoves.length);
                }
                _buildResult() {
                    const moves = this.record.moves;
                    return {
                        moves: moves,
                        whiteAccuracy: this._computeAccuracy(moves, 'white'),
                        blackAccuracy: this._computeAccuracy(moves, 'black'),
                        classificationCounts: {
                            brilliant: moves.filter(m=>m.classification==='brilliant').length,
                            great: moves.filter(m=>m.classification==='great').length,
                            inaccuracy: moves.filter(m=>m.classification==='inaccuracy').length,
                            mistake: moves.filter(m=>m.classification==='mistake').length,
                            blunder: moves.filter(m=>m.classification==='blunder').length,
                        },
                        winProbabilityHistory: moves.map(m=>m.winProbability),
                        totalMoves: moves.length
                    };
                }
            }

            class ChemissGame {
                constructor() {
                    this.board = []; this.pieces = []; this.whitePieces = []; this.blackPieces = [];
                    this.currentTurn = COLOR_WHITE; this.selectedPiece = null; this.legalMoves = [];
                    this.bonds = []; this.roundNumber = 1; this.gameOver = false; this.winner = null;
                    this.logEntries = [];
                    this.debugMode = false; this._debugAddTarget = null; this._debugAddColor = COLOR_WHITE;
                    this.onlineMode = false; this.onlineManager = null; this.onlineMyColor = null;
                    this._remoteProcessing = false;
                    this.boardFlipped = false;
                    this._animating = false;
                    this._whiteNoStepCount = 0;
                    this._blackNoStepCount = 0;
                    this.chessClock = null;
                    this._notationMoves = [];
                    this._notationVisible = false;
                    this._prevCharges = new Map(); // 追踪电荷变化用于渐入动画
                    this.aiMode = false;
                    this.aiColor = 'black';
                    this.ai = null;
                    this._moveHistory = [];
                    this._aiDifficulty = 4;
                    this._undoStack = [];
                    this._gameRecord = { moves: [], createdAt: Date.now(), result: null, initialBoardState: null };
                    this._reviewController = null;
                    this.initBoard(); this.updateUI();
                    this.addLog('游戏开始！白方先行。');
                    this.addLog('离子键可直接吃子；共价/金属键需目标已键合且攻击者非键合伙伴。');
                    // Debug模式右键菜单：右键空格添加棋子，右键棋子删除
                    document.getElementById('board').addEventListener('contextmenu', (e) => {
                        if (!this.debugMode) return;
                        e.preventDefault();
                        const cell = e.target.closest('.cell');
                        if (!cell) return;
                        const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
                        const piece = this.board[r][c];
                        if (piece) {
                            this.removePiece(piece);
                            this.selectedPiece = null; this.legalMoves = [];
                            this.addLog(`[DEBUG] 删除了${piece.symbol}(${r},${c})`);
                            this.updateAllBonds(); this.updateUI();
                        } else {
                            this._debugAddTarget = { row: r, col: c };
                            this._debugAddColor = this.currentTurn;
                            this.showNuclearChoices(null);
                        }
                    });
                }

                initBoard() {
                    this.board = Array.from({length:BOARD_SIZE},()=>Array(BOARD_SIZE).fill(null));
                    this.pieces=[]; this.whitePieces=[]; this.blackPieces=[]; this.bonds=[];
                    this.roundNumber=1; this.gameOver=false; this.winner=null;
                    this.selectedPiece=null; this.legalMoves=[]; this.logEntries=[];
                    this._whiteNoStepCount = 0; this._blackNoStepCount = 0;
                    this._prevCharges = new Map(); this._notationMoves = [];
                    this._undoStack = [];
                    let id = 0;
                    const place = (p, r, c) => {
                        p.row = r; p.col = c; this.board[r][c] = p;
                        this.pieces.push(p);
                        (p.color === COLOR_WHITE ? this.whitePieces : this.blackPieces).push(p);
                    };
                    ['O','P','Si','F','H','C','N','S'].forEach((k,i) => place(new Piece(k,COLOR_WHITE,id++),7,i));
                    ['Na','Na','Li','Li','Li','Li','Na','Na'].forEach((k,i) => place(new Piece(k,COLOR_WHITE,id++),6,i));
                    ['O','P','Si','F','H','C','N','S'].forEach((k,i) => place(new Piece(k,COLOR_BLACK,id++),0,i));
                    ['Na','Na','Li','Li','Li','Li','Na','Na'].forEach((k,i) => place(new Piece(k,COLOR_BLACK,id++),1,i));
                    this.rebuildAllBonds();
                    this._gameRecord.initialBoardState = this.serializeBoard();
                }

                getPieceById(id) { return this.pieces.find(p => p.id === id); }

                getAdjacentPieces(row, col) {
                    const res = [];
                    for (const [dr, dc] of ALL_DIRS) {
                        const nr = row + dr, nc = col + dc;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            res.push(this.board[nr][nc]);
                        }
                    }
                    return res;
                }

                serializeBoard() {
                    let s = '';
                    for (let r = 0; r < 8; r++)
                        for (let c = 0; c < 8; c++) {
                            const p = this.board[r][c];
                            if (p) s += p.defKey.padEnd(2,'_') + p.color[0];
                            else s += '___';
                        }
                    return s;
                }

                deserializeBoard(stateStr) {
                    const board = Array.from({length:8},()=>Array(8).fill(null));
                    for (let r=0;r<8;r++) for (let c=0;c<8;c++){
                        const idx=(r*8+c)*3;
                        const raw=stateStr.substring(idx,idx+2);
                        const colorChar=stateStr[idx+2];
                        if(raw==='__'||raw==='  ') continue;
                        const defKey=raw[1]==='_'?raw[0]:raw;
                        board[r][c]={defKey,color:colorChar==='w'?'white':'black'};
                    }
                    return board;
                }

                // 按rebuildAllBonds的共价键贪心排序规则：enDiff降序→最右端列→行
                _covalentRank(a, b) {
                    if (b.enDiff !== a.enDiff) return b.enDiff - a.enDiff;
                    if (b.col !== a.col) return b.col - a.col;
                    if (b.row !== a.row) return b.row - a.row;
                    return 0;
                }

                getBondableTargets(selectedPiece) {
                    if (!selectedPiece) return [];
                    return this._bondTargetsAt(selectedPiece, selectedPiece.row, selectedPiece.col, null);
                }

                // 计算棋子位于 (atRow,atCol) 时的成键目标（只读，不移动棋子）；excludeId 为被吃掉而应忽略的目标
                _bondTargetsAt(selectedPiece, atRow, atCol, excludeId) {
                    if (!selectedPiece || selectedPiece.noble) return [];
                    if (atRow < 0 || atCol < 0) return [];
                    const results = [];
                    for (const p of this.pieces) {
                        if (p.row < 0 || p.col < 0) continue;
                        if (excludeId != null && p.id === excludeId) continue;
                        if (p.color === selectedPiece.color || p.noble || p === selectedPiece) continue;
                        const dr = Math.abs(p.row - atRow);
                        const dc = Math.abs(p.col - atCol);
                        if (dr > 1 || dc > 1 || (dr === 0 && dc === 0)) continue;
                        // 离子键不显示
                        if ((selectedPiece.group === METAL && p.group === NONMETAL) ||
                            (selectedPiece.group === NONMETAL && p.group === METAL)) continue;
                        // 金属键：显示所有相邻未键合金属
                        if (selectedPiece.group === METAL && p.group === METAL) {
                            const already = selectedPiece.bondedWith && selectedPiece.bondedWith.includes(p.id);
                            if (!already) results.push(p.id);
                            continue;
                        }
                        // 共价键候选：H 用 2 电子规则
                        if (selectedPiece.group === NONMETAL && p.group === NONMETAL) {
                            const needSel = selectedPiece.isHydrogenKing ? (2 - selectedPiece.valence) : (8 - selectedPiece.valence);
                            const needP = p.isHydrogenKing ? (2 - p.valence) : (8 - p.valence);
                            const sharedE = Math.min(Math.max(0, needSel), Math.max(0, needP));
                            if (sharedE > 0) results.push(p.id);
                        }
                    }
                    // 共价键：模拟贪心算法，仅保留最优目标；已是最优则不显示
                    if (selectedPiece.group === NONMETAL && results.length >= 1) {
                        return this._pickCovalentTarget(selectedPiece, results, atRow, atCol);
                    }
                    return results;
                }

                _pickCovalentTarget(selectedPiece, candidateIds, atRow, atCol) {
                    const candidates = candidateIds.map(id => {
                        const p = this.getPieceById(id);
                        return { id, enDiff: Math.abs(selectedPiece.electroneg - p.electroneg), col: p.col, row: p.row };
                    });
                    candidates.sort((a, b) => this._covalentRank(a, b));
                    const best = candidates[0];
                    const target = this.getPieceById(best.id);
                    // 目标已被其他棋子键合 → 比较贪心优先级，选中方更优才显示
                    if (target.bondedWith && target.bondedWith.length > 0 && !target.bondedWith.includes(selectedPiece.id)) {
                        const cpId = target.bondedWith[0];
                        const cp = this.getPieceById(cpId);
                        if (!cp) return [best.id]; // 无法比较，保守显示
                        const cpRank = { enDiff: Math.abs(cp.electroneg - target.electroneg), col: cp.col, row: cp.row };
                        const selRank = { enDiff: best.enDiff, col: atCol, row: atRow };
                        if (this._covalentRank(selRank, cpRank) >= 0) return []; // 抢不过，不显示
                    }
                    return [best.id];
                }

                rebuildAllBonds() {
                    this.pieces.forEach(p => { p.sharedElectrons = 0; p.bondedWith = null; });
                    this.bonds = [];

                    // 收集所有可能的成键配对（去重：p1.id < p2.id）
                    const candidates = [];
                    for (const p of this.pieces) {
                        if (p.noble || p.row < 0 || p.col < 0) continue; // 稀有气体/已移除的跳过
                        const neighbors = this.getAdjacentPieces(p.row, p.col);
                        for (const n of neighbors) {
                            if (n.color === p.color) continue;
                            if (n.noble) continue; // 稀有气体不参与成键
                            if (p.id > n.id) continue; // 避免重复配对
                            const enDiff = Math.abs(p.electroneg - n.electroneg);
                            const bothNonMetal = p.group === NONMETAL && n.group === NONMETAL;
                            const bothMetal = p.group === METAL && n.group === METAL;
                            const isMetalNonmetal = !bothNonMetal && !bothMetal;
                            // 金属-非金属：离子键（由canCapture/handleCapture处理吃子，不形成持久键合）
                            if (isMetalNonmetal) continue;
                            if (bothMetal) {
                                // 金属键
                                candidates.push({ p1: p.id, p2: n.id, type: 'metallic', shared: 1, enDiff });
                            } else if (bothNonMetal) {
                                // 共价键：H 用 2 电子规则，其他用 8 电子规则
                                const needP = p.isHydrogenKing ? (2 - p.valence) : (8 - p.valence);
                                const needN = n.isHydrogenKing ? (2 - n.valence) : (8 - n.valence);
                                const sharedE = Math.min(Math.max(0, needP), Math.max(0, needN));
                                if (sharedE > 0) {
                                    candidates.push({ p1: p.id, p2: n.id, type: 'covalent', shared: sharedE, enDiff });
                                }
                            }
                        }
                    }

                    // 分离金属键和非金属键候选
                    const metallicCandidates = candidates.filter(c => c.type === 'metallic');
                    const covalentCandidates = candidates.filter(c => c.type !== 'metallic');

                    // 共价键：贪心按电负性差降序；相同时取最右端(最大col, 其次row)
                    covalentCandidates.sort((a, b) => {
                        if (b.enDiff !== a.enDiff) return b.enDiff - a.enDiff;
                        const pa = this.getPieceById(a.p1), pb = this.getPieceById(b.p1);
                        const pa2 = this.getPieceById(a.p2), pb2 = this.getPieceById(b.p2);
                        const raCol = Math.max(pa?.col??0, pa2?.col??0);
                        const rbCol = Math.max(pb?.col??0, pb2?.col??0);
                        if (raCol !== rbCol) return rbCol - raCol;
                        const raRow = Math.max(pa?.row??0, pa2?.row??0);
                        const rbRow = Math.max(pb?.row??0, pb2?.row??0);
                        return rbRow - raRow;
                    });
                    const covBonded = new Set();
                    const applyBond = (c) => {
                        const p1 = this.getPieceById(c.p1);
                        const p2 = this.getPieceById(c.p2);
                        if (!p1 || !p2) return;
                        p1.sharedElectrons = Math.max(p1.sharedElectrons, c.shared);
                        p2.sharedElectrons = Math.max(p2.sharedElectrons, c.shared);
                        if (!p1.bondedWith) p1.bondedWith = [];
                        if (!p2.bondedWith) p2.bondedWith = [];
                        p1.bondedWith.push(p2.id);
                        p2.bondedWith.push(p1.id);
                        this.bonds.push({ p1: c.p1, p2: c.p2, type: c.type, shared: c.shared });
                    };
                    for (const c of covalentCandidates) {
                        if (covBonded.has(c.p1) || covBonded.has(c.p2)) continue;
                        covBonded.add(c.p1);
                        covBonded.add(c.p2);
                        applyBond(c);
                    }

                    // 金属键：全部应用（允许多原子簇）
                    for (const c of metallicCandidates) {
                        applyBond(c);
                    }

                    this.expandMetallicClusters();
                }

                expandMetallicClusters() {
                    const metallicBonds = this.bonds.filter(b => b.type === 'metallic');
                    if (metallicBonds.length === 0) return;
                    const parent = new Map();
                    const find = (x) => {
                        if (!parent.has(x)) parent.set(x, x);
                        if (parent.get(x) !== x) parent.set(x, find(parent.get(x)));
                        return parent.get(x);
                    };
                    const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) parent.set(ra, rb); };
                    for (const b of metallicBonds) union(b.p1, b.p2);
                    const clusters = new Map();
                    const allMetalIds = new Set(metallicBonds.flatMap(b => [b.p1, b.p2]));
                    for (const id of allMetalIds) {
                        const root = find(id);
                        if (!clusters.has(root)) clusters.set(root, []);
                        clusters.get(root).push(id);
                    }
                    // 自由电子池化：集群总自由电子 = 各金属baseValence之和，均匀分配
                    for (const ids of clusters.values()) {
                        const members = ids.map(id => this.getPieceById(id)).filter(p => p && p.group === METAL);
                        if (members.length === 0) continue;
                        let totalFree = 0;
                        for (const p of members) totalFree += p.baseValence;
                        // 均匀分配，上限8（八隅律）
                        const sharedPerMetal = Math.min(8, Math.max(1, Math.floor(totalFree / members.length)));
                        for (const p of members) {
                            p.sharedElectrons = Math.max(p.sharedElectrons, sharedPerMetal);
                        }
                    }
                }

                removeAllBondsFor(piece) {
                    this.bonds = this.bonds.filter(b => b.p1 !== piece.id && b.p2 !== piece.id);
                    if (piece.bondedWith) {
                        for (const pid of piece.bondedWith) {
                            const other = this.getPieceById(pid);
                            if (other && other.bondedWith) {
                                other.bondedWith = other.bondedWith.filter(x => x !== piece.id);
                                if (other.bondedWith.length === 0) other.bondedWith = null;
                            }
                        }
                    }
                    piece.bondedWith = null;
                    piece.sharedElectrons = 0;
                }

                updateAllBonds() { this.rebuildAllBonds(); }

                canCapture(attacker, defender) {
                    if (attacker.color === defender.color) return false;
                    if (attacker.noble || defender.noble) return false; // 稀有气体不参与吃子
                    const enDiff = Math.abs(attacker.electroneg - defender.electroneg);
                    // 离子键：仅金属-非金属可无条件直接吃子
                    if (enDiff > 1.6) {
                        if ((attacker.group === METAL && defender.group === NONMETAL) ||
                            (attacker.group === NONMETAL && defender.group === METAL)) {
                            return true;
                        }
                        // 非金属-非金属高电负性差不能形成离子键，继续走共价键机制
                        if (attacker.group !== NONMETAL || defender.group !== NONMETAL) {
                            return false;
                        }
                    }
                    // 共价键/金属键机制：需目标已键合，且攻击者不是键合伙伴
                    if (!defender.bondedWith || defender.bondedWith.length === 0) return false;
                    if (attacker.bondedWith && attacker.bondedWith.includes(defender.id)) return false;
                    return !defender.bondedWith.includes(attacker.id);
                }

                getLegalMoves(piece) {
                    if (!piece || piece.stunned) return [];
                    const moves = [];
                    const dirs = piece.getPriorityDirections();
                    const maxSteps = piece.effectiveMoveSteps;
                    for (const [dr, dc] of dirs) {
                        for (let step = 1; step <= maxSteps; step++) {
                            const nr = piece.row + dr * step;
                            const nc = piece.col + dc * step;
                            if (nr < 0 || nr >= 8 || nc < 0 || nc >= 8) break;
                            const target = this.board[nr][nc];
                            if (target) {
                                if (target.color !== piece.color && this.canCapture(piece, target)) {
                                    moves.push({ row: nr, col: nc, isAttack: true, targetPiece: target });
                                }
                                break;
                            } else {
                                moves.push({ row: nr, col: nc, isAttack: false, targetPiece: null });
                            }
                        }
                    }
                    return moves;
                }

                movePiece(piece, toRow, toCol, isAttack, target) {
                    // 保存旧位置以便出错时回滚
                    const fromRow = piece.row, fromCol = piece.col;
                    this.board[fromRow][fromCol] = null;
                    let wasIonic = false;
                    if (isAttack && target) {
                        wasIonic = this.handleCapture(piece, target);
                    } else if (this.board[toRow][toCol]) {
                        // 安全保护：非吃子移动时目标格已有棋子，回滚并跳过
                        this.board[fromRow][fromCol] = piece;
                        this.addLog(`[WARN] 移动失败：目标格(${toRow},${toCol})被${this.board[toRow][toCol].symbol}占据`);
                        return false;
                    }
                    piece.row = toRow; piece.col = toCol;
                    this.board[toRow][toCol] = piece;
                    this.updateAllBonds();
                    if (wasIonic && piece.totalElectrons > 8 && !this._remoteProcessing) {
                        // 溢出电子越多，射线越多：每溢出2个电子发1条射线
                        const excess = piece.totalElectrons - 8;
                        const numRays = Math.max(1, Math.ceil(excess / 2));
                        for (let ri = 0; ri < numRays; ri++) {
                            setTimeout(() => {
                                if (piece.totalElectrons > 8) this.emitBetaRay(piece, ri);
                            }, ri * 180);
                        }
                    }
                }

                handleCapture(attacker, defender) {
                    const enDiff = Math.abs(attacker.electroneg - defender.electroneg);
                    const isIonic = enDiff > 1.6 &&
                        ((attacker.group === METAL && defender.group === NONMETAL) ||
                         (attacker.group === NONMETAL && defender.group === METAL));
                    this.addLog(`${attacker.symbol}(${attacker.color==='white'?'白':'黑'}) 吃掉了 ${defender.symbol}(${defender.color==='white'?'白':'黑'})`);
                    if (defender.isHydrogenKing) {
                        this.gameOver = true; this.winner = attacker.color;
                        this.addLog(`氢王(H)被吃，${attacker.color==='white'?'白方':'黑方'}获胜`);
                        this.removePiece(defender); return false;
                    }
                    if (isIonic) {
                        // H最多容纳2个电子（1s轨道上限）
                        if (attacker.isHydrogenKing) {
                            const maxBonus = Math.max(0, 2 - attacker.valence - attacker.sharedElectrons);
                            const actualGain = Math.min(defender.valence, maxBonus);
                            attacker.bonusElectrons += actualGain;
                            attacker.bonusElectronRounds = 3;
                            this.addLog(`离子键捕获: H获得+${actualGain}电子(H上限2个,3回合)，电荷${attacker.charge>0?'+':''}${attacker.charge}`);
                        } else {
                            attacker.bonusElectrons += defender.valence;
                            attacker.bonusElectronRounds = 3;
                            this.addLog(`离子键捕获: ${attacker.symbol}获得+${defender.valence}电子(3回合)，电荷${attacker.charge>0?'+':''}${attacker.charge}`);
                        }
                    } else {
                        this.addLog(`共价/金属键吃子，不获得额外电子`);
                    }
                    this.removePiece(defender);
                    return isIonic;
                }

                emitBetaRay(source, fanIndex) {
                    // fanIndex用于多条射线扇出到不同方向，避免全部同向
                    const baseIdx = Math.floor(Math.random() * 8);
                    const idx = fanIndex !== undefined ? (baseIdx + fanIndex * 3) % 8 : baseIdx;
                    const dir = ALL_DIRS[idx];
                    this.animateRay(source.row, source.col, dir, 4, 'beta');
                    for (let s = 1; s <= 4; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const target = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'beta');
                            const hitStep = s, targetId = target.id;
                            setTimeout(() => {
                                const t = this.getPieceById(targetId);
                                if (!t || !this.pieces.includes(t)) return;
                                if (this.tryFissionOnHit(t, 'β射线')) return;
                                const change = Math.random() < 0.5 ? 1 : -1;
                                t.bonusElectrons = Math.max(0, t.bonusElectrons + change);
                                // H电子数上限2
                                if (t.isHydrogenKing) {
                                    const maxBonus = Math.max(0, 2 - t.valence - t.sharedElectrons);
                                    t.bonusElectrons = Math.min(t.bonusElectrons, maxBonus);
                                }
                                t.bonusElectronRounds = 3;
                                this.addLog(`β射线(离子键溢出)击中${this.nuclideText(t.symbol,t.mass)}，额外电子${change>0?'+1':'-1'}(3回合)`);
                                this.updateUI();
                            }, hitStep * 120 + 350);
                            break;
                        }
                    }
                }

                resolveElectrostaticAttraction() {
                    const charged = this.pieces.filter(p => p.charge !== 0);
                    if (charged.length < 2) return;
                    // 收集所有异号电荷对
                    const pairs = [];
                    for (let i = 0; i < charged.length; i++)
                        for (let j = i+1; j < charged.length; j++)
                            if (charged[i].charge * charged[j].charge < 0)
                                pairs.push([charged[i], charged[j]]);
                    if (pairs.length === 0) return;
                    // 优先级：不同阵营 > 库仑力|q1*q2|/r² > 电负性差值 > 最右端
                    const pairRank = ([a, b]) => {
                        const crossColor = a.color !== b.color ? 1 : 0;
                        const dr = a.row - b.row, dc = a.col - b.col;
                        const r2 = dr*dr + dc*dc || 1;
                        const coulomb = Math.abs(a.charge * b.charge) / r2;
                        const enDiff = Math.abs(a.electroneg - b.electroneg);
                        const rightmostCol = Math.max(a.col, b.col);
                        const rightmostRow = Math.max(a.row, b.row);
                        return [crossColor, coulomb, enDiff, rightmostCol, rightmostRow];
                    };
                    pairs.sort((a, b) => {
                        const ra = pairRank(a), rb = pairRank(b);
                        for (let k = 0; k < ra.length; k++) {
                            if (ra[k] > rb[k]) return -1;
                            if (ra[k] < rb[k]) return 1;
                        }
                        return 0;
                    });
                    const [p1, p2] = pairs[0];
                    let s1 = Math.abs(p1.charge), s2 = Math.abs(p2.charge);
                    if (this.currentTurn === COLOR_WHITE && p1.color === COLOR_BLACK) s1 = Math.max(0, s1-1);
                    if (this.currentTurn === COLOR_BLACK && p1.color === COLOR_WHITE) s1 = Math.max(0, s1-1);
                    const fromR1 = p1.row, fromC1 = p1.col, fromR2 = p2.row, fromC2 = p2.col;
                    this.moveToward(p1, p2, s1);
                    this.moveToward(p2, p1, s2);
                    if (p1.row !== fromR1 || p1.col !== fromC1)
                        this._animMovedInfos.push({pieceId:p1.id,sdx:(fromC1-p1.col)*100+'%',sdy:(fromR1-p1.row)*100+'%'});
                    if (p2.row !== fromR2 || p2.col !== fromC2)
                        this._animMovedInfos.push({pieceId:p2.id,sdx:(fromC2-p2.col)*100+'%',sdy:(fromR2-p2.row)*100+'%'});
                    this.updateAllBonds();
                }

                moveToward(mover, target, steps) {
                    if (steps <= 0) return;
                    const dr = Math.sign(target.row - mover.row);
                    const dc = Math.sign(target.col - mover.col);
                    let cr = mover.row, cc = mover.col, rem = steps;
                    let lastEmptyR = cr, lastEmptyC = cc;
                    while (rem > 0) {
                        const nr = cr+dr, nc = cc+dc;
                        if (nr<0||nr>=8||nc<0||nc>=8) break;
                        if (nr===target.row && nc===target.col) break;
                        rem--;
                        if (this.board[nr][nc]) {
                            cr=nr; cc=nc;
                            continue;
                        }
                        cr=nr; cc=nc;
                        lastEmptyR=cr; lastEmptyC=cc;
                    }
                    if (lastEmptyR===mover.row && lastEmptyC===mover.col) return;
                    this.board[mover.row][mover.col] = null;
                    mover.row=lastEmptyR; mover.col=lastEmptyC;
                    this.board[lastEmptyR][lastEmptyC] = mover;
                }

                canGiveElectron(piece) {
                    if (!piece || piece.group !== METAL || piece.color !== this.currentTurn || piece.totalElectrons <= 0) return null;
                    return this.getAdjacentPieces(piece.row, piece.col)
                        .filter(n => n.color === piece.color && n.group === NONMETAL && !n.noble);
                }

                hasAvailableSteps(color) {
                    const pieces = color === COLOR_WHITE ? this.whitePieces : this.blackPieces;
                    for (const p of pieces) {
                        if (p.stunned || p.totalElectrons <= 0) continue;
                        if (this.getLegalMoves(p).length > 0) return true;
                        if (p.group === METAL && p.totalElectrons > 0) {
                            const neighbors = this.getAdjacentPieces(p.row, p.col);
                            if (neighbors.some(n => n.color === p.color && n.group === NONMETAL && !n.noble)) return true;
                        }
                    }
                    return false;
                }

                giveElectron(metal, nonmetal) {
                    // H最多容纳2个电子，已达上限则拒绝
                    if (nonmetal.isHydrogenKing && nonmetal.totalElectrons >= 2) {
                        this.addLog(`H已满2个电子，${metal.symbol}无法给电子`);
                        return;
                    }
                    metal.valence = Math.max(0, metal.valence - 1); metal.electronsGiven++;
                    metal.chargeRounds=3;
                    nonmetal.chargeRounds=3;
                    nonmetal.bonusElectrons+=1; nonmetal.bonusElectronRounds=3;
                    this.addLog(`${metal.symbol} 给出1个电子给 ${nonmetal.symbol} → 阳离子/阴离子(3回合)`);
                }

                canNuclearTransform(piece) {
                    if (!piece || piece.symbol!=='Li' || piece.color!==this.currentTurn) return false;
                    return piece.color===COLOR_WHITE ? piece.row===0 : piece.row===7;
                }

                nuclearTransform(piece, newKey, isotopeSpec) {
                    if (!PIECE_DEFS[newKey] || newKey==='H') return;
                    const np = new Piece(newKey, piece.color, piece.id, isotopeSpec || null);
                    np.row=piece.row; np.col=piece.col;
                    this.board[piece.row][piece.col]=np;
                    const idx=this.pieces.indexOf(piece); if(idx>=0) this.pieces[idx]=np;
                    const arr=piece.color===COLOR_WHITE?this.whitePieces:this.blackPieces;
                    const arrIdx=arr.indexOf(piece); if(arrIdx>=0) arr[arrIdx]=np;
                    this.removeAllBondsFor(piece);
                    const isoLabel = isotopeSpec ? ` ${this.nuclideText(np.symbol,isotopeSpec.mass)}${isotopeSpec.name||''}` : '';
                    this.addLog(`Li核变为${isoLabel||np.symbol}${np.radioactive?' ['+np.decayMode+'衰变 t½:'+np.halfLifeRounds+'r]':''}`);
                    this.updateAllBonds();
                    if(this.onlineMode && this.onlineManager){
                        this.onlineManager.send({type:'nuclearTransform',pieceId:piece.id,newKey:newKey,isotopeSpec:isotopeSpec||null});
                        this._skipNextEndTurnSend = true;
                    }
                }

                // ========== 联机消息处理 ==========
                _onRemoteMessage(msg){
                    this._remoteProcessing = true;
                    try {
                        switch(msg.type){
                            case 'move':{
                                const piece = this.getPieceById(msg.pieceId);
                                if(!piece) break;
                                const target = msg.isAttack && msg.targetId ? this.getPieceById(msg.targetId) : null;
                                const fromRow = piece.row, fromCol = piece.col;
                                this.movePiece(piece, msg.toRow, msg.toCol, msg.isAttack, target);
                                if(msg.animInfo){
                                    this._animMovedInfos = [{pieceId:piece.id,sdx:(fromCol-msg.toCol)*100+'%',sdy:(fromRow-msg.toRow)*100+'%'}];
                                }
                                if(this.gameOver){ this.updateUI(); this.showVictory(); break; }
                                if(msg.endTurn) this.endTurn(true);
                                break;
                            }
                            case 'giveElectron':{
                                const metal = this.getPieceById(msg.metalId), nonmetal = this.getPieceById(msg.nonmetalId);
                                if(metal && nonmetal) this.giveElectron(metal, nonmetal);
                                this.updateUI();
                                break;
                            }
                            case 'nuclearTransform':{
                                const piece = this.getPieceById(msg.pieceId);
                                if(piece) this.nuclearTransform(piece, msg.newKey, msg.isotopeSpec||null);
                                this.endTurn(true);
                                break;
                            }
                            case 'draw':{
                                if(confirm('对手请求和棋，同意吗？')){
                                    this.gameOver=true; this.winner='draw'; this.addLog('双方同意和棋'); this.updateUI(); this.showVictory();
                                    if(this.onlineManager) this.onlineManager.send({type:'drawAccept'});
                                }
                                break;
                            }
                            case 'drawAccept':{
                                this.gameOver=true; this.winner='draw'; this.addLog('双方同意和棋'); this.updateUI(); this.showVictory();
                                break;
                            }
                            case 'endTurn':{
                                this.endTurn(true);
                                break;
                            }
                            case 'reset':{
                                this.initBoard(); this.currentTurn=COLOR_WHITE; this.updateUI(); this.addLog('对手已重置对局！白方先行。');
                                break;
                            }
                        }
                    } finally { this._remoteProcessing = false; }
                }
                _onOnlineConnected(){
                    this.onlineMode = true;
                    this.onlineMyColor = this.onlineManager.localColor;
                    this.addLog(`联机已连接！你执${this.onlineMyColor==='white'?'白':'黑'}方`);
                    this.updateUI();
                    this._refreshOnlineUI();
                }
                _onOnlineDisconnected(){
                    this.addLog('联机已断开');
                    this.onlineMode = false; this.onlineMyColor = null;
                    if(this.onlineManager){ this.onlineManager.disconnect(); this.onlineManager = null; }
                    this.updateUI();
                    this._refreshOnlineUI();
                }
                _refreshOnlineUI(){
                    const dot = document.getElementById('onlineDot');
                    const statusText = document.getElementById('onlineStatusText');
                    const btnDisconnect = document.getElementById('btnDisconnect');
                    if(this.onlineManager && this.onlineManager.connected){
                        dot.className = 'online-dot on';
                        statusText.textContent = `已连接 · 你执${this.onlineMyColor==='white'?'白':'黑'}方 · 房间 ${this.onlineManager.roomCode}`;
                        if(btnDisconnect) btnDisconnect.style.display = 'block';
                    } else if(this.onlineManager){
                        dot.className = 'online-dot connecting';
                        statusText.textContent = '连接中…(通过MQTT服务器)';
                        if(btnDisconnect) btnDisconnect.style.display = 'none';
                    } else {
                        dot.className = 'online-dot off';
                        statusText.textContent = '未连接';
                        if(btnDisconnect) btnDisconnect.style.display = 'none';
                    }
                }

                // ========== 核衰变系统 ==========
                // ========== 射线动画 ==========
                // 播放射线动画：源格→路径格→目标格闪烁
                animateRay(sourceRow, sourceCol, dir, range, rayType) {
                    const cells = [];
                    for (let s = 0; s <= range; s++) {
                        const nr = sourceRow + dir[0] * s;
                        const nc = sourceCol + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                            cells.push([nr, nc]);
                        }
                    }
                    if (cells.length === 0) return;
                    // 源格发光
                    const srcCell = document.querySelector(`.board .cell[data-r="${cells[0][0]}"][data-c="${cells[0][1]}"]`);
                    if (srcCell) {
                        srcCell.classList.add('ray-source', `ray-${rayType}`);
                        setTimeout(() => srcCell.classList.remove('ray-source', `ray-${rayType}`), 500);
                    }
                    // 路径依次点亮
                    for (let i = 1; i < cells.length; i++) {
                        const [cr, cc] = cells[i];
                        setTimeout(() => {
                            const cell = document.querySelector(`.board .cell[data-r="${cr}"][data-c="${cc}"]`);
                            if (cell) {
                                cell.classList.add('ray-path', `ray-${rayType}`);
                                setTimeout(() => cell.classList.remove('ray-path', `ray-${rayType}`), 250);
                            }
                        }, i * 120);
                    }
                }

                // 目标格撞击动画
                animateImpact(row, col, rayType) {
                    setTimeout(() => {
                        const cell = document.querySelector(`.board .cell[data-r="${row}"][data-c="${col}"]`);
                        if (cell) {
                            cell.classList.add('ray-impact', `ray-${rayType}`);
                            setTimeout(() => cell.classList.remove('ray-impact', `ray-${rayType}`), 600);
                            // 棋子闪烁
                            const piece = cell.querySelector('.piece');
                            if (piece) {
                                piece.classList.add('ray-hit-flash');
                                setTimeout(() => piece.classList.remove('ray-hit-flash'), 500);
                            }
                        }
                    }, 100);
                }

                // 按Z查找可用的defKey（衰变产物查找）
                findKeyByZ(z) {
                    return Z_TO_KEY[z] || null;
                }

                // 核素符号格式化（Unicode上标数字，用于纯文本日志）
                nuclideText(sym, mass) {
                    const supDigits = {'0':'\u2070','1':'\u00B9','2':'\u00B2','3':'\u00B3','4':'\u2074','5':'\u2075','6':'\u2076','7':'\u2077','8':'\u2078','9':'\u2079'};
                    const massStr = String(mass).split('').map(c => supDigits[c]||c).join('');
                    return massStr + sym;
                }

                // 核素符号格式化（HTML上标，用于界面渲染）
                nuclideHTML(sym, mass) {
                    return `<sup>${mass}</sup>${sym}`;
                }

                // 将棋子变换为另一元素（保留位置、颜色、id，衰变产物使用默认同位素）
                transformPiece(piece, newKey) {
                    if (!PIECE_DEFS[newKey]) return null;
                    if (piece.isHydrogenKing) {
                        this.gameOver = true; this.winner = piece.color === COLOR_WHITE ? COLOR_BLACK : COLOR_WHITE;
                        this.addLog(`氢王(H)因嬗变消失，${this.winner==='white'?'白方':'黑方'}获胜`);
                        this.removePiece(piece); return null;
                    }
                    // 衰变产物使用默认稳定同位素
                    const np = new Piece(newKey, piece.color, piece.id, null);
                    np.row = piece.row; np.col = piece.col;
                    np.chargeRounds = piece.chargeRounds;
                    np.stunned = piece.stunned; np.stunRounds = piece.stunRounds;
                    np.bonusElectrons = piece.bonusElectrons; np.bonusElectronRounds = piece.bonusElectronRounds;
                    np.electronsGiven = piece.electronsGiven; np.valence = piece.valence;
                    this.board[piece.row][piece.col] = np;
                    const idx = this.pieces.indexOf(piece); if (idx >= 0) this.pieces[idx] = np;
                    const arr = piece.color === COLOR_WHITE ? this.whitePieces : this.blackPieces;
                    const arrIdx = arr.indexOf(piece); if (arrIdx >= 0) arr[arrIdx] = np;
                    this.removeAllBondsFor(piece);
                    return np;
                }

                resolveRadioactiveDecay() {
                    const snapshot = [...this.pieces]; // 快照避免迭代中修改数组
                    for (const p of snapshot) {
                        if (!this.pieces.includes(p)) continue; // 可能已被移除
                        if (p.radioactive && p.halfLifeRounds > 0) {
                            p.decayCounter++;
                            if (p.decayCounter >= p.halfLifeRounds && Math.random() < 0.55) {
                                this.triggerDecay(p); p.decayCounter = 0;
                            }
                        }
                    }
                }

                triggerDecay(piece) {
                    const mode = piece.decayMode || 'alpha';
                    const dir = ALL_DIRS[Math.floor(Math.random() * 8)];
                    const rayType = mode === 'alpha' ? 'alpha' : mode === 'beta' ? 'beta' : 'gamma';
                    const range = mode === 'alpha' ? 2 : mode === 'beta' ? 4 : 8;
                    this.animateRay(piece.row, piece.col, dir, range, rayType);
                    const delay = Math.max(400, range * 120);
                    const pieceId = piece.id, oldSym = piece.symbol, oldMass = piece.mass;
                    setTimeout(() => {
                        const p = this.getPieceById(pieceId);
                        if (!p || !this.pieces.includes(p)) return;
                        if (mode === 'alpha') {
                            const newZ = p.Z - 2;
                            const newKey = this.findKeyByZ(newZ);
                            if (newKey) {
                                const np = this.transformPiece(p, newKey);
                                if (!np) return;
                                this.addLog(`${this.nuclideText(oldSym,oldMass)} →α衰变→ ${np.symbol} + α射线`);
                                this.alphaRayEffect(np, dir);
                            } else {
                                this.addLog(`${this.nuclideText(oldSym,oldMass)} α衰变，无对应产物，眩晕1回合`);
                                p.stunned = true; p.stunRounds = 1;
                            }
                        } else if (mode === 'beta') {
                            const newZ = p.Z + 1;
                            const newKey = this.findKeyByZ(newZ);
                            if (newKey) {
                                const np = this.transformPiece(p, newKey);
                                if (!np) return;
                                this.addLog(`${this.nuclideText(oldSym,oldMass)} →β⁻衰变→ ${np.symbol} + β射线`);
                                this.betaRayEffect(np, dir);
                            } else {
                                this.addLog(`${this.nuclideText(oldSym,oldMass)} β衰变，无对应产物，眩晕1回合`);
                                p.stunned = true; p.stunRounds = 1;
                            }
                        } else {
                            this.addLog(`${this.nuclideText(oldSym,oldMass)} γ衰变 → 发射高能光子`);
                            this.gammaRayEffect(p, dir);
                        }
                        this.updateUI();
                    }, delay);
                }

                // ========== 射线效果 ==========
                // 辅助：查找最接近指定质量数的同位素
                findClosestIsotope(elementKey, targetMass) {
                    const isos = ISOTOPES[elementKey] || [];
                    if (isos.length === 0) return null;
                    let best = isos[0], bestDiff = Math.abs((best.mass||0) - targetMass);
                    for (const iso of isos) {
                        const diff = Math.abs((iso.mass||0) - targetMass);
                        if (diff < bestDiff) { best = iso; bestDiff = diff; }
                    }
                    return best;
                }

                // 辅助：对重核(Z≥90)尝试诱发裂变，返回true表示发生了裂变
                tryFissionOnHit(target, rayName) {
                    if (target.Z >= 90 && Math.random() < 0.4) {
                        this.addLog(`${rayName}诱发${target.symbol}(Z=${target.Z})裂变`);
                        this.fissionEffect(target);
                        return true;
                    }
                    return false;
                }

                alphaRayEffect(source, dir) {
                    for (let s = 1; s <= 2; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const t = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'alpha');
                            const hitStep = s, targetId = t.id;
                            setTimeout(() => {
                                const target = this.getPieceById(targetId);
                                if (!target || !this.pieces.includes(target)) return;
                                if (this.tryFissionOnHit(target, 'α粒子')) return;
                                const oldSym = target.symbol, oldMass = target.mass;
                                const newZ = target.Z + 2;
                                const newKey = this.findKeyByZ(newZ);
                                if (newKey && PIECE_DEFS[newKey]) {
                                    const targetMass = target.mass + 4;
                                    const iso = this.findClosestIsotope(newKey, targetMass);
                                    if (iso) {
                                        const spec = iso.stable ?
                                            {mass:iso.mass, radio:false, halfLife:0, decay:null, name:iso.name||null} :
                                            {mass:iso.mass, radio:true, halfLife:iso.halfLife||3, decay:iso.decay||'alpha', name:iso.name||null};
                                        const np = this.transformPiece(target, newKey);
                                        if (!np) return;
                                        np.mass = spec.mass; np.radioactive = spec.radio;
                                        np.halfLifeRounds = spec.halfLife; np.decayMode = spec.decay;
                                        np.isotopeName = spec.name;
                                        np.stunned = true; np.stunRounds = 1;
                                        const isoLabel = np.radioactive ? `[${this.nuclideText(np.symbol,np.mass)}]` : this.nuclideText(np.symbol,np.mass);
                                        this.addLog(`α粒子击中${this.nuclideText(oldSym,oldMass)} → 吸收嬗变为${isoLabel}`);
                                    } else {
                                        target.stunned = true; target.stunRounds = 1;
                                        this.addLog(`α射线击中${this.nuclideText(target.symbol,target.mass)}，无合适同位素，眩晕1回合`);
                                    }
                                } else {
                                    target.valence = Math.max(1, target.valence - 1);
                                    target.stunned = true; target.stunRounds = 1;
                                    this.addLog(`α射线击中${this.nuclideText(target.symbol,target.mass)}(Z=${target.Z})，无法嬗变，价电子-1`);
                                }
                                this.updateUI();
                            }, hitStep * 120 + 350);
                            break;
                        }
                    }
                }

                betaRayEffect(source, dir) {
                    for (let s = 1; s <= 4; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const t = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'beta');
                            const hitStep = s, targetId = t.id;
                            setTimeout(() => {
                                const target = this.getPieceById(targetId);
                                if (!target || !this.pieces.includes(target)) return;
                                if (this.tryFissionOnHit(target, 'β射线')) return;
                                const change = Math.random() < 0.5 ? 1 : -1;
                                target.bonusElectrons = Math.max(0, target.bonusElectrons + change);
                                // H电子数上限2
                                if (target.isHydrogenKing) {
                                    const maxBonus = Math.max(0, 2 - target.valence - target.sharedElectrons);
                                    target.bonusElectrons = Math.min(target.bonusElectrons, maxBonus);
                                }
                                target.bonusElectronRounds = 3;
                                this.addLog(`β射线击中${this.nuclideText(target.symbol,target.mass)}，额外电子${change > 0 ? '+1' : '-1'}(3回合)`);
                                this.updateUI();
                            }, hitStep * 120 + 350);
                            break;
                        }
                    }
                }

                gammaRayEffect(source, dir) {
                    for (let s = 1; s <= 8; s++) {
                        const nr = source.row + dir[0] * s, nc = source.col + dir[1] * s;
                        if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && this.board[nr][nc]) {
                            const t = this.board[nr][nc];
                            this.animateImpact(nr, nc, 'gamma');
                            const hitStep = s, targetId = t.id;
                            setTimeout(() => {
                                const target = this.getPieceById(targetId);
                                if (!target || !this.pieces.includes(target)) return;
                                if (this.tryFissionOnHit(target, 'γ射线')) return;
                                target.stunned = true; target.stunRounds = 1;
                                this.addLog(`γ射线击中${this.nuclideText(target.symbol,target.mass)}，眩晕1回合`);
                                this.updateUI();
                            }, hitStep * 120 + 350);
                            break;
                        }
                    }
                }

                fissionEffect(piece) {
                    // 重核裂变：Z≥90的元素裂变为两个较轻核素
                    if (piece.Z < 90) {
                        this.addLog(`${piece.symbol}尝试裂变失败，γ衰变`);
                        this.gammaRayEffect(piece, ALL_DIRS[Math.floor(Math.random() * 8)]);
                        return;
                    }
                    // 裂变产物为Z在30-60之间且有稳定同位素的元素
                    const fissionPool = Object.keys(PIECE_DEFS).filter(k => {
                        const d = PIECE_DEFS[k];
                        if (d.Z < 30 || d.Z > 60 || d.noble || d.isHK) return false;
                        const isos = ISOTOPES[k] || [];
                        return isos.some(i => i.stable);
                    });
                    const k1 = fissionPool[Math.floor(Math.random() * fissionPool.length)];
                    let k2 = fissionPool[Math.floor(Math.random() * fissionPool.length)];
                    while (k2 === k1 && fissionPool.length > 1) k2 = fissionPool[Math.floor(Math.random() * fissionPool.length)];
                    const cells = this.getAdjacentEmptyCells(piece.row, piece.col);
                    const makeIsotope = (k) => {
                        const isos = ISOTOPES[k] || [];
                        const stable = isos.find(i => i.stable) || isos[0] || {mass:0};
                        return {mass:stable.mass, radio:!!stable.radio, halfLife:stable.halfLife||0, decay:stable.decay||null, name:stable.name||null};
                    };
                    if (cells.length > 0) {
                        const iso1 = makeIsotope(k1);
                        const np1 = new Piece(k1, piece.color, this.getNextId(), iso1);
                        np1.row = cells[0].row; np1.col = cells[0].col; this.placePiece(np1);
                        this.addLog(` 裂变产物1：${this.nuclideText(np1.symbol,np1.mass)}(Z=${np1.Z})`);
                        if (cells.length > 1) {
                            const iso2 = makeIsotope(k2);
                            const np2 = new Piece(k2, piece.color, this.getNextId(), iso2);
                            np2.row = cells[1].row; np2.col = cells[1].col; this.placePiece(np2);
                            this.addLog(` 裂变产物2：${this.nuclideText(np2.symbol,np2.mass)}(Z=${np2.Z})`);
                        }
                    }
                    this.addLog(` ${piece.symbol}(Z=${piece.Z})发生裂变！`);
                    if (piece.isHydrogenKing) {
                        this.gameOver = true; this.winner = piece.color === COLOR_WHITE ? COLOR_BLACK : COLOR_WHITE;
                        this.addLog(`氢王(H)因裂变消失，${this.winner==='white'?'白方':'黑方'}获胜`);
                    }
                    this.removePiece(piece);
                }

                getAdjacentEmptyCells(r,c){ const res=[]; for(const[d,e]of ALL_DIRS){ const nr=r+d,nc=c+e; if(nr>=0&&nr<8&&nc>=0&&nc<8&&!this.board[nr][nc]) res.push({row:nr,col:nc}); } return res; }
                debugPlaceNewPiece(row, col, elementKey, isotopeSpec, color){
                    const np = new Piece(elementKey, color, this.getNextId(), isotopeSpec || null);
                    np.row = row; np.col = col;
                    this.placePiece(np);
                    const colorLabel = color === COLOR_WHITE ? '白' : '黑';
                    this.addLog(`[DEBUG] 在(${row},${col})添加了${this.nuclideText(np.symbol,np.mass)}(${colorLabel})`);
                    this.selectedPiece = null; this.legalMoves = [];
                    this.updateAllBonds(); this.updateUI();
                }

                getNextId(){ return Math.max(0,...this.pieces.map(p=>p.id))+1; }
                placePiece(p){ this.board[p.row][p.col]=p; this.pieces.push(p); (p.color===COLOR_WHITE?this.whitePieces:this.blackPieces).push(p); }
                removePiece(p){
                    if(!p)return;
                    this.board[p.row][p.col]=null;
                    const idx=this.pieces.indexOf(p); if(idx>=0) this.pieces.splice(idx,1);
                    const arr=p.color===COLOR_WHITE?this.whitePieces:this.blackPieces;
                    const ai=arr.indexOf(p); if(ai>=0) arr.splice(ai,1);
                    this.removeAllBondsFor(p);
                }

                decrementTimers() {
                    for(const p of this.pieces){
                        // bonusElectrons过期：清除额外电子（电荷由getter自动推导）
                        if(p.bonusElectronRounds>0){
                            p.bonusElectronRounds--;
                            if(p.bonusElectronRounds===0){
                                p.bonusElectrons = 0;
                            }
                        }
                        // chargeRounds过期：恢复给电子时减少的valence
                        if(p.chargeRounds>0){
                            p.chargeRounds--;
                            if(p.chargeRounds===0){
                                if(p.electronsGiven>0){
