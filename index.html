                                    p.valence += p.electronsGiven;
                                    p.electronsGiven = 0;
                                }
                            }
                        }
                        if(p.stunRounds>0){ p.stunRounds--; if(p.stunRounds===0) p.stunned=false; }
                    }
                }

                endTurn(skipSend){
                    this.updateAllBonds();
                    // 重置刚完成执子的玩家无步计数
                    if (this.currentTurn === COLOR_WHITE) this._whiteNoStepCount = 0;
                    else this._blackNoStepCount = 0;
                    this.currentTurn=this.currentTurn===COLOR_WHITE?COLOR_BLACK:COLOR_WHITE;
                    if(this.currentTurn===COLOR_WHITE){ this.roundNumber++; this.decrementTimers(); }
                    this.selectedPiece=null; this.legalMoves=[];
                    // 切换计时器
                    if (this.chessClock && this.chessClock.active) this.chessClock.switch();
                    this.resolveElectrostaticAttraction(); this.resolveRadioactiveDecay();
                    this.updateAllBonds();
                    this.updateUI();
                    // AI自动行棋
                    if (this.aiMode && !this.gameOver && this.currentTurn === this.aiColor) {
                        setTimeout(() => this.triggerAIMove(), 500);
                        return;
                    }
                    // 无步跳过循环
                    while (!this.gameOver && !this.hasAvailableSteps(this.currentTurn)) {
                        const colorName = this.currentTurn === COLOR_WHITE ? '白方' : '黑方';
                        if (this.currentTurn === COLOR_WHITE) this._whiteNoStepCount++;
                        else this._blackNoStepCount++;
                        const cnt = this.currentTurn === COLOR_WHITE ? this._whiteNoStepCount : this._blackNoStepCount;
                        this.addLog(`${colorName}无可用步骤，跳过执子(${cnt}/4)`);
                        if (cnt >= 4) {
                            this.gameOver = true; this.winner = 'draw';
                            this.addLog(`${colorName}连续4次执子无可用步骤，和棋！`);
                            this.updateUI(); break;
                        }
                        this.currentTurn = this.currentTurn === COLOR_WHITE ? COLOR_BLACK : COLOR_WHITE;
                        if (this.currentTurn === COLOR_WHITE){ this.roundNumber++; this.decrementTimers(); }
                        this.selectedPiece = null; this.legalMoves = [];
                        this.updateAllBonds();
                        this.updateUI();
                    }
                    if(!skipSend && this.onlineMode && this.onlineManager && !this._skipNextEndTurnSend){
                        this.onlineManager.send({type:'endTurn'});
                    }
                    this._skipNextEndTurnSend = false;
                    // AI自动行棋(处理无步跳过后的情况)
                    if (this.aiMode && !this.gameOver && this.currentTurn === this.aiColor) {
                        setTimeout(() => this.triggerAIMove(), 500);
                    }
                    if(this.gameOver) this.showVictory();
                }

                handleCellClick(row,col){
                    if(this.gameOver || this._animating) return;
                    if(this.onlineMode && this.onlineMyColor !== this.currentTurn) return;
                    // ===== Debug模式：自由移动棋子 =====
                    if(this.debugMode){
                        const piece=this.board[row][col];
                        if(this.selectedPiece){
                            // 已选中棋子：点击任意格移动（可吃子、可叠写）
                            if(piece && piece.id===this.selectedPiece.id){
                                // 点击自身取消选中
                                this.selectedPiece=null; this.legalMoves=[]; this.updateUI(); return;
                            }
                            const fromRow2 = this.selectedPiece.row, fromCol2 = this.selectedPiece.col;
                            if(piece) this.removePiece(piece); // debug下直接移除目标棋子
                            this.board[this.selectedPiece.row][this.selectedPiece.col]=null;
                            this.selectedPiece.row=row; this.selectedPiece.col=col;
                            this.board[row][col]=this.selectedPiece;
                            this.updateAllBonds();
                            this.selectedPiece=null; this.legalMoves=[];
                            this.addLog(`[DEBUG] 移动了${this.board[row][col].symbol}到(${row},${col})`);
                            this._animMovedInfos = [{
                                pieceId: this.board[row][col].id,
                                sdx: (fromCol2 - col) * 100 + '%',
                                sdy: (fromRow2 - row) * 100 + '%'
                            }];
                            this.updateUI();
                        } else {
                            // 未选中：点任意棋子选中（不限颜色、不限眩晕）
                            if(piece){
                                this.selectedPiece=piece; this.legalMoves=[]; this.updateUI();
                            }
                        }
                        return;
                    }
                    // ===== 正常模式 =====
                    const move=this.legalMoves.find(m=>m.row===row&&m.col===col);
                    if(move&&this.selectedPiece){ this.executeMove(this.selectedPiece,move); return; }
                    const piece=this.board[row][col];
                    if(piece&&piece.color===this.currentTurn&&!piece.stunned&&piece.totalElectrons>0){
                        this.selectedPiece=piece; this.legalMoves=this.getLegalMoves(piece); this.updateUI();
                        // 选中底线Li自动弹出升变面板
                        if(piece.symbol==='Li' && this.canNuclearTransform(piece)){
                            this.showNuclearChoices(piece);
                        }
                    } else { this.selectedPiece=null; this.legalMoves=[]; this.updateUI(); }
                }

                saveUndoState() {
                    const snap = {
                        board: this.board.map(row => [...row]),
                        pieces: this.pieces.map(p => ({
                            id: p.id, defKey: p.defKey, symbol: p.symbol, color: p.color, group: p.group,
                            row: p.row, col: p.col, valence: p.valence, baseValence: p.baseValence,
                            sharedElectrons: p.sharedElectrons, bonusElectrons: p.bonusElectrons,
                            bonusElectronRounds: p.bonusElectronRounds, chargeRounds: p.chargeRounds,
                            electronsGiven: p.electronsGiven, stunned: p.stunned, stunRounds: p.stunRounds,
                            bondedWith: p.bondedWith ? [...p.bondedWith] : null, noble: p.noble,
                            electroneg: p.electroneg, Z: p.Z, period: p.period, mass: p.mass,
                            radioactive: p.radioactive, decayMode: p.decayMode, halfLifeRounds: p.halfLifeRounds,
                            decayCounter: p.decayCounter, isHydrogenKing: p.isHydrogenKing,
                            isotopeName: p.isotopeName
                        })),
                        whiteIds: this.whitePieces.map(p => p.id),
                        blackIds: this.blackPieces.map(p => p.id),
                        bonds: this.bonds.map(b => ({...b})),
                        currentTurn: this.currentTurn,
                        roundNumber: this.roundNumber,
                        gameOver: this.gameOver,
                        winner: this.winner,
                        logEntries: [...this.logEntries],
                        _whiteNoStepCount: this._whiteNoStepCount,
                        _blackNoStepCount: this._blackNoStepCount,
                        _notationMoves: this._notationMoves.map(m => ({...m}))
                    };
                    this._undoStack.push(snap);
                    if (this._undoStack.length > 30) this._undoStack.shift();
                }

                undo() {
                    if (this.gameOver || this._animating || this._undoStack.length === 0) return false;
                    if (this.aiMode && this.currentTurn !== this.aiColor) {
                        // 人机模式：撤销两步（玩家+AI）
                        this._undoStack.pop();
                        if (this._undoStack.length === 0) return false;
                    }
                    const snap = this._undoStack.pop();
                    if (!snap) return false;
                    // 重建棋子对象映射
                    const pieceMap = new Map();
                    for (const p of this.pieces) pieceMap.set(p.id, p);
                    // 恢复棋盘
                    for (let r = 0; r < 8; r++)
                        for (let c = 0; c < 8; c++)
                            this.board[r][c] = snap.board[r][c] ? pieceMap.get(snap.board[r][c].id) : null;
                    // 恢复棋子属性
                    for (const pd of snap.pieces) {
                        let p = pieceMap.get(pd.id);
                        if (!p) {
                            // 被吃掉的棋子需要重建
                            p = new Piece(pd.defKey, pd.color, pd.id, null);
                            p.mass = pd.mass; p.radioactive = pd.radioactive;
                            p.decayMode = pd.decayMode; p.halfLifeRounds = pd.halfLifeRounds;
                            p.decayCounter = pd.decayCounter; p.isotopeName = pd.isotopeName;
                            this.pieces.push(p);
                            pieceMap.set(p.id, p);
                        }
                        p.row = pd.row; p.col = pd.col; p.valence = pd.valence;
                        p.sharedElectrons = pd.sharedElectrons; p.bonusElectrons = pd.bonusElectrons;
                        p.bonusElectronRounds = pd.bonusElectronRounds; p.chargeRounds = pd.chargeRounds;
                        p.electronsGiven = pd.electronsGiven; p.stunned = pd.stunned;
                        p.stunRounds = pd.stunRounds; p.bondedWith = pd.bondedWith;
                        if (pd.row >= 0 && pd.col >= 0) this.board[pd.row][pd.col] = p;
                    }
                    // 移除快照中不存在的棋子
                    const snapIds = new Set(snap.pieces.map(p => p.id));
                    for (let i = this.pieces.length - 1; i >= 0; i--) {
                        if (!snapIds.has(this.pieces[i].id)) {
                            const rp = this.pieces[i];
                            if (rp.row >= 0 && rp.col >= 0) this.board[rp.row][rp.col] = null;
                            this.pieces.splice(i, 1);
                        }
                    }
                    // 恢复颜色数组
                    this.whitePieces = this.pieces.filter(p => p.color === COLOR_WHITE);
                    this.blackPieces = this.pieces.filter(p => p.color === COLOR_BLACK);
                    // 恢复其他状态
                    this.bonds = snap.bonds;
                    this.currentTurn = snap.currentTurn;
                    this.roundNumber = snap.roundNumber;
                    this.gameOver = snap.gameOver;
                    this.winner = snap.winner;
                    this.logEntries = snap.logEntries;
                    this._whiteNoStepCount = snap._whiteNoStepCount;
                    this._blackNoStepCount = snap._blackNoStepCount;
                    this._notationMoves = snap._notationMoves;
                    this.selectedPiece = null;
                    this.legalMoves = [];
                    this._prevCharges.clear();
                    this.addLog('[回退] 已撤销上一步');
                    this.updateUI();
                    if (this.gameOver) {
                        document.getElementById('victoryOverlay').classList.remove('active');
                        this.gameOver = false; this.winner = null;
                    }
                    return true;
                }

                executeMove(piece,move){
                    // 保存回退状态
                    if (!this._remoteProcessing) this.saveUndoState();
                    this._animating = true;
                    setTimeout(() => { this._animating = false; this.updateUI(); }, 420);
                    const fromRow = piece.row, fromCol = piece.col;
                    const captured = move.isAttack ? move.targetPiece : null;
                    // 快照移动前角标状态（移动后可能因吃子而获得电荷/额外电子）
                    const prevBadges = {
                        charge: piece.charge,
                        bonusElectrons: piece.bonusElectrons,
                        stunned: piece.stunned
                    };
                    this.movePiece(piece,move.row,move.col,move.isAttack,captured);
                    // 记录棋谱和复盘数据（必须在gameOver检查之前，确保终局走法也被记录）
                    const capturedSymbol = captured ? captured.symbol : null;
                    this.recordMove(piece, fromRow, fromCol, move.row, move.col, move.isAttack, capturedSymbol);
                    const notationStr = this._notationMoves.length > 0
                        ? (this._notationMoves[this._notationMoves.length-1].black || this._notationMoves[this._notationMoves.length-1].white) : '';
                    this._gameRecord.moves.push({
                        moveIndex: this._gameRecord.moves.length + 1,
                        roundNumber: this.roundNumber,
                        color: piece.color,
                        pieceSymbol: piece.symbol,
                        pieceId: piece.id,
                        from: [fromRow, fromCol],
                        to: [move.row, move.col],
                        isCapture: move.isAttack,
                        targetSymbol: capturedSymbol,
                        notation: notationStr,
                        boardState: this.serializeBoard(),
                        evalRaw: null, evalCentipawns: null, winProbability: null,
                        bestMoveScore: null, classification: null, classificationIcon: null, evalDiff: null
                    });
                    // 动画：记录位移矢量和移动前状态，供CSS translate 使用
                    this._animMovedInfos = [{
                        pieceId: piece.id,
                        sdx: (fromCol - move.col) * 100 + '%',
                        sdy: (fromRow - move.row) * 100 + '%',
                        prevBadges: prevBadges
                    }];
                    if(this.gameOver){ this.updateUI(); this.showVictory(); return; }
                    if(this.onlineMode && this.onlineManager) {
                        this.onlineManager.send({type:'move',pieceId:piece.id,fromRow,fromCol,toRow:move.row,toCol:move.col,isAttack:move.isAttack,targetId:captured?captured.id:null,animInfo:this._animMovedInfos[0],endTurn:true});
                        this._skipNextEndTurnSend = true;
                    }
                    // 移动后刷新成键指示器overlay（不触发renderBoard，保留动画状态）
                    this._renderBondDisplayOverlay();
                    this._renderBondIndicatorOverlay();
                    // Li移动后到达底线 → 自动弹出升变面板 (debug模式跳过)
                    if(!this.debugMode && piece.symbol==='Li' && this.canNuclearTransform(piece)){
                        this.selectedPiece=piece; this.legalMoves=[];
                        this.updateUI(); this.showNuclearChoices(piece);
                        return;
                    }
                    this.endTurn();
                }

                proposeDraw(){
                    if(this.gameOver)return;
                    if(this.onlineMode && this.onlineManager){
                        this.onlineManager.send({type:'draw'});
                        this.addLog('已发送和棋请求');
                        return;
                    }
                    if(confirm('双方同意和棋吗？')){ this.gameOver=true; this.winner='draw'; this.addLog('双方同意和棋'); this.updateUI(); this.showVictory(); }
                }

                triggerGiveElectron(){
                    if(this.gameOver||!this.selectedPiece)return;
                    if(this.onlineMode && this.onlineMyColor !== this.currentTurn) return;
                    const targets=this.canGiveElectron(this.selectedPiece);
                    if(!targets||targets.length===0){ this.addLog('无法给电子'); return; }
                    if(targets.length===1){
                        this.giveElectron(this.selectedPiece,targets[0]);
                        if(this.onlineMode && this.onlineManager)
                            this.onlineManager.send({type:'giveElectron',metalId:this.selectedPiece.id,nonmetalId:targets[0].id});
                        this.selectedPiece=null; this.legalMoves=[]; this.updateUI();
                    }
                    else this.showGiveElectronChoices(this.selectedPiece,targets);
                }

                showGiveElectronChoices(metal,targets){
                    const modal=document.getElementById('nuclearModal'), content=document.getElementById('nuclearModalContent');
                    content.innerHTML='<h3>选择给电子目标</h3>';
                    targets.forEach(t=>{
                        const btn=document.createElement('button'); btn.className='choice-btn'; btn.textContent=`${t.symbol} (${t.row},${t.col})`;
                        btn.onclick=()=>{ this.giveElectron(metal,t); if(this.onlineMode && this.onlineManager) this.onlineManager.send({type:'giveElectron',metalId:metal.id,nonmetalId:t.id}); this.selectedPiece=null; this.legalMoves=[]; closeModal(modal); this.updateUI(); };
                        content.appendChild(btn);
                    });
                    const cls=document.createElement('button'); cls.className='btn-close'; cls.textContent='取消'; cls.onclick=()=>closeModal(modal); content.appendChild(cls);
                    modal.classList.add('active');
                }

                triggerNuclearTransform(){
                    if(this.gameOver||!this.selectedPiece||!this.canNuclearTransform(this.selectedPiece)){ this.addLog('请选择到达对方底线的Li棋子'); return; }
                    if(this.onlineMode && this.onlineMyColor !== this.currentTurn) return;
                    this.showNuclearChoices(this.selectedPiece);
                }

                showNuclearChoices(piece){
                    const modal=document.getElementById('nuclearModal'), content=document.getElementById('nuclearModalContent');
                    const isDebugAdd = !piece;
                    if (isDebugAdd) {
                        content.innerHTML = `<h3 style="margin:0 0 8px;">DEBUG: 添加棋子 → 选择核素
                            <span style="font-size:0.7em;display:inline-flex;gap:6px;margin-left:8px;">
                                <button class="choice-btn" id="dbgColorWhite" style="padding:2px 8px;font-size:0.85em;${this._debugAddColor===COLOR_WHITE?'background:#b0908a;color:#fff;':''}">白方</button>
                                <button class="choice-btn" id="dbgColorBlack" style="padding:2px 8px;font-size:0.85em;${this._debugAddColor===COLOR_BLACK?'background:#333;color:#fff;':''}">黑方</button>
                            </span></h3>`;
                    } else {
                        content.innerHTML='<h3 style="margin:0 0 8px;">Li核变 — 选择目标核素</h3>';
                    }
                    // Debug模式：颜色切换按钮事件
                    if (isDebugAdd) {
                        const btnW = content.querySelector('#dbgColorWhite');
                        const btnB = content.querySelector('#dbgColorBlack');
                        if (btnW) btnW.addEventListener('click', (e) => {
                            e.stopPropagation(); this._debugAddColor = COLOR_WHITE; this.showNuclearChoices(null);
                        });
                        if (btnB) btnB.addEventListener('click', (e) => {
                            e.stopPropagation(); this._debugAddColor = COLOR_BLACK; this.showNuclearChoices(null);
                        });
                    }

                    // 构建网格数据：{period,group}→cell
                    const grid = {}; // "row-col" → elementKey
                    for(const [k, pos] of Object.entries(PT_POS)){
                        grid[`${pos[0]}-${pos[1]}`]=k;
                    }

                    // 移动端水平滚动包装
                    const gridWrapper=document.createElement('div');
                    gridWrapper.className='pt-grid-wrapper';

                    const container=document.createElement('div');
                    container.className='pt-grid';

                    // 行标签
                    const rowLabels=['','1','2','3','4','5','6','7','镧系','锕系'];
                    const maxRows=9, maxCols=18;

                    for(let row=1; row<=maxRows; row++){
                        // 行标签单元格
                        const label=document.createElement('div');
                        label.className='pt-row-label';
                        label.textContent=rowLabels[row]||'';
                        container.appendChild(label);

                        for(let col=1; col<=maxCols; col++){
                            const cell=document.createElement('div');
                            const key=grid[`${row}-${col}`];
                            if(key && PIECE_DEFS[key]){
                                const d=PIECE_DEFS[key];
                                if(d.isHK){
                                    // H显示但不可选
                                    cell.className='pt-cell pt-hk';
                                    cell.title='H — 不可升变';
                                    cell.innerHTML=`<span class="pt-sym">H</span><span class="pt-z">1</span>`;
                                } else {
                                    const cls=d.group===METAL?'pt-metal':(d.noble?'pt-noble':'pt-nonmetal');
                                    cell.className=`pt-cell ${cls}`;
                                    cell.title=`${d.symbol} Z=${d.Z} 价:${d.valence} EN:${d.en}${d.radio?' [放射]':''}${d.noble?' 稀有气体':''}`;
                                    cell.innerHTML=`<span class="pt-sym">${d.symbol}</span><span class="pt-z">${d.Z}</span>${d.radio?'<span class="pt-rad">&bull;</span>':''}`;
                                    cell.onclick=()=>{
                                        this.showIsotopeChoices(piece, key);
                                    };
                                    // Debug模式：H也可选（氢王在debug下可添加）
                                    if (isDebugAdd && d.isHK) {
                                        cell.className = 'pt-cell pt-metal';
                                        cell.title = 'H Z=1 价:1 EN:2.20';
                                        cell.onclick = () => { this.showIsotopeChoices(null, key); };
                                    }
                                }
                            } else {
                                cell.className='pt-cell pt-missing';
                            }
                            container.appendChild(cell);
                        }
                    }

                    content.appendChild(gridWrapper);
                    gridWrapper.appendChild(container);

                    // 图例
                    const legend=document.createElement('div');
                    legend.style.cssText='margin-top:10px;font-size:0.7em;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;';
                    legend.innerHTML=`
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#fff3e0;border:1px solid #ffcc80;border-radius:2px;"></span>金属</span>
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:2px;"></span>非金属</span>
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#f3e5f5;border:1px solid #ce93d8;border-radius:2px;"></span>稀有气体</span>
                        <span style="display:flex;align-items:center;gap:3px;">&bull; 放射性</span>
                        <span style="display:flex;align-items:center;gap:3px;"><span style="display:inline-block;width:14px;height:14px;background:#ffebee;border:1px solid #ef9a9a;border-radius:2px;"></span>H(不可选)</span>
                    `;
                    content.appendChild(legend);

                    modal.classList.add('active');
                }

                showIsotopeChoices(piece, elementKey){
                    const modal=document.getElementById('nuclearModal'), content=document.getElementById('nuclearModalContent');
                    const d=PIECE_DEFS[elementKey];
                    const isotopes=ISOTOPES[elementKey]||[];

                    // 移除旧弹窗（如有）
                    const oldPopup=content.querySelector('.iso-popup-overlay');
                    if(oldPopup) oldPopup.remove();

                    const overlay=document.createElement('div');
                    overlay.className='iso-popup-overlay';
                    overlay.addEventListener('click', (e) => { if(e.target===overlay) overlay.remove(); });

                    const popup=document.createElement('div');
                    popup.className='iso-popup';

                    const metaParts=[`Z=${d.Z}`,`价电子:${d.valence}`,`EN:${d.en}`];
                    if(d.group===METAL) metaParts.push('金属');
                    if(d.noble) metaParts.push('稀有气体');

                    popup.innerHTML=`
                        <div class="iso-popup-title">选择同位素</div>
                        <div class="iso-popup-element">${d.symbol}</div>
                        <div class="iso-popup-meta">${metaParts.join(' · ')}</div>
                        <div class="iso-cards" id="isoCardsContainer"></div>
                        <div class="iso-popup-actions">
                            <button class="choice-btn" id="isoBackBtn">返回周期表</button>
                        </div>
                    `;
                    overlay.appendChild(popup);
                    content.appendChild(overlay);

                    const cardsContainer=popup.querySelector('#isoCardsContainer');
                    isotopes.forEach(iso=>{
                        const isStable=iso.stable||false;
                        const card=document.createElement('div');
                        card.className='iso-card '+(isStable?'iso-stable':'iso-radio');
                        const symHTML=iso.name
                            ? `<sup>${iso.mass}</sup>${d.symbol}<span style="font-size:0.6em;">(${iso.name})</span>`
                            : `<sup>${iso.mass}</sup>${d.symbol}`;
                        card.innerHTML=`
                            <div class="iso-nuclide">${symHTML}</div>
                            <div class="iso-detail">${isStable?'稳定':(iso.decay||'?')+'衰变'}</div>
                            ${!isStable?`<div class="iso-detail">t½:${iso.halfLife||'?'}r</div>`:''}
                            <div class="iso-mass-badge">A=${iso.mass}</div>
                        `;
                        card.addEventListener('click', ()=>{
                            const spec=isStable?{mass:iso.mass,radio:false,halfLife:0,decay:null,name:iso.name||null}
                                :{mass:iso.mass,radio:true,halfLife:iso.halfLife||3,decay:iso.decay||'alpha',name:iso.name||null};
                            if (this._debugAddTarget) {
                                this.debugPlaceNewPiece(this._debugAddTarget.row, this._debugAddTarget.col, elementKey, spec, this._debugAddColor);
                                this._debugAddTarget = null;
                            } else {
                                this.nuclearTransform(piece,elementKey,spec);
                                this.selectedPiece=null; this.legalMoves=[];
                                closeModal(modal); this.endTurn();
                                return;
                            }
                            closeModal(modal);
                        });
                        cardsContainer.appendChild(card);
                    });

                    popup.querySelector('#isoBackBtn').addEventListener('click', ()=>{ overlay.remove(); });
                }

                showVictory(){
                    const icon = document.getElementById('victoryIcon');
                    const title = document.getElementById('victoryTitle');
                    const winner = document.getElementById('victoryWinner');
                    const subtitle = document.getElementById('victorySubtitle');
                    const roundInfo = `第 ${this.roundNumber} 回合`;
                    if(this.winner==='draw'){
                        icon.innerHTML = '<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-draw"/></svg>';
                        title.textContent = '对局结束';
                        winner.textContent = '和棋';
                        winner.className = 'victory-winner win-draw';
                        subtitle.textContent = `双方握手言和 · ${roundInfo}`;
                    } else {
                        const isWhite = this.winner==='white';
                        icon.innerHTML = isWhite ? '<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-white-win"/></svg>' : '<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-black-win"/></svg>';
                        title.textContent = '对局结束';
                        winner.textContent = isWhite ? '白方获胜' : '黑方获胜';
                        winner.className = 'victory-winner ' + (isWhite ? 'win-white' : 'win-black');
                        const reasonText = this.winReason === 'timeout' ? `${isWhite ? '黑方' : '白方'}超时判负` : '氢王(H)被吃';
                        subtitle.textContent = `${reasonText} · ${roundInfo}`;
                    }
                    this._gameRecord.result = this.winner === 'draw' ? 'draw' : this.winner;
                    document.getElementById('victoryOverlay').classList.add('active');
                    document.getElementById('victoryReviewBtn').style.display = '';
                }

                resetGame(){
                    document.getElementById('victoryOverlay').classList.remove('active');
                    document.getElementById('victoryReviewBtn').style.display = 'none';
                    document.getElementById('aiDiffRow').style.display = 'none';
                    closeModal(document.getElementById('nuclearModal'));
                    closeModal(document.getElementById('rulesModal'));
                    // 关闭AI模式
                    this.aiMode = false;
                    this.ai = null;
                    this.aiColor = 'black';
                    // 停止计时器
                    if (this.chessClock) { this.chessClock.pause(); this.chessClock = null; }
                    // 清除复盘数据
                    this._gameRecord = { moves: [], createdAt: Date.now(), result: null, initialBoardState: null };
                    this._reviewController = null;
                    this._animating = false;
                    this._animMovedInfos = [];
                    this._skipNextEndTurnSend = false;
                    this._remoteProcessing = false;
                    this.winReason = null;
                    this.initBoard(); this.currentTurn=COLOR_WHITE; this.updateUI(); this.addLog('游戏已重置！白方先行。');
                    if(this.onlineMode && this.onlineManager) this.onlineManager.send({type:'reset'});
                    // 重置UI按钮状态
                    const btnAI = document.getElementById('btnAI');
                    if (btnAI) btnAI.classList.remove('active');
                    const btnClock = document.getElementById('btnClock');
