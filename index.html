                openReview() {
                    if (!this._reviewController) {
                        this._reviewController = new ReviewController(this);
                    }
                    this._reviewController.open();
                }

                addLog(msg){ this.logEntries.push({msg,round:this.roundNumber}); if(this.logEntries.length>80) this.logEntries.shift(); }

                // 动画状态标记
                _animMovedInfos = [];

                updateUI(){ this.renderBoard(); requestAnimationFrame(() => this.updateSidePanel()); }

                // 通用：计算两格包围框（百分比定位），返回创建的frame元素
                _renderBondFrame(overlay, r1, c1, r2, c2, frameClass) {
                    const pct = 100 / 8;
                    const inset = 0.05;
                    const frame = document.createElement('div');
                    frame.className = frameClass;
                    const dr = r2 - r1, dc = c2 - c1;
                    const isDiagonal = (dr !== 0 && dc !== 0);
                    if (isDiagonal) {
                        const midR = (r1 + r2) / 2 + 0.5;
                        const midC = (c1 + c2) / 2 + 0.5;
                        const angle = dr * dc > 0 ? 45 : -45;
                        const diagLen = Math.sqrt(2);
                        const pieceW = 0.74;
                        const frameW = (diagLen + pieceW) * pct;
                        const frameH = pieceW * pct;
                        // 裁剪到棋盘内
                        let left = midC * pct - frameW / 2;
                        let top = midR * pct - frameH / 2;
                        left = Math.max(-2, Math.min(102 - frameW, left));
                        top = Math.max(-2, Math.min(102 - frameH, top));
                        frame.style.left = left + '%';
                        frame.style.top = top + '%';
                        frame.style.width = frameW + '%';
                        frame.style.height = frameH + '%';
                        frame.style.transform = `rotate(${angle}deg)`;
                    } else {
                        const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
                        const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
                        const w = (maxC - minC + 1) * pct - inset * 2;
                        const h = (maxR - minR + 1) * pct - inset * 2;
                        frame.style.left = (minC * pct + inset) + '%';
                        frame.style.top = (minR * pct + inset) + '%';
                        frame.style.width = w + '%';
                        frame.style.height = h + '%';
                    }
                    overlay.appendChild(frame);
                    return frame;
                }

                // 已存在键合显示（共价键灰色实线框 / 金属键拼接大圆角矩形）
                _renderBondDisplayOverlay() {
                    const overlay = document.getElementById('bondDisplayOverlay');
                    if (!overlay) return;
                    overlay.innerHTML = '';
                    const drawnPairs = new Set();
                    const covalentBonds = this.bonds.filter(b => b.type !== 'metallic');
                    const metallicBonds = this.bonds.filter(b => b.type === 'metallic');

                    // 共价键：逐对渲染
                    for (const b of covalentBonds) {
                        const p1 = this.getPieceById(b.p1), p2 = this.getPieceById(b.p2);
                        if (!p1 || !p2) continue;
                        const pairKey = Math.min(b.p1, b.p2) + '_' + Math.max(b.p1, b.p2);
                        if (drawnPairs.has(pairKey)) continue;
                        drawnPairs.add(pairKey);
                        this._renderBondFrame(overlay, p1.row, p1.col, p2.row, p2.col, 'bond-display-frame');
                    }

                    // 金属键：按集群渲染拼接大框
                    if (metallicBonds.length > 0) {
                        this._renderMetallicClusters(overlay, metallicBonds);
                    }
                }

                // 金属键集群：SVG path 外边界（innerHTML方式，兼容性最好）
                _renderMetallicClusters(overlay, metallicBonds) {
                    const parent = new Map();
                    const find = (x) => { if (!parent.has(x)) parent.set(x, x); if (parent.get(x) !== x) parent.set(x, find(parent.get(x))); return parent.get(x); };
                    const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) parent.set(ra, rb); };
                    for (const b of metallicBonds) union(b.p1, b.p2);

                    const clusters = new Map();
                    const allIds = new Set(metallicBonds.flatMap(b => [b.p1, b.p2]));
                    for (const id of allIds) {
                        const root = find(id);
                        if (!clusters.has(root)) clusters.set(root, new Set());
                        clusters.get(root).add(id);
                    }

                    const pct = 100 / 8; // 8x8 网格基数
                    
                    // 【核心参数修正】
                    const padding = 0;   // 设为 0，使线条恰好踩在格子的正交边界上，解决“线太靠内”的问题
                    const radius = 0.22; // 半径设大一点，在对角线形成宽敞的圆弧桥梁连接

                    for (const ids of clusters.values()) {
                        const cells = [...ids].map(id => this.getPieceById(id)).filter(p => p);
                        if (cells.length < 2) continue;
                        
                        const cellSet = new Set(cells.map(p => `${p.row},${p.col}`));
                        
                        // 1. 提取所有无相邻格子的外边缘段（顺时针）
                        const segs = [];
                        for (const key of cellSet) {
                            const [r, c] = key.split(',').map(Number);
                            if (!cellSet.has(`${r-1},${c}`)) segs.push({x1:c, y1:r, x2:c+1, y2:r});       // 上
                            if (!cellSet.has(`${r},${c+1}`)) segs.push({x1:c+1, y1:r, x2:c+1, y2:r+1});   // 右
                            if (!cellSet.has(`${r+1},${c}`)) segs.push({x1:c+1, y1:r+1, x2:c, y2:r+1});   // 下
                            if (!cellSet.has(`${r},${c-1}`)) segs.push({x1:c, y1:r+1, x2:c, y2:r});       // 左
                        }
                        if (segs.length === 0) continue;

                        // 2. 建立图连接
                        const adj = new Map();
                        for (const s of segs) {
                            const k = `${s.x1},${s.y1}`;
                            if (!adj.has(k)) adj.set(k, []);
                            adj.get(k).push(s);
                        }

                        // 3. 追踪完美闭环，解决对角线自动连通（采用最大外夹角寻路）
                        const visitedSegs = new Set();
                        const paths = [];

                        for (const startSeg of segs) {
                            const segKey = `${startSeg.x1},${startSeg.y1}-${startSeg.x2},${startSeg.y2}`;
                            if (visitedSegs.has(segKey)) continue;

                            const pts = [];
                            let curr = startSeg;
                            pts.push({x: curr.x1, y: curr.y1});

                            while (true) {
                                const k = `${curr.x1},${curr.y1}-${curr.x2},${curr.y2}`;
                                if (visitedSegs.has(k)) break;
                                visitedSegs.add(k);
                                pts.push({x: curr.x2, y: curr.y2});

                                const nextK = `${curr.x2},${curr.y2}`;
                                const options = adj.get(nextK) || [];

                                if (options.length === 0) break;
                                if (options.length === 1) {
                                    curr = options[0];
                                } else {
                                    // 【破局点】遇到对角交叉点时，永远选择使面积最大的"左转"方向将不同对角的格子囊括进来
                                    const angle_in = Math.atan2(curr.y2 - curr.y1, curr.x2 - curr.x1);
                                    let best_seg = null;
                                    let max_angle = -999;
                                    
                                    for (const opt of options) {
                                        const angle_out = Math.atan2(opt.y2 - opt.y1, opt.x2 - opt.x1);
                                        let diff = angle_out - angle_in;
                                        // 转换为正角度 (0 ~ 2PI)
                                        while (diff < 0) diff += Math.PI * 2;
                                        while (diff >= Math.PI * 2) diff -= Math.PI * 2;
                                        
                                        if (diff > max_angle) {
                                            max_angle = diff;
                                            best_seg = opt;
                                        }
                                    }
                                    curr = best_seg;
                                }
                            }
                            pts.pop(); // 去重首尾点
                            paths.push(pts);
                        }

                        let pathD = '';

                        // 4. 计算内外凹凸圆角
                        for (const pts of paths) {
                            const corners = [];
                            const len = pts.length;
                            for (let i = 0; i < len; i++) {
                                const prev = pts[(i - 1 + len) % len];
                                const curr = pts[i];
                                const next = pts[(i + 1) % len];
                                // 去除多余的共线点，只保留转弯角
                                const dx1 = curr.x - prev.x;
                                const dy1 = curr.y - prev.y;
                                const dx2 = next.x - curr.x;
                                const dy2 = next.y - curr.y;
                                if (dx1 * dy2 - dy1 * dx2 !== 0) corners.push(curr);
                            }

                            if (corners.length < 4) continue;

                            const N = corners.length;
                            const insetCorners = corners.map((V, i) => {
                                const prev = corners[(i - 1 + N) % N];
                                const next = corners[(i + 1) % N];

                                // 规整化向量方向
                                const dx_in = Math.sign(V.x - prev.x);
                                const dy_in = Math.sign(V.y - prev.y);
                                const dx_out = Math.sign(next.x - V.x);
                                const dy_out = Math.sign(next.y - V.y);

                                // 基础顶点 (当 padding 为 0 时，这里不会往内收缩)
                                const nx_in = -dy_in, ny_in = dx_in;
                                const nx_out = -dy_out, ny_out = dx_out;
                                const vx = V.x + (nx_in + nx_out) * padding;
                                const vy = V.y + (ny_in + ny_out) * padding;

                                // 叉乘判定内外角：内凹角的圆弧将自动“削平”那个绝对的交点，化解干涉
                                const cross = dx_in * dy_out - dy_in * dx_out;
                                const sweep = cross > 0 ? 1 : 0;

                                // 获取圆角截断点
                                const Ax = vx - dx_in * radius;
                                const Ay = vy - dy_in * radius;
                                const Bx = vx + dx_out * radius;
                                const By = vy + dy_out * radius;

                                return { Ax, Ay, Bx, By, sweep };
                            });

                            // 5. 组合绘制命令
                            pathD += `M ${insetCorners[0].Ax * pct} ${insetCorners[0].Ay * pct} `;
                            for (let i = 0; i < N; i++) {
                                const c = insetCorners[i];
                                const nextC = insetCorners[(i + 1) % N];

                                pathD += `A ${radius * pct} ${radius * pct} 0 0 ${c.sweep} ${c.Bx * pct} ${c.By * pct} `;
                                pathD += `L ${nextC.Ax * pct} ${nextC.Ay * pct} `;
                            }
                            pathD += 'Z ';
                        }

                        if (!pathD) continue;

                        const svgHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;" xmlns="http://www.w3.org/2000/svg">
                            <path d="${pathD}" fill="none" stroke="#c4a090" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" opacity="0.5"/>
                        </svg>`;
                        overlay.insertAdjacentHTML('beforeend', svgHTML);
                    }
                }

                // 成键指示器（选中棋子时预览共价键/金属键，灰色虚线框）
                _renderBondIndicatorOverlay() {
                    const overlay = document.getElementById('bondIndicatorOverlay');
                    if (!overlay) return;
                    overlay.innerHTML = '';
                    if (!this.selectedPiece || this.selectedPiece.noble) return;
                    // 对每个合法落点预览：模拟棋子位于该落点时会形成的成键，框从落点画到成键对象
                    const piece = this.selectedPiece;
                    const drawn = new Set();
                    for (const move of this.legalMoves) {
                        const excludeId = (move.isAttack && move.targetPiece) ? move.targetPiece.id : null;
                        const targets = this._bondTargetsAt(piece, move.row, move.col, excludeId);
                        for (const tid of targets) {
                            const target = this.getPieceById(tid);
                            if (!target) continue;
                            const key = move.row + ',' + move.col + '-' + tid;
                            if (drawn.has(key)) continue;
                            drawn.add(key);
                            this._renderBondFrame(overlay, move.row, move.col, target.row, target.col, 'bond-indicator-frame');
                        }
                    }
                }

                renderBoard(){
                    const boardEl=document.getElementById('board');
                    const frag = document.createDocumentFragment();
                    for(let r=0;r<8;r++) for(let c=0;c<8;c++){
                        const cell=document.createElement('div');
                        cell.className='cell ' + ((r+c)%2===0?'white-cell':'black-cell');
                        cell.dataset.r = r; cell.dataset.c = c;
                        cell.addEventListener('click',()=>this.handleCellClick(r,c));
                        if(this.selectedPiece&&this.selectedPiece.row===r&&this.selectedPiece.col===c) cell.classList.add('highlight-selected');
                        const move=this.legalMoves.find(m=>m.row===r&&m.col===c);
                        if(move) cell.classList.add(move.isAttack?'attack-move':'legal-move');
                        const piece=this.board[r][c];
                        if(piece){
                            /* 键合显示已迁移至bond-display-overlay层 */
                            if(piece.stunned) cell.classList.add('stunned-cell');
                            const wrapper=document.createElement('div'); wrapper.className='piece-wrapper';
                            const dirs=piece.getPriorityDirections();
                            const flipped = this.boardFlipped;
                            const displayDirs = flipped ? dirs.map(([dr,dc])=>[-dr,-dc]) : dirs;
                            const radPct = 38;
                            displayDirs.forEach(([dr,dc])=>{
                                const angle=-Math.atan2(-dr,dc);
                                const dot=document.createElement('div');
                                dot.className='direction-dot';
                                const dotColor = piece.color === COLOR_WHITE ? '#1a1a1a' : '#f2f2f2';
                                dot.style.background = dotColor;
                                dot.style.boxShadow = `0 0 4px ${dotColor}`;
                                dot.style.left = (50 + Math.cos(angle) * radPct) + '%';
                                dot.style.top  = (50 + Math.sin(angle) * radPct) + '%';
                                wrapper.appendChild(dot);
                            });
                            // 动画：wrapper整体平移（棋子+方向点+电荷标签一起运动）
                            const animEntry = (this._animMovedInfos).find(a => a.pieceId === piece.id);
                            if (animEntry) {
                                wrapper.classList.add('just-moved');
                                const fx = flipped ? -1 : 1;
                                wrapper.style.setProperty('--sdx', `calc(${animEntry.sdx} * ${fx})`);
                                wrapper.style.setProperty('--sdy', `calc(${animEntry.sdy} * ${fx})`);
                            }
                            const pieceEl=document.createElement('div');
                            pieceEl.className='piece ' + (piece.color===COLOR_WHITE?'white-piece':'black-piece');
                            const massLabel = piece.mass ? `<sup style="font-size:0.5em;">${piece.mass}</sup>` : '';
                            pieceEl.innerHTML=`<span class="symbol">${massLabel}${piece.symbol}</span><span class="info-tiny">${piece.electroneg.toFixed(1)}</span>`;
                            // 动画期间：使用移动前的角标状态，避免新获得的电荷/电子角标提前显示
                            const badgeState = (animEntry && animEntry.prevBadges)
                                ? animEntry.prevBadges
                                : { charge: piece.charge, bonusElectrons: piece.bonusElectrons, stunned: piece.stunned };
                            if(badgeState.charge>0){ const cm=document.createElement('span'); cm.className='charge-mark charge-cation'; cm.textContent=(badgeState.charge>1?badgeState.charge:'')+'+'; const prev=this._prevCharges.get(piece.id); if(prev!==badgeState.charge){ cm.classList.add('charge-new'); this._prevCharges.set(piece.id,badgeState.charge); } pieceEl.appendChild(cm); }
                            else if(badgeState.charge<0){ const cm=document.createElement('span'); cm.className='charge-mark charge-anion'; cm.textContent=(badgeState.charge<-1?Math.abs(badgeState.charge):'')+'\u2212'; const prev=this._prevCharges.get(piece.id); if(prev!==badgeState.charge){ cm.classList.add('charge-new'); this._prevCharges.set(piece.id,badgeState.charge); } pieceEl.appendChild(cm); }
                            else { this._prevCharges.set(piece.id, 0); }
                            if(badgeState.stunned){ const si=document.createElement('span'); si.className='stun-icon'; si.innerHTML='<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-stun"/></svg>'; pieceEl.appendChild(si); }
                            if(badgeState.bonusElectrons>0){ const bo=document.createElement('span'); bo.className='bonus-electron-badge'; bo.textContent='×'+piece.bonusElectronRounds; pieceEl.appendChild(bo); }
                            if(badgeState.charge>0){ const cr=document.createElement('span'); cr.className='charge-round-badge'; const prevC=this._prevCharges.get(piece.id); if(prevC!==badgeState.charge){ cr.classList.add('charge-new'); } cr.textContent='×'+piece.chargeRounds; pieceEl.appendChild(cr); }
                            if(piece.radioactive){ const ra=document.createElement('span'); ra.className='radioactive-dot'; ra.textContent='\u2022'; pieceEl.appendChild(ra); }
                            wrapper.appendChild(pieceEl);
                            cell.appendChild(wrapper);
                        }
                        frag.appendChild(cell);
                    }
                    boardEl.replaceChildren(frag);
                    // 已存在键合显示：灰色实线圆角矩形框
                    this._renderBondDisplayOverlay();
                    // 成键指示器：灰色虚线圆角矩形框（选中棋子时预览）
                    this._renderBondIndicatorOverlay();
                    // 清除一次性动画标记
                    this._animMovedInfos = [];
                }

                updateSidePanel(){
                    const ti=document.getElementById('turnIndicator');
                    if(this.gameOver){
                        ti.textContent=this.winner==='draw'?'和棋':`${this.winner==='white'?'白方':'黑方'}获胜`;
                        ti.className='turn-indicator '+(this.winner==='white'?'turn-white':'turn-black');
                    } else {
                        ti.textContent=this.currentTurn===COLOR_WHITE?'白方执子':'黑方执子';
                        ti.className='turn-indicator '+(this.currentTurn===COLOR_WHITE?'turn-white':'turn-black');
                    }
                    document.getElementById('roundCounter').textContent=`回合: ${this.roundNumber}`;
                    const selInfo=document.getElementById('selectedInfo');
                    if(this.selectedPiece){
                        const p=this.selectedPiece;
                        const isotopeInfo = p.radioactive ? ` ${this.nuclideText(p.symbol,p.mass)}` : (p.isotopeName ? ` ${this.nuclideText(p.symbol,p.mass)}(${p.isotopeName})` : '');
                        selInfo.innerHTML=`选中: <b>${p.symbol}</b> (${p.color==='white'?'白':'黑'}) Z=${p.Z}${isotopeInfo}<br>价:${p.valence} 总电子:${p.totalElectrons} EN:${p.electroneg.toFixed(2)}<br>方向:${p.effectiveMoveDirs} 步数:${p.effectiveMoveSteps}<br>电荷:${p.charge>0?'+'+p.charge:p.charge<0?p.charge:'0'}${p.charge!==0?'('+p.chargeRounds+'回合)':''} ${p.stunned?'[眩晕]':''}${p.noble?' [稀有气体]':''}<br>额外电子:${p.bonusElectrons}(${p.bonusElectrons>0?p.bonusElectronRounds+'回合':'0'})${p.radioactive?' ['+p.decayMode+'衰变 t½:'+p.halfLifeRounds+'r '+this.nuclideText(p.symbol,p.mass)+']':''}`;
                    } else selInfo.textContent='未选中棋子';
                    const bl=document.getElementById('bondList');
                    bl.innerHTML=this.bonds.length?this.bonds.map(b=>{
                        const p1=this.getPieceById(b.p1), p2=this.getPieceById(b.p2);
                        if(!p1||!p2)return'';
                        return `<div class="bond-item">${b.type==='metallic'?'金属键':'共价键'}: ${p1.symbol}(${p1.color==='white'?'白':'黑'})↔${p2.symbol}(${p2.color==='white'?'白':'黑'}) [+${b.shared}e⁻]</div>`;
                    }).filter(s=>s).join(''):'暂无键合';
                    const lp=document.getElementById('logPanel');
                    lp.innerHTML=this.logEntries.slice(-25).map(l=>`<div class="log-entry">[R${l.round}] ${l.msg}</div>`).join('');
                    lp.scrollTop=lp.scrollHeight;
                    document.getElementById('btnGiveElectron').style.display=(this.selectedPiece&&this.canGiveElectron(this.selectedPiece)?.length)?'block':'none';
                    document.getElementById('btnNuclear').style.display=(this.selectedPiece&&this.canNuclearTransform(this.selectedPiece))?'block':'none';
                }

                // ========== 计时器显示 ==========
                updateClockDisplay() {
                    const fmt = (ms) => {
                        if (ms <= 0) return '0:00';
                        const totalSec = Math.ceil(ms / 1000);
                        const m = Math.floor(totalSec / 60);
                        const s = totalSec % 60;
                        return m + ':' + String(s).padStart(2, '0');
                    };
                    const wEl = document.getElementById('clockWhite');
                    const bEl = document.getElementById('clockBlack');
                    if (this.chessClock) {
                        if (wEl) wEl.textContent = fmt(this.chessClock.whiteMs);
                        if (bEl) bEl.textContent = fmt(this.chessClock.blackMs);
                    } else {
                        if (wEl) wEl.textContent = '--:--';
                        if (bEl) bEl.textContent = '--:--';
                    }
                    // 高亮当前执子方（仅计时运行时）
                    const running = this.chessClock && this.chessClock.running;
                    if (wEl) wEl.classList.toggle('clock-active', this.currentTurn === 'white' && running);
                    if (bEl) bEl.classList.toggle('clock-active', this.currentTurn === 'black' && running);
                }

                // ========== 棋谱记录 ==========
                recordMove(piece, fromRow, fromCol, toRow, toCol, isCapture, targetSymbol) {
                    const colLabels = ['a','b','c','d','e','f','g','h'];
                    const fromFile = colLabels[fromCol];
                    const toFile = colLabels[toCol];
                    const fromRank = 8 - fromRow;
                    const toRank = 8 - toRow;
                    let notation = '';
                    if (isCapture && targetSymbol) {
                        notation = `${piece.symbol} ${fromFile}${fromRank} x ${targetSymbol} ${toFile}${toRank}`;
                    } else {
                        notation = `${piece.symbol} ${fromFile}${fromRank} - ${toFile}${toRank}`;
                    }
                    const moveNum = this.roundNumber;
                    const isWhite = piece.color === 'white';
                    if (isWhite) {
                        this._notationMoves.push({ moveNum, white: notation, black: '' });
                    } else {
                        const last = this._notationMoves[this._notationMoves.length - 1];
                        if (last && last.black === '') {
                            last.black = notation;
                        } else {
                            this._notationMoves.push({ moveNum, white: '…', black: notation });
                        }
                    }
                    this.updateNotationDisplay();
                }

                updateNotationDisplay() {
                    const nl = document.getElementById('notationList');
                    if (!nl) return;
                    const moves = this._notationMoves.slice(-30);
                    nl.innerHTML = moves.map(m =>
                        `<div class="notation-entry"><span class="notation-num">${m.moveNum}.</span><span>${m.white}</span><span>${m.black}</span></div>`
                    ).join('');
                    nl.scrollTop = nl.scrollHeight;
                }

                // ========== AI对战 ==========
                async triggerAIMove() {
                    if (!this.ai || this.gameOver || this.currentTurn !== this.aiColor) return;
                    if (this._animating) { setTimeout(() => this.triggerAIMove(), 200); return; }
                    // 暂停计时器，UI显示"思考中"
                    if (this.chessClock && this.chessClock.running) this.chessClock.pause();
                    const ti = document.getElementById('turnIndicator');
                    const origText = ti.textContent;
                    ti.textContent = this.aiColor === 'white' ? '白方思考中...' : '黑方思考中...';
                    ti.style.opacity = '0.7';
                    this.updateUI();
                    // yield to UI，让棋盘渲染完成
                    await new Promise(r => setTimeout(r, 80));
                    const bestMove = this.ai.findBestMove();
                    // 恢复计时器
                    if (this.chessClock && this.chessClock.active && !this.chessClock.running) {
                        this.chessClock.running = true;
                        this.chessClock.lastTick = Date.now();
                        this.chessClock._tick();
                    }
                    ti.textContent = origText;
                    ti.style.opacity = '';
                    if (!bestMove) {
                        this.addLog('AI无可用移动，跳过执子');
                        this.endTurn();
                        return;
                    }
                    await new Promise(r => setTimeout(r, 350));
                    const p = bestMove.piece;
                    const m = bestMove.move;
                    const realPiece = this.getPieceById(p.id);
                    if (!realPiece) { this.endTurn(); return; }
                    // 重新获取实际的合法移动和目标
                    const realMoves = this.getLegalMoves(realPiece);
                    const realMove = realMoves.find(rm => rm.row === m.row && rm.col === m.col);
                    if (!realMove) { this.endTurn(); return; }
                    this.executeMove(realPiece, realMove);
                    // 记录AI评分用于复盘
                    this._moveHistory.push({
                        round: this.roundNumber,
                        color: realPiece.color,
                        piece: realPiece.symbol,
                        from: [p.row, p.col],
                        to: [m.row, m.col],
                        capture: m.isAttack,
                        eval: bestMove.evalScore
                    });
                }

                showMoveReview() {
                    const history = this._moveHistory.slice(-30);
                    const modal = document.getElementById('rulesModal');
                    const content = document.getElementById('rulesModalContent');
                    if (!history.length) {
                        content.innerHTML = '<h3>对局回顾</h3><p>暂无AI对局记录</p>';
                    } else {
                        const colLabels = ['a','b','c','d','e','f','g','h'];
                        content.innerHTML = `<h3>对局回顾</h3>
                            <div style="max-height:60vh;overflow-y:auto;font-size:0.78em;text-align:left;">
                            ${history.map(h => `<div style="padding:4px 6px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;">
                                <span>[R${h.round}] ${h.color==='white'?'白':'黑'} ${h.piece} ${colLabels[h.from[1]]}${8-h.from[0]}→${colLabels[h.to[1]]}${8-h.to[0]} ${h.capture?'[吃子]':''}</span>
                                <span style="color:${h.eval>0?'#6a9a6a':h.eval<0?'#b87878':'#999'};">评分:${h.eval>0?'+':''}${h.eval.toFixed(0)}</span>
                            </div>`).join('')}
                            </div>`;
                    }
                    modal.classList.add('active');
                }
            }

            // ========== 复盘控制器 ==========
            class ReviewController {
                constructor(game) {
                    this.game = game;
                    this.analyzer = null;
                    this._result = null;
                    this._currentIdx = 0;
                    this._totalMoves = 0;
                    this._dom = {};
                    this._bound = false;
                }
                _bind() {
                    if (this._bound) return;
                    const ids = ['reviewOverlay','reviewBoard','reviewResult','reviewSlider',
                        'reviewMoveNum','reviewMoveNotation','reviewMoveEval','reviewMoveList',
                        'reviewChartPath','reviewChartArea','reviewAccWhiteFill','reviewAccWhiteVal',
                        'reviewAccBlackFill','reviewAccBlackVal','countBrilliant','countGreat',
                        'countInaccuracy','countMistake','countBlunder'];
                    for (const id of ids) this._dom[id] = document.getElementById(id);
                    document.getElementById('reviewCloseBtn').addEventListener('click',()=>this.close());
                    document.getElementById('reviewBtnClose').addEventListener('click',()=>this.close());
                    document.getElementById('reviewBtnNewGame').addEventListener('click',()=>{ this.close(); this.game.resetGame(); });
                    document.getElementById('reviewBtnFirst').addEventListener('click',()=>this.goTo(0));
                    document.getElementById('reviewBtnPrev').addEventListener('click',()=>this.goTo(Math.max(0,this._currentIdx-1)));
                    document.getElementById('reviewBtnNext').addEventListener('click',()=>this.goTo(Math.min(this._totalMoves,this._currentIdx+1)));
                    document.getElementById('reviewBtnLast').addEventListener('click',()=>this.goTo(this._totalMoves));
                    const slider = this._dom.reviewSlider;
                    slider.addEventListener('input',()=>this.goTo(parseInt(slider.value)));
                    document.addEventListener('keydown',(e)=>{
                        if (!this._dom.reviewOverlay.classList.contains('active')) return;
                        if (e.key==='ArrowLeft'){ e.preventDefault(); this.goTo(Math.max(0,this._currentIdx-1)); }
                        else if (e.key==='ArrowRight'){ e.preventDefault(); this.goTo(Math.min(this._totalMoves,this._currentIdx+1)); }
                        else if (e.key==='Home'){ e.preventDefault(); this.goTo(0); }
                        else if (e.key==='End'){ e.preventDefault(); this.goTo(this._totalMoves); }
                        else if (e.key==='Escape'){ e.preventDefault(); this.close(); }
                    });
                    this._bound = true;
                }
                open() {
                    const record = this.game._gameRecord;
                    if (!record || record.moves.length === 0) return;
                    this._bind();
                    this._dom.reviewOverlay.classList.add('active');
                    const r = record.result;
                    this._dom.reviewResult.textContent = r === 'draw' ? '和棋' : r === 'white' ? '白方胜' : r === 'black' ? '黑方胜' : '';
                    this._totalMoves = record.moves.length;
                    this._dom.reviewSlider.max = this._totalMoves;
                    this._dom.reviewSlider.value = this._totalMoves;
                    this._currentIdx = this._totalMoves;
                    this._buildMoveList();
                    this.goTo(this._totalMoves);
                    this._startAnalysis();
                }
                close() {
                    if (this.analyzer) { this.analyzer.cancel(); this.analyzer = null; }
                    this._dom.reviewOverlay.classList.remove('active');
                }
                goTo(idx) {
                    this._currentIdx = Math.max(0, Math.min(this._totalMoves, idx));
                    this._dom.reviewSlider.value = this._currentIdx;
                    this._renderBoard();
                    this._updateMoveInfo();
                    this._updateNavButtons();
                    this._highlightMoveList();
                }
                _renderBoard() {
                    const boardEl = this._dom.reviewBoard;
                    boardEl.innerHTML = '';
                    const record = this.game._gameRecord;
                    const stateStr = this._currentIdx === 0 ? record.initialBoardState : (record.moves[this._currentIdx - 1]?.boardState || '');
                    if (!stateStr || stateStr.length < 192) { console.warn('Invalid board state at idx:', this._currentIdx); return; }
                    const b = this.game.deserializeBoard(stateStr);
                    // 获取当前步的分类气泡信息
                    let bubbleIcon = null, bubbleTo = null;
                    if (this._currentIdx > 0) {
                        const curMove = record.moves[this._currentIdx - 1];
                        if (curMove && curMove.classificationIcon) {
                            bubbleIcon = curMove.classificationIcon;
                            bubbleTo = curMove.to;
                        }
                    }
                    for (let r = 0; r < 8; r++) {
                        for (let c = 0; c < 8; c++) {
                            const cell = document.createElement('div');
                            cell.className = 'rb-cell ' + ((r + c) % 2 === 0 ? 'white-cell' : 'black-cell');
                            const info = b[r][c];
                            if (info) {
                                const def = PIECE_DEFS[info.defKey];
                                if (!def) { console.warn('Unknown defKey in replay:', info.defKey, 'at', r, c); continue; }
                                const piece = document.createElement('div');
                                piece.className = 'rb-piece ' + (info.color === 'white' ? 'white-piece' : 'black-piece');
                                piece.innerHTML = `<span class="rb-symbol">${def.symbol}</span>`;
                                cell.appendChild(piece);
                            }
                            // 分类气泡
                            if (bubbleIcon && bubbleTo && r === bubbleTo[0] && c === bubbleTo[1]) {
                                const bubble = document.createElement('div');
                                bubble.className = 'rb-bubble';
                                const iconMap = { '!!':'icon-brilliant','!':'icon-great','?!':'icon-inaccuracy','?':'icon-mistake','??':'icon-blunder' };
                                const iconName = iconMap[bubbleIcon] || '';
                                bubble.innerHTML = `<svg viewBox="0 0 24 24"><use href="#${iconName}"/></svg>`;
                                cell.appendChild(bubble);
                            }
                            boardEl.appendChild(cell);
                        }
                    }
                }
                _updateMoveInfo() {
                    const numEl = this._dom.reviewMoveNum;
                    const notEl = this._dom.reviewMoveNotation;
                    const evalEl = this._dom.reviewMoveEval;
                    if (this._currentIdx === 0) {
                        numEl.textContent = '初始';
                        notEl.textContent = '开局局面';
                        evalEl.textContent = '';
                        evalEl.className = 'review-move-eval';
                    } else {
                        const move = this.game._gameRecord.moves[this._currentIdx - 1];
                        numEl.textContent = `第${move.moveIndex}步`;
                        notEl.textContent = move.notation || `${move.pieceSymbol} ${String.fromCharCode(97+move.from[1])}${8-move.from[0]}-${String.fromCharCode(97+move.to[1])}${8-move.to[0]}`;
                        if (move.winProbability !== null) {
                            const cp = move.evalCentipawns;
                            const wp = move.winProbability;
                            evalEl.innerHTML = `<span class="rm-cp">${(cp>=0?'+':'')+cp.toFixed(0)}</span>` +
                                (move.evalDiff !== null ? ` <span class="rm-diff" style="color:${move.evalDiff>0?'#6a9a6a':move.evalDiff<0?'#b87878':'#aaa'}">${move.evalDiff>0?'+':''}${move.evalDiff.toFixed(0)}</span>` : '');
                            evalEl.className = 'review-move-eval ' + (cp > 50 ? 'eval-positive' : cp < -50 ? 'eval-negative' : 'eval-neutral');
                        } else {
                            evalEl.textContent = '分析中...';
                            evalEl.className = 'review-move-eval eval-neutral';
                        }
                        // 显示分类图标
                        const iconEl = document.getElementById('reviewMoveIcon');
                        if (iconEl && move.classificationIcon) {
                            const iconMap = { '!!':'icon-brilliant','!':'icon-great','?!':'icon-inaccuracy','?':'icon-mistake','??':'icon-blunder' };
                            iconEl.innerHTML = `<svg viewBox="0 0 24 24" width="22" height="22"><use href="#${iconMap[move.classificationIcon]||''}"/></svg>`;
                        } else if (iconEl) { iconEl.innerHTML = ''; }
                    }
                }
                _updateNavButtons() {
                    document.getElementById('reviewBtnFirst').disabled = this._currentIdx === 0;
                    document.getElementById('reviewBtnPrev').disabled = this._currentIdx === 0;
                    document.getElementById('reviewBtnNext').disabled = this._currentIdx >= this._totalMoves;
                    document.getElementById('reviewBtnLast').disabled = this._currentIdx >= this._totalMoves;
                }
                _buildMoveList() {
                    const listEl = this._dom.reviewMoveList;
                    listEl.innerHTML = '';
                    const clickHandler = (idx) => { this.goTo(idx); };
                    const record = this.game._gameRecord;
                    for (let i = 0; i < record.moves.length; i++) {
                        const move = record.moves[i];
                        const entry = document.createElement('div');
                        entry.className = 'review-move-entry';
                        entry.dataset.idx = i + 1;
                        entry.addEventListener('click', () => clickHandler(i + 1));
                        const numSpan = document.createElement('span'); numSpan.className = 'rm-num';
                        numSpan.textContent = (move.color === 'white' ? (Math.floor(i/2)+1)+'.' : '...'+ (Math.floor(i/2)+1)+'.');
                        const iconSpan = document.createElement('span'); iconSpan.className = 'rm-icon';
                        const notSpan = document.createElement('span'); notSpan.className = 'rm-notation';
                        notSpan.textContent = move.notation || `${move.pieceSymbol}`;
                        const evalSpan = document.createElement('span'); evalSpan.className = 'rm-eval';
                        entry.appendChild(numSpan);
                        entry.appendChild(iconSpan);
                        entry.appendChild(notSpan);
                        entry.appendChild(evalSpan);
                        listEl.appendChild(entry);
                    }
                }
                _updateMoveListEvals() {
                    const entries = this._dom.reviewMoveList.querySelectorAll('.review-move-entry');
                    const record = this.game._gameRecord;
                    entries.forEach(e => {
                        const idx = parseInt(e.dataset.idx);
                        const move = record.moves[idx - 1];
                        if (!move) return;
                        const iconEl = e.querySelector('.rm-icon');
                        const evalEl = e.querySelector('.rm-eval');
                        if (move.classificationIcon) {
                            const iconMap = { '!!': 'icon-brilliant', '!': 'icon-great', '?!': 'icon-inaccuracy', '?': 'icon-mistake', '??': 'icon-blunder' };
                            const iconName = iconMap[move.classificationIcon] || '';
                            if (iconName) iconEl.innerHTML = `<svg viewBox="0 0 24 24"><use href="#${iconName}"/></svg>`;
                        }
                        if (move.winProbability !== null) {
                            const wp = move.winProbability;
                            const diff = move.evalDiff;
                            evalEl.innerHTML = `<span style="font-size:0.85em">${wp.toFixed(0)}%</span>` +
                                (diff !== null ? ` <span style="font-size:0.72em;color:${diff>0?'#6a9a6a':diff<0?'#b87878':'#aaa'}">${diff>0?'+':''}${diff.toFixed(0)}</span>` : '');
                            evalEl.style.color = wp > 55 ? '#6a9a6a' : wp < 45 ? '#b87878' : '#aaa';
                        }
                    });
                }
                _highlightMoveList() {
                    const entries = this._dom.reviewMoveList.querySelectorAll('.review-move-entry');
                    entries.forEach(e => {
                        e.classList.toggle('current', parseInt(e.dataset.idx) === this._currentIdx);
                    });
                    if (this._currentIdx > 0) {
                        const target = this._dom.reviewMoveList.querySelector(`[data-idx="${this._currentIdx}"]`);
                        if (target) target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    }
                }
                _startAnalysis() {
                    this._result = null;
                    const record = this.game._gameRecord;
                    this._dom.reviewChartPath.setAttribute('d', '');
                    this._dom.reviewChartArea.setAttribute('d', '');
                    this._dom.reviewAccWhiteFill.style.width = '0%';
                    this._dom.reviewAccWhiteVal.textContent = '--%';
                    this._dom.reviewAccBlackFill.style.width = '0%';
                    this._dom.reviewAccBlackVal.textContent = '--%';
                    ['Brilliant','Great','Inaccuracy','Mistake','Blunder'].forEach(k => {
                        document.getElementById('count' + k).textContent = '0';
                    });
                    this.analyzer = new PostGameAnalyzer(this.game, record, 7);
                    this.analyzer.analyze(
                        (pct) => {},
                        (result) => {
                            try {
                                this._result = result;
                                this._renderChart();
                                this._renderAccuracy();
                                this._renderClassificationSummary();
                                this._updateMoveListEvals();
                                this._updateMoveInfo();
                            } catch(e) { console.error('Render result error:', e); }
                            this.analyzer = null;
                        }
                    );
                }
                _renderChart() {
                    if (!this._result) return;
                    const moves = this._result.moves;
                    const svgW = 400, svgH = 150;
                    const left = 30, right = 395, top = 10, bottom = 140;
                    const cw = right - left, ch = bottom - top;
                    const wpToY = (wp) => bottom - (Math.max(0, Math.min(100, wp)) / 100) * ch;
                    let pathD = `M ${left} ${wpToY(50)}`;
                    let areaD = `M ${left} ${bottom} L ${left} ${wpToY(50)}`;
                    for (let i = 0; i < moves.length; i++) {
                        const x = left + ((i + 1) / Math.max(1, moves.length)) * cw;
                        const wp = moves[i].winProbability !== null ? moves[i].winProbability : 50;
                        const y = wpToY(wp);
                        pathD += ` L ${x} ${y}`;
                        areaD += ` L ${x} ${y}`;
                    }
                    const lastX = moves.length > 0 ? left + cw : left;
                    areaD += ` L ${lastX} ${bottom} Z`;
                    this._dom.reviewChartPath.setAttribute('d', pathD);
                    this._dom.reviewChartArea.setAttribute('d', areaD);
                }
                _renderAccuracy() {
                    if (!this._result) return;
                    this._dom.reviewAccWhiteFill.style.width = this._result.whiteAccuracy + '%';
                    this._dom.reviewAccWhiteVal.textContent = this._result.whiteAccuracy + '%';
                    this._dom.reviewAccBlackFill.style.width = this._result.blackAccuracy + '%';
                    this._dom.reviewAccBlackVal.textContent = this._result.blackAccuracy + '%';
                }
                _renderClassificationSummary() {
                    if (!this._result) return;
                    const cc = this._result.classificationCounts;
                    document.getElementById('countBrilliant').textContent = cc.brilliant;
                    document.getElementById('countGreat').textContent = cc.great;
                    document.getElementById('countInaccuracy').textContent = cc.inaccuracy;
                    document.getElementById('countMistake').textContent = cc.mistake;
                    document.getElementById('countBlunder').textContent = cc.blunder;
                }
            }

            const game = new ChemissGame();
            window.game = game;

            (function initMobileSettings() {

                    { id: 'btnCoords', html: '<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-grid"/></svg>', title: '显示坐标', handler: () => { showCoords = !showCoords; document.body.classList.toggle('show-coords', showCoords); btnCoords.classList.toggle('active', showCoords); } },
                    { id: 'btnClock', html: '<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-clock"/></svg>', title: '计时器', handler: () => { clockVisible = !clockVisible; timerSection.style.display = clockVisible ? 'block' : 'none'; btnClock.classList.toggle('active', clockVisible); } },
                    { id: 'btnNotation', html: '<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-notation"/></svg>', title: '棋谱', handler: () => { game._notationVisible = !game._notationVisible; notationSection.style.display = game._notationVisible ? 'block' : 'none'; btnNotation.classList.toggle('active', game._notationVisible); } },
                ];
                btnDefs.push({ id: 'btnAI', html: '<svg class="icon-svg" viewBox="0 0 24 24"><use href="#icon-robot"/></svg>', title: '人机对战', handler: () => toggleAI() });
                btnDefs.forEach(def => {
                    const clone = document.createElement('button');
                    clone.className = 'settings-icon-btn';
                    clone.id = def.id + 'Clone';
                    clone.title = def.title;
                    clone.innerHTML = def.html;
                    clone.addEventListener('click', def.handler);
                    clone.dataset.mirror = def.id;
                    row.appendChild(clone);
                });
                const mirrorActive = () => {
                    row.querySelectorAll('.settings-icon-btn').forEach(cl => {
                        const orig = document.getElementById(cl.dataset.mirror);
                        if (orig) cl.classList.toggle('active', orig.classList.contains('active'));
                    });
                };
                new MutationObserver(mirrorActive).observe(document.body, {attributes:true,subtree:true,attributeFilter:['class']});
            })();


            // 夜间模式
            btnDarkMode.addEventListener('click', () => {
                darkMode = !darkMode;
                document.body.classList.toggle('dark-mode', darkMode);
                btnDarkMode.classList.toggle('active', darkMode);
            });

            // Debug模式
            btnDebug.addEventListener('click', () => {
                debugMode = !debugMode;
                game.debugMode = debugMode;
                document.body.classList.toggle('debug-active', debugMode);
                btnDebug.classList.toggle('active', debugMode);
                game.selectedPiece = null; game.legalMoves = [];
                game.addLog(debugMode ? '[DEBUG] Debug模式开启 — 点击任意棋子自由移动' : '[DEBUG] Debug模式关闭');
                game.updateUI();
            });

            // 规则弹窗
            btnRules.addEventListener('click', () => {
                showRulesModal();
            });

            // ========== 坐标标签生成 ==========
            const colLabels = ['a','b','c','d','e','f','g','h'];
            (function buildCoordLabels(){
                const rowEl = document.getElementById('coordRowLabels');
                const colEl = document.getElementById('coordColLabels');
                for(let r=0; r<8; r++){
                    const span = document.createElement('span');
                    span.className = 'coord-row-label';
                    span.textContent = (8 - r);
                    rowEl.appendChild(span);
                }
                for(let c=0; c<8; c++){
                    const span = document.createElement('span');
                    span.className = 'coord-col-label';
                    span.textContent = colLabels[c];
                    colEl.appendChild(span);
                }
            })();

            // ========== 翻转棋盘 ==========
            const btnFlip = document.getElementById('btnFlip');
            const boardWrapper = document.getElementById('boardWrapper');
            btnFlip.addEventListener('click', () => {
                game.boardFlipped = !game.boardFlipped;
                boardWrapper.classList.toggle('flipped', game.boardFlipped);
                btnFlip.classList.toggle('active', game.boardFlipped);
                game.updateUI();
            });

            // ========== 显示坐标 ==========
            const btnCoords = document.getElementById('btnCoords');
            let showCoords = false;
            btnCoords.addEventListener('click', () => {
                showCoords = !showCoords;
                document.body.classList.toggle('show-coords', showCoords);
                btnCoords.classList.toggle('active', showCoords);
            });
            // ========== 计时器控制 ==========
            const btnClock = document.getElementById('btnClock');
            const clockSlider = document.getElementById('clockSlider');
            const clockNumInput = document.getElementById('clockNumInput');
            const clockIncSlider = document.getElementById('clockIncSlider');
            const clockIncInput = document.getElementById('clockIncInput');
            const clockPresetChips = document.getElementById('clockPresetChips');
            const btnClockSet = document.getElementById('btnClockSet');
            const btnClockToggle = document.getElementById('btnClockToggle');
            const timerSection = document.getElementById('timerSection');
            let clockVisible = false;

            btnClock.addEventListener('click', () => {
                clockVisible = !clockVisible;
                timerSection.style.display = clockVisible ? 'block' : 'none';
                btnClock.classList.toggle('active', clockVisible);
            });

            function getClockMinutes() { return parseInt(clockSlider.value); }
            function getClockIncrement() { return parseInt(clockIncSlider.value); }

            function syncMinSlider(val) {
                clockSlider.value = val;
                clockNumInput.value = val;
            }
            function syncIncSlider(val) {
                clockIncSlider.value = val;
                clockIncInput.value = val;
            }
            function clearChipActive() {
                clockPresetChips.querySelectorAll('.clock-preset-chip').forEach(c => c.classList.remove('active'));
            }

            // 时间：滑块与输入框双向同步
            clockSlider.addEventListener('input', () => { clockNumInput.value = clockSlider.value; clearChipActive(); });
            clockNumInput.addEventListener('change', () => {
                let v = parseInt(clockNumInput.value);
                if (isNaN(v) || v < 0) v = 0;
                if (v > 30) v = 30;
                syncMinSlider(v);
                clearChipActive();
            });
            // 加时：滑块与输入框双向同步
            clockIncSlider.addEventListener('input', () => { clockIncInput.value = clockIncSlider.value; clearChipActive(); });
            clockIncInput.addEventListener('change', () => {
                let v = parseInt(clockIncInput.value);
                if (isNaN(v) || v < 0) v = 0;
                if (v > 10) v = 10;
                syncIncSlider(v);
                clearChipActive();
            });

            // 预设芯片点击
            clockPresetChips.addEventListener('click', (e) => {
                const chip = e.target.closest('.clock-preset-chip');
                if (!chip) return;
                const min = parseInt(chip.dataset.min);
                const inc = parseInt(chip.dataset.inc);
                syncMinSlider(min);
                syncIncSlider(inc);
                clearChipActive();
                chip.classList.add('active');
                if (min === 0) {
                    if (game.chessClock) { game.chessClock.reset(0, 0); game.chessClock.pause(); }
                    game.chessClock = null;
                    btnClockToggle.textContent = '开始';
                    btnClockToggle.classList.remove('running');
                    game.updateClockDisplay();
                    return;
                }
            });

            // 设置按钮：只更新时间不开始计时
            btnClockSet.addEventListener('click', () => {
                const minutes = getClockMinutes();
                const increment = getClockIncrement();
                if (minutes === 0) {
                    if (game.chessClock) { game.chessClock.reset(0, 0); game.chessClock.pause(); }
                    game.chessClock = null;
                    btnClockToggle.textContent = '开始';
                    btnClockToggle.classList.remove('running');
                } else if (game.chessClock) {
                    game.chessClock.reset(minutes, increment);
                    game.chessClock.pause();
                    btnClockToggle.textContent = '开始';
                    btnClockToggle.classList.remove('running');
                } else {
                    game.chessClock = new ChessClock(game, minutes, increment, (winnerColor) => {
                        game.gameOver = true;
                        game.winner = winnerColor;
                        game.winReason = 'timeout';
                        game.addLog(`${winnerColor === 'white' ? '黑方' : '白方'}超时，${winnerColor === 'white' ? '白方' : '黑方'}获胜`);
                        game.updateUI();
                        game.showVictory();
                    });
                }
                game.updateClockDisplay();
            });

            btnClockToggle.addEventListener('click', () => {
                const minutes = getClockMinutes();
                const increment = getClockIncrement();
                if (minutes === 0) {
                    if (game.chessClock) { game.chessClock.reset(0, 0); game.chessClock.pause(); }
                    game.chessClock = null;
                    btnClockToggle.textContent = '开始';
                    btnClockToggle.classList.remove('running');
                    game.updateClockDisplay();
                    return;
                }
                if (!game.chessClock || game.chessClock.initialMs !== minutes * 60 * 1000 || game.chessClock.incrementMs !== increment * 1000) {
                    game.chessClock = new ChessClock(game, minutes, increment, (winnerColor) => {
                        game.gameOver = true;
                        game.winner = winnerColor;
                        game.winReason = 'timeout';
                        game.addLog(`${winnerColor === 'white' ? '黑方' : '白方'}超时，${winnerColor === 'white' ? '白方' : '黑方'}获胜`);
                        game.updateUI();
                        game.showVictory();
                    });
                }
                if (game.chessClock.active) {
                    game.chessClock.pause();
                    btnClockToggle.textContent = '开始';
                    btnClockToggle.classList.remove('running');
                } else {
                    game.chessClock.start();
                    btnClockToggle.textContent = '暂停';
                    btnClockToggle.classList.add('running');
                }
                game.updateClockDisplay();
            });

            // ========== 棋谱显示控制 ==========
            const btnNotation = document.getElementById('btnNotation');
            const notationSection = document.getElementById('notationSection');
            btnNotation.addEventListener('click', () => {
                game._notationVisible = !game._notationVisible;
                notationSection.style.display = game._notationVisible ? 'block' : 'none';
                btnNotation.classList.toggle('active', game._notationVisible);
            });

            // ========== AI人机对战控制 ==========
            const btnAI = document.getElementById('btnAI');
            btnAI.addEventListener('click', () => toggleAI());
            // AI复盘（双击）
            btnAI.addEventListener('dblclick', () => { game.openReview(); });
            btnAI.addEventListener('contextmenu', (e) => { e.preventDefault(); game.openReview(); });

            function showRulesModal() {
                const modal = document.getElementById('rulesModal');
                // 已打开则关闭（二次点击切换）
                if (modal.classList.contains('active')) {
                    closeModal(modal);
                    return;
                }
                const content = document.getElementById('rulesModalContent');
                content.innerHTML = `<h3>化学棋 Chemiss 规则</h3>
<div style="text-align:left;font-size:0.82em;line-height:1.7;max-height:70vh;overflow-y:auto;padding-right:4px;">
<h4 style="color:#b0908a;margin:10px 0 4px;">一、游戏目标</h4>
<p>吃掉对方的<b>氢王(H)</b>棋子即获胜。双方可协商和棋。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">二、棋盘与棋子</h4>
<p>8×8棋盘。白方（下方）先行。初始各16枚棋子：H×1, C×1, N×1, O×1, F×1, Si×1, P×1, S×1, Li×4, Na×4。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">三、移动规则</h4>
<p>每回合移动己方1枚棋子。移动方向数=当前总电子数(上限8)，移动格数=总电子数。方向受周期奇偶、列位置、阵营影响。</p>
<p>棋子周围圆点表示当前可移动方向。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">四、成键与吃子</h4>
<p><b>离子键吃子</b>：金属-非金属且电负性差>1.6，直接吃，攻击方获得防御方全部价电子(3回合)。溢出>8电子发射β射线。</p>
<p><b>共价/金属键吃子</b>：目标必须已键合，攻击者不能是键合伙伴。相邻异色棋子自动成键。共价键每原子限1根，金属键可形成多原子簇。</p>
<p><b>稀有气体</b>：不参与任何键合，不能吃子也不能被吃。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">五、特殊能力</h4>
<p><b>电性吸引</b>：每回合开始，异号电荷棋子自动互相靠近。</p>
<p><b>金属给电子</b>：金属给相邻己方非金属1个电子→阳离子/阴离子(3回合)。</p>
<p><b>Li核变</b>：Li到达对方底线可变为周期表任意元素(选同位素)。</p>
<p><b>放射性衰变</b>：放射性同位素按半衰期概率触发α/β/γ衰变，发射射线。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">六、射线效果</h4>
<p>α射线(射程2)：目标Z+2吸收嬗变，或价电子-1；重核(Z≥90)可裂变。</p>
<p>β射线(射程4)：目标价电子随机±1(3回合)；重核可裂变。</p>
<p>γ射线(射程8)：目标眩晕1回合；重核可裂变。</p>
<p>裂变：Z≥90元素消失，相邻空格生成2个Z30-60的裂变产物。</p>

<h4 style="color:#b0908a;margin:10px 0 4px;">七、界面说明</h4>
<p>棋子标注：符号、质量数、电负性。周围圆点=移动方向。键合高亮边框、眩晕粉红光晕、阳离子/阴离子角标、放射性标识。</p>
</div>`;
                modal.classList.add('active');
            }
            document.getElementById('rulesModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal(this);
            });

            // ========== 联机弹窗逻辑 ==========
            const btnOnline = document.getElementById('btnOnline');
            const onlineModal = document.getElementById('onlineModal');
            const btnDisconnect = document.getElementById('btnDisconnect');
            let onlineTab = 'host';

            btnOnline.addEventListener('click', () => {
                if (onlineModal.classList.contains('active')) { closeModal(onlineModal); return; }
                document.getElementById('hostRoomCode').textContent = '----';
                document.getElementById('joinRoomInput').value = '';
                switchOnlineTab('host');
                game._refreshOnlineUI();
                onlineModal.classList.add('active');
            });

            onlineModal.addEventListener('click', function(e) { if (e.target === this) closeModal(this); });

            btnDisconnect.addEventListener('click', () => {
                if (game.onlineManager) { game.onlineManager.disconnect(); game.onlineManager = null; }
                game.onlineMode = false; game.onlineMyColor = null;
                game.addLog('已断开联机');
                game.updateUI(); game._refreshOnlineUI();
            });

            // Tab 切换
            document.querySelectorAll('.online-tab').forEach(tab => {
                tab.addEventListener('click', () => switchOnlineTab(tab.dataset.tab));
            });
            function switchOnlineTab(tab) {
                onlineTab = tab;
                document.querySelectorAll('.online-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
                document.getElementById('onlinePanelHost').classList.toggle('active', tab === 'host');
                document.getElementById('onlinePanelJoin').classList.toggle('active', tab === 'join');
            }

            // 创建对局 - 主机
            document.getElementById('btnCreateGame').addEventListener('click', () => {
                if (game.onlineManager) game.onlineManager.disconnect();
                game.onlineManager = new OnlineManager(game);
                const code = game.onlineManager.hostGame();
                document.getElementById('hostRoomCode').textContent = code;
                game.addLog('房间已创建，等待对手加入…');
                game._refreshOnlineUI();
            });

            document.getElementById('btnCopyRoom').addEventListener('click', () => {
                const code = document.getElementById('hostRoomCode').textContent;
                if (!code || code === '----') { alert('请先创建对局'); return; }
                navigator.clipboard.writeText(code).then(() => alert('房间码已复制！\n"' + code + '"\n发送给对手即可。')).catch(() => alert('房间码: ' + code + '\n请手动复制发送给对手。'));
            });

            // 加入对局 - 客机
            document.getElementById('btnJoinGame').addEventListener('click', () => {
                const code = document.getElementById('joinRoomInput').value.trim().toUpperCase();
                if (!code || code.length !== 6) { alert('请输入6位房间码'); return; }
                if (game.onlineManager) game.onlineManager.disconnect();
                game.onlineManager = new OnlineManager(game);
                if (!game.onlineManager.joinGame(code)) { alert('房间码格式错误'); game.onlineManager = null; return; }
                game.addLog('正在加入房间 ' + code + '…');
                game._refreshOnlineUI();
            });

            // 输入框自动转大写
            const joinRoomInput = document.getElementById('joinRoomInput');
            joinRoomInput.addEventListener('input', function() {
                this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            });
            joinRoomInput.addEventListener('focus', function() {
                this.placeholder = '';
            });
            joinRoomInput.addEventListener('blur', function() {
                this.placeholder = '输入6位房间码';
            });

            // ========== 可折叠面板切换 ==========
            document.querySelectorAll('.collapsible-header').forEach(header => {
                header.addEventListener('click', () => {
                    const targetId = header.dataset.target;
                    const content = document.getElementById(targetId);
                    if (content) {
                        content.classList.toggle('collapsed');
                        header.classList.toggle('collapsed');
                    }
                });
            });

            // Ctrl+Z 回退
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'z' && !e.target.closest('input,textarea,select')) {
                    e.preventDefault();
                    game.undo();
                }
            });

            console.log(' 化学棋 Chemiss 已就绪！');
        })();
    </script>
</body>
</html>
